# grafana-dashboards-k8s.yaml
# Community Kubernetes dashboards imported via the Grafana Operator.
# These pull JSON definitions from public sources and wire them to our
# Prometheus datasource automatically.

---
# Global cluster overview (dotdc: k8s-views-global)
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: k8s-views-global
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  folder: "Kubernetes"
  url: "https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-global.json"
  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "Prometheus"

---
# Node Exporter Full — detailed node CPU/mem/disk/net (Grafana.com #1860)
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: node-exporter-full
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  folder: "Kubernetes"
  grafanaCom:
    id: 1860
  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "Prometheus"

---
# Kubernetes Pods overview (dotdc: k8s-views-pods)
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: k8s-views-pods
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  folder: "Kubernetes"
  url: "https://raw.githubusercontent.com/dotdc/grafana-dashboards-kubernetes/master/dashboards/k8s-views-pods.json"
  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "Prometheus"
