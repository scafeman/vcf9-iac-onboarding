# grafana-instance.yaml
# Grafana instance managed by the Grafana Operator.
# Exposed via Contour Ingress with TLS termination.
# Authentication is enabled — anonymous access is disabled.
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana
  namespace: grafana
  labels:
    dashboards: "grafana"
spec:
  config:
    server:
      root_url: "https://GRAFANA_HOSTNAME"
    auth.anonymous:
      enabled: "false"
    security:
      admin_user: "admin"
      admin_password: "GRAFANA_ADMIN_PASSWORD"
  service:
    spec:
      type: ClusterIP
      ports:
        - name: http
          port: 80
          targetPort: 3000
