# grafana-dashboards-k8s.yaml
# Community Kubernetes dashboards imported via the Grafana Operator.
# These pull JSON definitions from grafana.com and wire them to our
# Prometheus datasource automatically.

---
# Global cluster overview — dotdc: k8s-views-global (Grafana.com #15757)
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDashboard
metadata:
  name: k8s-views-global
  namespace: grafana
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  folder: "Kubernetes"
  grafanaCom:
    id: 15757
  datasources:
    - inputName: "DS_PROMETHEUS"
      datasourceName: "Prometheus"

