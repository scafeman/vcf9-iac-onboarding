# Kustomize overlay for the Google Microservices Demo (Online Boutique).
#
# This overlay downloads the upstream release manifest and applies patches
# to customize the deployment for VCF 9:
#   - frontend-external Service changed from LoadBalancer to ClusterIP
#     (traffic routes through the shared Contour envoy-lb Ingress instead)
#
# ArgoCD Application points to this directory instead of the upstream repo,
# giving us full control over customizations while preserving upstream updates.

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - https://raw.githubusercontent.com/GoogleCloudPlatform/microservices-demo/main/release/kubernetes-manifests.yaml

patches:
  # Change frontend-external from LoadBalancer to ClusterIP
  # (saves a public IP — traffic routes through envoy-lb Ingress with Let's Encrypt TLS)
  - target:
      kind: Service
      name: frontend-external
    patch: |
      - op: replace
        path: /spec/type
        value: ClusterIP
