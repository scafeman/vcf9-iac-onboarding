# =============================================================================
# Sample VKS Functional Test Manifest — Storage, Compute & Networking
# =============================================================================
#
# This manifest deploys a functional test workload to validate that storage,
# compute, and networking are working correctly on a VKS cluster. It
# corresponds to Phase 7 of the VCF 9 IaC Onboarding Guide.
#
# The test creates three resources:
#   1. A PersistentVolumeClaim — validates dynamic volume provisioning
#      (CSI driver and storage backend).
#   2. A Deployment — validates pod scheduling with a hardened security
#      context (non-root, seccomp, dropped capabilities).
#   3. A LoadBalancer Service — validates NSX LoadBalancer ingress and
#      external IP assignment.
#
# Prerequisites:
#   • VKS cluster must be provisioned (Phase 6 complete).
#   • kubeconfig must be set for the target VKS cluster.
#     Retrieve it with:  vcf cluster kubeconfig get <CLUSTER_NAME>
#
# Usage:
#   1. Change the storageClassName value below to match an available
#      storage class on your VKS cluster (check with: kubectl get storageclasses).
#   2. Apply with:  kubectl apply -f sample-vks-functional-test.yaml
#   3. Verify:
#        kubectl get pvc vks-test-pvc          # STATUS should be Bound
#        kubectl get deploy vks-test-app       # READY should be 1/1
#        kubectl get svc vks-test-lb           # EXTERNAL-IP should be assigned
#   4. Clean up:  kubectl delete -f sample-vks-functional-test.yaml
#
# =============================================================================

# -----------------------------------------------------------------------------
# PersistentVolumeClaim — Validate Dynamic Volume Provisioning
# -----------------------------------------------------------------------------
# This PVC requests a 1Gi volume to confirm that the CSI driver and the
# underlying storage backend (e.g., NFS, vSAN) are functioning correctly.
# A successful Bound status proves that dynamic provisioning is operational.
# -----------------------------------------------------------------------------
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vks-test-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  # Storage class for the PVC — must match an available storage class on
  # your VKS cluster. Check available classes with:
  #   kubectl get storageclasses
  storageClassName: nfs  # CHANGE: Replace with your available storage class
---
# -----------------------------------------------------------------------------
# Deployment — Validate Pod Scheduling with Hardened Security Context
# -----------------------------------------------------------------------------
# This Deployment runs an nginx pod that serves a test page from the PVC.
# It validates that the Kubernetes scheduler can place pods on worker nodes
# and that the hardened security context (non-root user, seccomp profile,
# dropped capabilities) is accepted by the cluster's admission policies.
#
# An init container writes a test HTML page to the PVC-backed volume,
# and the main nginx container serves it on port 8080.
#
# Note: The deploy-cluster.sh script uses a custom image
# (scafeman/vks-test-app:latest) with built-in HTML content instead.
# This sample uses the upstream nginx-unprivileged image for standalone
# use without a custom registry.
# -----------------------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vks-test-app
  labels:
    app: vks-test-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vks-test-app
  template:
    metadata:
      labels:
        app: vks-test-app
    spec:
      # Pod-level security context — enforces non-root execution
      # and the RuntimeDefault seccomp profile for all containers.
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      initContainers:
        # Init container writes a test HTML page to the PVC volume.
        # This confirms the volume is writable and the init container
        # lifecycle works correctly.
        - name: init-html
          image: busybox:latest
          command:
            - sh
            - -c
            - |
              cat > /usr/share/nginx/html/index.html << 'HTMLEOF'
              <!DOCTYPE html>
              <html lang="en">
              <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>VKS Cluster — Deployment Validated</title>
              <style>
              *{margin:0;padding:0;box-sizing:border-box}
              body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px}
              .card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:64px 72px;max-width:960px;width:95%;box-shadow:0 8px 32px rgba(0,0,0,0.4)}
              .badge{display:inline-block;background:#238636;color:#fff;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600;letter-spacing:0.5px;margin-bottom:20px}
              h1{font-size:36px;font-weight:700;margin-bottom:10px;background:linear-gradient(135deg,#58a6ff,#3fb950);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
              .subtitle{color:#8b949e;font-size:16px;margin-bottom:40px}
              .grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:40px}
              .metric{background:#0d1117;border:1px solid #30363d;border-radius:8px;padding:20px}
              .metric-label{font-size:12px;color:#8b949e;text-transform:uppercase;letter-spacing:1px;margin-bottom:6px}
              .metric-value{font-size:22px;font-weight:600;color:#58a6ff}
              .metric-value.green{color:#3fb950}
              .checks{list-style:none;margin-bottom:32px}
              .checks li{padding:12px 0;border-bottom:1px solid #21262d;font-size:16px;display:flex;align-items:center;gap:10px}
              .checks li:last-child{border-bottom:none}
              .check{color:#3fb950;font-weight:bold}
              .footer{text-align:center;color:#484f58;font-size:13px;margin-top:24px}
              .footer a{color:#58a6ff;text-decoration:none}
              </style>
              </head>
              <body>
              <div class="card">
              <span class="badge">DEPLOYMENT VALIDATED</span>
              <h1>VMware Cloud Foundation 9 — VKS Cluster</h1>
              <p class="subtitle">Infrastructure-as-Code deployment via GitHub Actions</p>
              <div class="grid">
              <div class="metric"><div class="metric-label">Platform</div><div class="metric-value">VCF 9 + VKS</div></div>
              <div class="metric"><div class="metric-label">Orchestration</div><div class="metric-value">Cluster API</div></div>
              <div class="metric"><div class="metric-label">Networking</div><div class="metric-value">NSX VPC</div></div>
              <div class="metric"><div class="metric-label">Storage</div><div class="metric-value green">PVC Bound</div></div>
              </div>
              <ul class="checks">
              <li><span class="check">&#10003;</span> VCF CLI context created and authenticated to VCFA</li>
              <li><span class="check">&#10003;</span> Project, RBAC, and Supervisor Namespace provisioned</li>
              <li><span class="check">&#10003;</span> Context Bridge completed — Cluster API visible</li>
              <li><span class="check">&#10003;</span> VKS cluster deployed via Cluster API topology</li>
              <li><span class="check">&#10003;</span> Worker nodes scaled and Ready</li>
              <li><span class="check">&#10003;</span> Persistent Volume dynamically provisioned and bound</li>
              <li><span class="check">&#10003;</span> NSX LoadBalancer assigned external IP</li>
              <li><span class="check">&#10003;</span> HTTP connectivity validated end-to-end</li>
              </ul>
              <div class="footer">Powered by <a href="https://github.com/scafeman/vcf9-iac-onboarding">vcf9-iac-onboarding</a> &middot; VCF 9 IaC Toolkit</div>
              </div>
              </body>
              </html>
              HTMLEOF
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html
      containers:
        # Main container — serves the test page via nginx on port 8080.
        # Uses the unprivileged nginx image to comply with non-root policy.
        - name: nginx
          image: nginxinc/nginx-unprivileged:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html
      volumes:
        # Volume backed by the PVC created above — proves the PVC
        # successfully bound to a PersistentVolume.
        - name: html-volume
          persistentVolumeClaim:
            claimName: vks-test-pvc
---
# -----------------------------------------------------------------------------
# Service (LoadBalancer) — Validate NSX LoadBalancer Ingress
# -----------------------------------------------------------------------------
# This Service exposes the test app via an NSX LoadBalancer. A successful
# deployment assigns an EXTERNAL-IP, proving that the NSX load balancer
# integration and external IP assignment are working correctly.
#
# Verify with:  kubectl get svc vks-test-lb
# The EXTERNAL-IP column should show a routable IP address (not <pending>).
# -----------------------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: vks-test-lb
spec:
  # Type LoadBalancer triggers NSX to provision an external load balancer
  # and assign a routable IP from the configured External IP block.
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: vks-test-app
