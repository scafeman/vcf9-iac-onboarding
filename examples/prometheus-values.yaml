# prometheus-values.yaml
# Minimal configuration overrides for Prometheus on VKS clusters.
#
# Based on the Broadcom Prometheus Package Reference:
# https://techdocs.broadcom.com/us/en/vmware-cis/vcf/vsphere-supervisor-services-and-standalone-components/latest/managing-vsphere-kuberenetes-service-clusters-and-workloads/installing-standard-packages-on-tkg-service-clusters/standard-package-reference/prometheus-package-reference.html
#
# Only values that differ from the upstream defaults are set here.
# The full list of parameters and an example data values file are
# available at the URL above.

# Deploy into the same namespace as the other TKG packages.
namespace: tkg-packages

# Prometheus persistent volume — use the NFS storage class available
# in VKS clusters instead of the upstream default ("null" / default provisioner).
prometheus:
  pvc:
    storageClassName: nfs

# Alertmanager persistent volume — same NFS storage class.
alertmanager:
  pvc:
    storageClassName: nfs
