services:
  vcf-dev:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VCF_CLI_VERSION: v9.0.2
        KUBECTL_VERSION: v1.33.0
    container_name: vcf9-dev
    hostname: vcf9-dev
    stdin_open: true
    tty: true
    volumes:
      # Mount the repo into the container
      - .:/workspace
    working_dir: /workspace
    env_file:
      - .env
    environment:
      - TERM=xterm-256color

  gh-actions-runner:
    build:
      context: .
      dockerfile: Dockerfile.runner
      args:
        VCF_CLI_VERSION: v9.0.2
        KUBECTL_VERSION: v1.33.0
    container_name: gh-actions-runner
    environment:
      - REPO_URL=${REPO_URL}
      - RUNNER_TOKEN=${RUNNER_TOKEN}
      - RUNNER_NAME=vcf-local-runner
      - RUNNER_WORKDIR=/runner-work
      - LABELS=self-hosted,vcf
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped
