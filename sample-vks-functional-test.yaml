---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: vks-test-pvc
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
  storageClassName: nfs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vks-test-app
  labels:
    app: vks-test-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vks-test-app
  template:
    metadata:
      labels:
        app: vks-test-app
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
        runAsNonRoot: true
        runAsUser: 101
        fsGroup: 101
      initContainers:
        - name: init-html
          image: busybox:latest
          command: ['sh', '-c', 'echo "Hello from VKS On-Premises Cluster! The Persistent Volume is working successfully." > /usr/share/nginx/html/index.html']
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html
      containers:
        - name: nginx
          image: nginxinc/nginx-unprivileged:latest
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
          volumeMounts:
            - name: html-volume
              mountPath: /usr/share/nginx/html
      volumes:
        - name: html-volume
          persistentVolumeClaim:
            claimName: vks-test-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: vks-test-lb
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 8080
  selector:
    app: vks-test-app
