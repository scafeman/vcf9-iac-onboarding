# =============================================================================
# Deploy Secrets Demo — GitHub Actions Workflow
# =============================================================================
#
# This workflow deploys the VCF Secret Store integration demo on an existing
# VKS cluster provisioned by Deploy Cluster. It creates KeyValueSecrets in the
# supervisor namespace, deploys a vault-injector, Redis, PostgreSQL, and a
# Next.js dashboard that reads vault-injected secrets to verify connectivity.
#
# Prerequisites:
#   - Deploy Cluster must have completed successfully — a running VKS cluster
#     with a valid admin kubeconfig file is required.
#   - A self-hosted GitHub Actions runner labeled [self-hosted, vcf] with
#     network access to the VKS cluster API. All required tools (VCF CLI,
#     kubectl, docker, jq, openssl) are baked into the runner via
#     Dockerfile.runner — no container: directive is used.
#
# Triggers:
#   - workflow_dispatch: Manual trigger from the GitHub Actions UI
#   - repository_dispatch: API trigger with event type "deploy-secrets-demo"
#
# =============================================================================

name: Deploy Secrets Demo

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: "VKS cluster name (e.g., my-dev-project-01-clus-01)"
        required: true
        type: string
      environment:
        description: "Environment label for the deployment"
        required: false
        type: string
        default: "demo"

  repository_dispatch:
    types: [deploy-secrets-demo]

jobs:
  deploy:
    name: Deploy Secrets Demo
    runs-on: [self-hosted, vcf]
    environment: vcf-production
    defaults:
      run:
        shell: bash

    env:
      # --- Unified Parameter Resolution ---
      # Priority: workflow_dispatch input > client_payload > secret > default
      CLUSTER_NAME: ${{ github.event.inputs.cluster_name || github.event.client_payload.cluster_name }}
      ENVIRONMENT: ${{ github.event.inputs.environment || github.event.client_payload.environment || 'demo' }}
      DOMAIN: ${{ github.event.client_payload.domain || secrets.DOMAIN || 'lab.local' }}
      KUBECONFIG_PATH: ${{ github.event.client_payload.kubeconfig_path || secrets.KUBECONFIG_PATH || '' }}
      SECRET_STORE_IP: ${{ github.event.client_payload.secret_store_ip || secrets.SECRET_STORE_IP }}
      SUPERVISOR_NAMESPACE: ${{ github.event.client_payload.supervisor_namespace || secrets.SUPERVISOR_NAMESPACE }}
      REDIS_PASSWORD: ${{ github.event.client_payload.redis_password || secrets.REDIS_PASSWORD || '' }}
      POSTGRES_USER: ${{ github.event.client_payload.postgres_user || secrets.POSTGRES_USER || 'secretsadmin' }}
      POSTGRES_PASSWORD: ${{ github.event.client_payload.postgres_password || secrets.POSTGRES_PASSWORD || '' }}
      POSTGRES_DB: ${{ github.event.client_payload.postgres_db || secrets.POSTGRES_DB || 'secretsdb' }}
      NAMESPACE: ${{ github.event.client_payload.namespace || secrets.NAMESPACE || 'secrets-demo' }}
      CONTAINER_REGISTRY: ${{ github.event.client_payload.container_registry || secrets.CONTAINER_REGISTRY || 'scafeman' }}
      IMAGE_NAME: ${{ github.event.client_payload.image_name || secrets.IMAGE_NAME || 'secrets-dashboard' }}
      IMAGE_TAG: ${{ github.event.client_payload.image_tag || secrets.IMAGE_TAG || 'latest' }}

      # --- Secrets only (truly sensitive — cannot be passed via client_payload) ---
      VCF_API_TOKEN: ${{ secrets.VCF_API_TOKEN }}
      VCFA_ENDPOINT: ${{ github.event.client_payload.vcfa_endpoint || secrets.VCFA_ENDPOINT }}
      TENANT_NAME: ${{ github.event.client_payload.tenant_name || secrets.TENANT_NAME }}

      # --- DockerHub credentials for image push ---
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

      # --- sslip.io DNS ---
      USE_SSLIP_DNS: "true"
      SSLIP_HOSTNAME_PREFIX: "secrets-dashboard"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Phase 1: Setup Kubeconfig (VCF CLI auto-retrieval)
      - name: Setup Kubeconfig
        run: |
          set -euo pipefail
          if [ -z "$KUBECONFIG_PATH" ]; then
            KUBECONFIG_PATH="./kubeconfig-${CLUSTER_NAME}.yaml"
          fi

          # If the kubeconfig file doesn't exist, retrieve it via VCF CLI
          if [ ! -f "$KUBECONFIG_PATH" ]; then
            echo "Kubeconfig not found at '$KUBECONFIG_PATH', retrieving via VCF CLI..."
            CONTEXT_NAME="secrets-demo-deploy"
            vcf context delete "$CONTEXT_NAME" --yes 2>/dev/null || true
            vcf context create "$CONTEXT_NAME" \
              --endpoint "https://$VCFA_ENDPOINT" \
              --type cci \
              --tenant-name "$TENANT_NAME" \
              --api-token "$VCF_API_TOKEN" \
              --set-current

            # Find and switch to the namespace context that contains this cluster
            # Convention: cluster name is <project>-clus-<id>, project name is <project>
            PROJECT_PATTERN=$(echo "$CLUSTER_NAME" | sed 's/-clus-[0-9]*$//')
            NAMESPACE_CONTEXT=$(vcf context list 2>&1 | grep "${CONTEXT_NAME}:.*${PROJECT_PATTERN}" | awk '{print $1}' | head -1 || true)
            if [ -z "$NAMESPACE_CONTEXT" ]; then
              echo "::error::Could not find a namespace context for cluster '${CLUSTER_NAME}' (project: '${PROJECT_PATTERN}') under context '${CONTEXT_NAME}'. Ensure Deploy Cluster has completed."
              exit 1
            fi
            echo "Found namespace context: $NAMESPACE_CONTEXT"
            vcf context use "$NAMESPACE_CONTEXT"

            # Extract the namespace ID from the context (format: context:namespace:project)
            DYNAMIC_NS_NAME=$(echo "$NAMESPACE_CONTEXT" | cut -d: -f2)
            echo "DYNAMIC_NS_NAME=$DYNAMIC_NS_NAME" >> "$GITHUB_ENV"

            # Retrieve the admin kubeconfig
            vcf cluster kubeconfig get "$CLUSTER_NAME" --admin --export-file "$KUBECONFIG_PATH"
            echo "Kubeconfig retrieved via VCF CLI"
          fi

          # Save the VCF CLI context name for supervisor operations in Phase 2-3
          echo "VCF_CONTEXT_NAME=${CONTEXT_NAME:-secrets-demo-deploy}" >> "$GITHUB_ENV"
          echo "KUBECONFIG_PATH=$KUBECONFIG_PATH" >> "$GITHUB_ENV"

          if [ ! -f "$KUBECONFIG_PATH" ]; then
            echo "::error::Kubeconfig file not found at '$KUBECONFIG_PATH'. Ensure Deploy Cluster has completed and the kubeconfig file exists."
            exit 1
          fi
          echo "Kubeconfig set to '$KUBECONFIG_PATH'"

      # Phase 2: Install VCF Secret Plugin
      - name: Install VCF Secret Plugin
        run: |
          set -euo pipefail
          if ! vcf secret list >/dev/null 2>&1; then
            echo "Installing VCF secret plugin..."
            vcf plugin install secret --yes 2>/dev/null || vcf plugin install secret 2>/dev/null || true
            echo "VCF secret plugin installed"
          else
            echo "VCF secret plugin already available"
          fi

      # Phase 2b: Create KeyValueSecrets in Supervisor Namespace
      - name: Create KeyValueSecrets
        run: |
          set -euo pipefail

          # Generate passwords if not provided
          if [ -z "$REDIS_PASSWORD" ]; then
            REDIS_PASSWORD=$(openssl rand -base64 18)
            echo "::add-mask::${REDIS_PASSWORD}"
            echo "REDIS_PASSWORD=$REDIS_PASSWORD" >> "$GITHUB_ENV"
            echo "Generated Redis password"
          fi
          if [ -z "$POSTGRES_PASSWORD" ]; then
            POSTGRES_PASSWORD=$(openssl rand -base64 18)
            echo "::add-mask::${POSTGRES_PASSWORD}"
            echo "POSTGRES_PASSWORD=$POSTGRES_PASSWORD" >> "$GITHUB_ENV"
            echo "Generated PostgreSQL password"
          fi

          # --- redis-creds KeyValueSecret ---
          # Delete existing secret to ensure password matches this deployment
          if vcf secret list 2>/dev/null | grep -q "redis-creds"; then
            echo "y" | vcf secret delete redis-creds 2>/dev/null || true
            echo "Deleted existing KeyValueSecret 'redis-creds'"
          fi

          REDIS_CREDS_FILE=$(mktemp /tmp/redis-creds-XXXXXX.yaml)
          cat > "${REDIS_CREDS_FILE}" <<EOF
          apiVersion: secretstore.vmware.com/v1alpha1
          kind: KeyValueSecret
          metadata:
            name: redis-creds
          spec:
            data:
            - key: password
              value: ${REDIS_PASSWORD}
          EOF

          if ! vcf secret create -f "${REDIS_CREDS_FILE}"; then
            echo "::error::Failed to create KeyValueSecret 'redis-creds'"
            rm -f "${REDIS_CREDS_FILE}"
            exit 1
          fi
          rm -f "${REDIS_CREDS_FILE}"
          echo "KeyValueSecret 'redis-creds' created"

          # --- postgres-creds KeyValueSecret ---
          if vcf secret list 2>/dev/null | grep -q "postgres-creds"; then
            echo "y" | vcf secret delete postgres-creds 2>/dev/null || true
            echo "Deleted existing KeyValueSecret 'postgres-creds'"
          fi

          POSTGRES_CREDS_FILE=$(mktemp /tmp/postgres-creds-XXXXXX.yaml)
          cat > "${POSTGRES_CREDS_FILE}" <<EOF
          apiVersion: secretstore.vmware.com/v1alpha1
          kind: KeyValueSecret
          metadata:
            name: postgres-creds
          spec:
            data:
            - key: username
              value: ${POSTGRES_USER}
            - key: password
              value: ${POSTGRES_PASSWORD}
            - key: database
              value: ${POSTGRES_DB}
          EOF

          if ! vcf secret create -f "${POSTGRES_CREDS_FILE}"; then
            echo "::error::Failed to create KeyValueSecret 'postgres-creds'"
            rm -f "${POSTGRES_CREDS_FILE}"
            exit 1
          fi
          rm -f "${POSTGRES_CREDS_FILE}"
          echo "KeyValueSecret 'postgres-creds' created"

          echo "Phase 2 complete — KeyValueSecrets created"

      # Phase 3: Create ServiceAccount + Long-Lived Token in Supervisor Namespace
      - name: Create ServiceAccount and Token
        run: |
          set -euo pipefail

          # Create ServiceAccount 'internal-app'
          if kubectl get serviceaccount internal-app >/dev/null 2>&1; then
            echo "ServiceAccount 'internal-app' already exists, skipping creation"
          else
            cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: internal-app
          EOF
            echo "ServiceAccount 'internal-app' created"
          fi

          # Create a long-lived token Secret for the ServiceAccount
          if kubectl get secret internal-app-token >/dev/null 2>&1; then
            echo "Secret 'internal-app-token' already exists, skipping creation"
          else
            cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: internal-app-token
            annotations:
              kubernetes.io/service-account.name: internal-app
          type: kubernetes.io/service-account-token
          EOF
            echo "Secret 'internal-app-token' created"
          fi

          # Wait for the token to be populated by the token controller
          TIMEOUT=300
          INTERVAL=15
          ELAPSED=0
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            if [ -n "$(kubectl get secret internal-app-token -o jsonpath='{.data.token}' 2>/dev/null)" ]; then
              echo "Token populated in Secret 'internal-app-token'"
              break
            fi
            echo "Waiting for token to be populated... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            echo "::error::Token was not populated in Secret 'internal-app-token' within ${TIMEOUT}s"
            exit 1
          fi

          # Save the token data for later use in the guest cluster
          SA_TOKEN=$(kubectl get secret internal-app-token -o jsonpath='{.data.token}')
          SA_CA_CRT=$(kubectl get secret internal-app-token -o jsonpath='{.data.ca\.crt}')
          echo "SA_TOKEN=$SA_TOKEN" >> "$GITHUB_ENV"
          echo "SA_CA_CRT=$SA_CA_CRT" >> "$GITHUB_ENV"

          echo "Phase 3 complete — ServiceAccount 'internal-app' with long-lived token ready"

      # Phase 4: Switch to Guest Cluster Kubeconfig + Create Namespace + Deploy Vault-Injector
      - name: Create Namespace, Copy Token, Deploy Vault-Injector
        run: |
          set -euo pipefail

          # Switch to guest cluster kubeconfig
          export KUBECONFIG="$KUBECONFIG_PATH"
          echo "KUBECONFIG=$KUBECONFIG_PATH" >> "$GITHUB_ENV"

          # Switch to the admin context (the file may contain multiple contexts)
          ADMIN_CONTEXT="${CLUSTER_NAME}-admin@${CLUSTER_NAME}"
          if kubectl config get-contexts "$ADMIN_CONTEXT" --kubeconfig="$KUBECONFIG_PATH" >/dev/null 2>&1; then
            kubectl config use-context "$ADMIN_CONTEXT" --kubeconfig="$KUBECONFIG_PATH"
            echo "Switched to admin context '$ADMIN_CONTEXT'"
          fi

          if ! kubectl get namespaces >/dev/null 2>&1; then
            echo "::error::Unable to reach guest cluster '${CLUSTER_NAME}' using kubeconfig at '${KUBECONFIG_PATH}'. Verify the cluster is running and the kubeconfig is valid."
            exit 1
          fi
          echo "Guest cluster '${CLUSTER_NAME}' is reachable"

          # --- Create secrets-demo namespace ---
          if kubectl get ns "$NAMESPACE" >/dev/null 2>&1; then
            echo "Namespace '$NAMESPACE' already exists, skipping creation"
          else
            kubectl create ns "$NAMESPACE"
            echo "Namespace '$NAMESPACE' created"
          fi

          kubectl label ns "$NAMESPACE" \
            pod-security.kubernetes.io/enforce=privileged \
            --overwrite >/dev/null 2>&1 || true

          # --- Copy service account token into guest cluster namespace ---
          if kubectl get secret internal-app-token -n "$NAMESPACE" >/dev/null 2>&1; then
            echo "Secret 'internal-app-token' already exists in namespace '$NAMESPACE', skipping copy"
          else
            cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Secret
          metadata:
            name: internal-app-token
            namespace: ${NAMESPACE}
          type: Opaque
          data:
            token: ${SA_TOKEN}
            ca.crt: ${SA_CA_CRT}
          EOF
            echo "Service account token copied into namespace '$NAMESPACE'"
          fi

          # --- Ensure tkg-packages namespace exists (vault-injector installs here) ---
          # If the namespace is in Terminating state (from a recent teardown), wait for it to finish
          NS_PHASE=$(kubectl get ns tkg-packages -o jsonpath='{.status.phase}' 2>/dev/null || true)
          if [ "$NS_PHASE" = "Terminating" ]; then
            echo "Namespace 'tkg-packages' is Terminating — waiting for it to finish..."
            ELAPSED=0
            while [ "$ELAPSED" -lt 120 ]; do
              if ! kubectl get ns tkg-packages >/dev/null 2>&1; then
                echo "Namespace 'tkg-packages' terminated"
                break
              fi
              # Force-remove namespace finalizer if stuck
              if [ "$ELAPSED" -ge 60 ]; then
                echo "Forcing namespace finalizer removal..."
                kubectl get ns tkg-packages -o json 2>/dev/null \
                  | jq '.spec.finalizers = []' \
                  | kubectl replace --raw "/api/v1/namespaces/tkg-packages/finalize" -f - 2>/dev/null || true
              fi
              echo "Waiting for tkg-packages termination... (${ELAPSED}s/120s)"
              sleep 10
              ELAPSED=$((ELAPSED + 10))
            done
          fi

          if ! kubectl get ns tkg-packages >/dev/null 2>&1; then
            kubectl create ns tkg-packages
            kubectl label ns tkg-packages pod-security.kubernetes.io/enforce=privileged --overwrite >/dev/null 2>&1 || true
            echo "Namespace 'tkg-packages' created"
          fi

          # Strip kapp ownership labels from shared resources BEFORE vault-injector install.
          # If prometheus (or another package) already claimed these resources, vault-injector
          # install will fail with kapp ownership errors. Stripping the labels allows both
          # packages to coexist in the tkg-packages namespace.
          kubectl label ns tkg-packages kapp.k14s.io/app- kapp.k14s.io/association- 2>/dev/null || true
          kubectl label limitrange ns-limit-range -n tkg-packages kapp.k14s.io/app- kapp.k14s.io/association- 2>/dev/null || true

          # --- Ensure package repository is registered (may have been removed by a previous teardown) ---
          PACKAGE_REPO_NAME="tkg-packages"
          PACKAGE_REPO_URL="${PACKAGE_REPO_URL:-projects.packages.broadcom.com/vsphere/supervisor/vks-standard-packages/3.6.0-20260211/vks-standard-packages:3.6.0-20260211}"
          if ! vcf package repository list --namespace tkg-packages 2>/dev/null | grep -q "$PACKAGE_REPO_NAME"; then
            echo "Package repository not found — registering..."
            vcf package repository add "$PACKAGE_REPO_NAME" \
              --url "$PACKAGE_REPO_URL" \
              --namespace tkg-packages
            # Wait for reconciliation
            ELAPSED=0
            while [ "$ELAPSED" -lt 120 ]; do
              if vcf package repository list --namespace tkg-packages 2>/dev/null | grep "$PACKAGE_REPO_NAME" | grep -qi "reconcile"; then
                echo "Package repository reconciled"
                break
              fi
              echo "Waiting for package repository to reconcile... (${ELAPSED}s/120s)"
              sleep 10
              ELAPSED=$((ELAPSED + 10))
            done
          fi

          # --- Install vault-injector via VKS standard package ---
          echo "Installing vault-injector package..."

          # Check if already installed AND running
          VAULT_INSTALLED=false
          if vcf package installed list -n tkg-packages 2>/dev/null | grep -q "vault-injector"; then
            # Package exists — check if pod is actually running
            if kubectl get pods -n "tkg-packages" -l app.kubernetes.io/name=vault-injector --no-headers 2>/dev/null | grep -q 'Running'; then
              echo "vault-injector package already installed and pod is running, skipping"
              VAULT_INSTALLED=true
            else
              echo "vault-injector package exists but pod is not running — removing and reinstalling"
              kubectl patch packageinstall vault-injector -n tkg-packages --type merge \
                -p '{"metadata":{"finalizers":null}}' 2>/dev/null || true
              kubectl patch app vault-injector -n tkg-packages --type merge \
                -p '{"metadata":{"finalizers":null}}' 2>/dev/null || true
              vcf package installed delete vault-injector -n tkg-packages --yes 2>/dev/null || true
              kubectl delete packageinstall vault-injector -n tkg-packages --ignore-not-found 2>/dev/null || true
              kubectl delete app vault-injector -n tkg-packages --ignore-not-found 2>/dev/null || true
              sleep 5
            fi
          fi

          if [ "$VAULT_INSTALLED" != "true" ]; then
            VAULT_VALUES_FILE=$(mktemp /tmp/vault-injector-values-XXXXXX.yaml)
            cat > "${VAULT_VALUES_FILE}" <<VALEOF
          externalIP: "${SECRET_STORE_IP}"
          namespace: "tkg-packages"
          agentInjectVaultAddr: "http://secret-store-service.tkg-packages.svc.cluster.local:8200"
          agentInjectVaultImage: "projects.packages.broadcom.com/vsphere/iaas/secret-store-service/9.0.0/openbao_ssl:0.0.15"
          VALEOF

            vcf package install vault-injector \
              -p vault-injector.kubernetes.vmware.com \
              --version 1.6.2+vmware.1-vks.1 \
              --values-file "${VAULT_VALUES_FILE}" \
              -n tkg-packages

            rm -f "${VAULT_VALUES_FILE}"
            echo "vault-injector package installed"

            # Strip kapp ownership labels AFTER vault-injector install so other packages
            # (Prometheus, Telegraf, etc.) can coexist in the tkg-packages namespace.
            kubectl label ns tkg-packages kapp.k14s.io/app- kapp.k14s.io/association- 2>/dev/null || true
            kubectl label limitrange ns-limit-range -n tkg-packages kapp.k14s.io/app- kapp.k14s.io/association- 2>/dev/null || true
          fi

          # Wait for vault-injector pod readiness
          TIMEOUT=300
          INTERVAL=15
          ELAPSED=0
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            if kubectl get pods -n "tkg-packages" -l app.kubernetes.io/name=vault-injector --no-headers 2>/dev/null | grep -q 'Running'; then
              echo "Vault-injector pod is running"
              break
            fi
            echo "Waiting for vault-injector pod to be ready... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            echo "::error::Vault-injector pod did not reach Running state within ${TIMEOUT}s"
            kubectl get pods -n "tkg-packages" -l app.kubernetes.io/name=vault-injector -o wide 2>/dev/null || true
            exit 1
          fi

          # Wait for vault-injector mutating webhook to be registered
          # (webhook must be active before creating pods with vault annotations)
          ELAPSED=0
          while [ "$ELAPSED" -lt 120 ]; do
            if kubectl get mutatingwebhookconfiguration vault-agent-injector-cfg >/dev/null 2>&1; then
              echo "vault-injector webhook registered"
              break
            fi
            echo "Waiting for vault-injector webhook... (${ELAPSED}s/120s)"
            sleep 10
            ELAPSED=$((ELAPSED + 10))
          done

          # Brief pause to ensure webhook is fully ready to intercept pod creation
          sleep 5

          echo "Phase 4 complete — vault-injector deployed and running in namespace '$NAMESPACE'"

      # Phase 5: Deploy Redis + PostgreSQL
      - name: Deploy Redis and PostgreSQL
        run: |
          set -euo pipefail

          # --- Redis Deployment + Service ---
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: redis
            namespace: ${NAMESPACE}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: redis
            template:
              metadata:
                labels:
                  app: redis
              spec:
                containers:
                - name: redis
                  image: redis:7-alpine
                  command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
                  ports:
                  - containerPort: 6379
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: redis
            namespace: ${NAMESPACE}
          spec:
            type: ClusterIP
            selector:
              app: redis
            ports:
            - port: 6379
              targetPort: 6379
              protocol: TCP
          EOF

          echo "Redis Deployment and ClusterIP Service applied"

          # --- PostgreSQL Deployment + Service ---
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: postgres
            namespace: ${NAMESPACE}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: postgres
            template:
              metadata:
                labels:
                  app: postgres
              spec:
                containers:
                - name: postgres
                  image: postgres:16-alpine
                  env:
                  - name: POSTGRES_USER
                    value: "${POSTGRES_USER}"
                  - name: POSTGRES_PASSWORD
                    value: "${POSTGRES_PASSWORD}"
                  - name: POSTGRES_DB
                    value: "${POSTGRES_DB}"
                  ports:
                  - containerPort: 5432
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: postgres
            namespace: ${NAMESPACE}
          spec:
            type: ClusterIP
            selector:
              app: postgres
            ports:
            - port: 5432
              targetPort: 5432
              protocol: TCP
          EOF

          echo "PostgreSQL Deployment and ClusterIP Service applied"

          # Wait for Redis pod readiness
          TIMEOUT=300
          INTERVAL=15
          ELAPSED=0
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            if kubectl get pods -n "$NAMESPACE" -l app=redis --no-headers 2>/dev/null | grep -q 'Running'; then
              echo "Redis pod is running"
              break
            fi
            echo "Waiting for Redis pod to be ready... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            echo "::error::Redis pod did not reach Running state within ${TIMEOUT}s"
            kubectl get pods -n "$NAMESPACE" -l app=redis -o wide 2>/dev/null || true
            exit 1
          fi

          # Wait for PostgreSQL pod readiness
          ELAPSED=0
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            if kubectl get pods -n "$NAMESPACE" -l app=postgres --no-headers 2>/dev/null | grep -q 'Running'; then
              echo "PostgreSQL pod is running"
              break
            fi
            echo "Waiting for PostgreSQL pod to be ready... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            echo "::error::PostgreSQL pod did not reach Running state within ${TIMEOUT}s"
            kubectl get pods -n "$NAMESPACE" -l app=postgres -o wide 2>/dev/null || true
            exit 1
          fi

          echo "Phase 5 complete — Redis and PostgreSQL deployed and running"

          # Restart Redis and PostgreSQL if they were already running with old passwords
          # (KeyValueSecrets are regenerated with new random passwords on each run)
          kubectl rollout restart deployment/redis -n "$NAMESPACE" 2>/dev/null || true
          kubectl rollout restart deployment/postgres -n "$NAMESPACE" 2>/dev/null || true
          echo "Redis and PostgreSQL restarted to pick up current passwords"

      # Phase 6: Build + Push Dashboard Image
      - name: Build and Push Dashboard Image
        run: |
          set -euo pipefail
          FULL_IMAGE="${CONTAINER_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}"

          # Login to DockerHub if credentials are available
          if [ -n "${DOCKERHUB_USERNAME:-}" ] && [ -n "${DOCKERHUB_TOKEN:-}" ]; then
            echo "${DOCKERHUB_TOKEN}" | docker login -u "${DOCKERHUB_USERNAME}" --password-stdin
            echo "Logged in to DockerHub"
          fi

          if ! docker build -t "${FULL_IMAGE}" examples/deploy-secrets-demo/dashboard/; then
            echo "::error::Failed to build container image '${FULL_IMAGE}'"
            exit 1
          fi
          echo "Container image '${FULL_IMAGE}' built successfully"

          if ! docker push "${FULL_IMAGE}"; then
            echo "::error::Failed to push container image '${FULL_IMAGE}'"
            exit 1
          fi

          echo "Phase 6 complete — container image '${FULL_IMAGE}' pushed"

      # Phase 7: Deploy Dashboard with Vault Annotations
      - name: Deploy Dashboard with Vault Annotations
        run: |
          set -euo pipefail

          # --- Create ServiceAccount for the dashboard pod ---
          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: ServiceAccount
          metadata:
            name: test-service-account
            namespace: ${NAMESPACE}
          ---
          apiVersion: v1
          kind: Secret
          metadata:
            name: test-service-account-token
            namespace: ${NAMESPACE}
            annotations:
              kubernetes.io/service-account.name: test-service-account
          type: kubernetes.io/service-account-token
          EOF

          echo "ServiceAccount 'test-service-account' and token created"

          # --- Deploy secrets-dashboard Deployment with vault annotations ---
          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: secrets-dashboard
            namespace: ${NAMESPACE}
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: secrets-dashboard
            template:
              metadata:
                labels:
                  app: secrets-dashboard
                annotations:
                  vault.hashicorp.com/agent-inject: "true"
                  vault.hashicorp.com/role: "${DYNAMIC_NS_NAME}"
                  vault.hashicorp.com/agent-inject-secret-redis-creds: "secret/data/${DYNAMIC_NS_NAME}/redis-creds"
                  vault.hashicorp.com/agent-inject-secret-postgres-creds: "secret/data/${DYNAMIC_NS_NAME}/postgres-creds"
                  vault.hashicorp.com/tls-skip-verify: "true"
              spec:
                serviceAccountName: test-service-account
                containers:
                - name: dashboard
                  image: ${CONTAINER_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}
                  ports:
                  - containerPort: 3000
                  env:
                  - name: REDIS_HOST
                    value: "redis.${NAMESPACE}.svc.cluster.local"
                  - name: POSTGRES_HOST
                    value: "postgres.${NAMESPACE}.svc.cluster.local"
                  volumeMounts:
                  - mountPath: /var/run/secrets/kubernetes.io/serviceaccount
                    name: vault-token
                volumes:
                - name: vault-token
                  secret:
                    secretName: internal-app-token
          EOF

          echo "Dashboard Deployment applied"

          # Deploy Dashboard Service (ClusterIP when using sslip.io Ingress, LoadBalancer otherwise)
          DASHBOARD_SVC_TYPE="LoadBalancer"
          if [[ "${USE_SSLIP_DNS}" == "true" ]]; then
            DASHBOARD_SVC_TYPE="ClusterIP"
          fi

          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Service
          metadata:
            name: secrets-dashboard-lb
            namespace: ${NAMESPACE}
          spec:
            type: ${DASHBOARD_SVC_TYPE}
            selector:
              app: secrets-dashboard
            ports:
            - port: 80
              targetPort: 3000
              protocol: TCP
          EOF

          echo "Dashboard Service applied (type: ${DASHBOARD_SVC_TYPE})"

          # Wait for dashboard pod readiness
          TIMEOUT=300
          INTERVAL=15
          ELAPSED=0
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            if kubectl get pods -n "$NAMESPACE" -l app=secrets-dashboard --no-headers 2>/dev/null | grep -q 'Running'; then
              echo "Dashboard pod is running"
              break
            fi
            echo "Waiting for dashboard pod to be ready... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            # Pod may be in CrashLoopBackOff if vault-injector sidecar wasn't injected on first create.
            # Restart the deployment to trigger re-injection, then wait again.
            echo "::warning::Dashboard pod not running — restarting deployment to trigger vault-agent sidecar injection"
            kubectl rollout restart deployment/secrets-dashboard -n "${NAMESPACE}" 2>/dev/null || true

            ELAPSED=0
            while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
              if kubectl get pods -n "$NAMESPACE" -l app=secrets-dashboard --no-headers 2>/dev/null | grep -q 'Running'; then
                echo "Dashboard pod is running (after restart)"
                break
              fi
              echo "Waiting for dashboard pod after restart... (${ELAPSED}s/${TIMEOUT}s)"
              sleep "$INTERVAL"
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "::error::Dashboard pod did not reach Running state within ${TIMEOUT}s (even after restart)"
              kubectl get pods -n "$NAMESPACE" -l app=secrets-dashboard -o wide 2>/dev/null || true
              exit 1
            fi
          fi

          # Verify vault-agent sidecar was injected — if not, restart to trigger injection
          CONTAINER_COUNT=$(kubectl get pod -n "$NAMESPACE" -l app=secrets-dashboard -o jsonpath='{.items[0].spec.containers[*].name}' 2>/dev/null | wc -w || echo "0")
          if [ "$CONTAINER_COUNT" -lt 2 ]; then
            echo "::warning::vault-agent sidecar not injected (only ${CONTAINER_COUNT} container) — restarting deployment"
            kubectl rollout restart deployment/secrets-dashboard -n "${NAMESPACE}" 2>/dev/null || true
            sleep 15
            # Wait for pod with sidecar
            ELAPSED=0
            while [ "$ELAPSED" -lt 120 ]; do
              NEW_COUNT=$(kubectl get pod -n "$NAMESPACE" -l app=secrets-dashboard -o jsonpath='{.items[0].spec.containers[*].name}' 2>/dev/null | wc -w || echo "0")
              if [ "$NEW_COUNT" -ge 2 ] && kubectl get pods -n "$NAMESPACE" -l app=secrets-dashboard --no-headers 2>/dev/null | grep -q 'Running'; then
                echo "vault-agent sidecar injected after restart (${NEW_COUNT} containers)"
                break
              fi
              echo "Waiting for vault-agent sidecar injection... (${ELAPSED}s/120s)"
              sleep 10
              ELAPSED=$((ELAPSED + 10))
            done
          else
            echo "vault-agent sidecar confirmed (${CONTAINER_COUNT} containers)"
          fi

          echo "Phase 7 complete — web dashboard deployed with vault annotations"

      # Phase 8: Wait for LoadBalancer or sslip.io Ingress + HTTP Test
      - name: Wait for LoadBalancer or sslip.io Ingress and Verify HTTP
        run: |
          set -euo pipefail
          DASHBOARD_IP=""
          DASHBOARD_URL=""

          if [[ "${USE_SSLIP_DNS}" == "true" ]]; then
            # sslip.io mode: create Ingress via shared envoy-lb
            echo "USE_SSLIP_DNS=true — creating sslip.io Ingress (ClusterIP service, no public IP wasted)"

            # Get the envoy-lb IP from tanzu-system-ingress namespace
            TIMEOUT=300
            INTERVAL=15
            ELAPSED=0
            ENVOY_LB_IP=""
            while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
              ENVOY_LB_IP=$(kubectl get svc envoy-lb -n tanzu-system-ingress -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
              if [ -n "$ENVOY_LB_IP" ]; then
                echo "Envoy LB IP: $ENVOY_LB_IP"
                break
              fi
              echo "Waiting for envoy-lb external IP... (${ELAPSED}s/${TIMEOUT}s)"
              sleep "$INTERVAL"
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            if [ -z "$ENVOY_LB_IP" ]; then
              echo "::error::Envoy LoadBalancer 'envoy-lb' did not receive an external IP within ${TIMEOUT}s"
              exit 1
            fi

            SSLIP_HOST="${SSLIP_HOSTNAME_PREFIX}.${ENVOY_LB_IP}.sslip.io"

            # Check if ClusterIssuer is ready for TLS
            CLUSTER_ISSUER_NAME="${CLUSTER_ISSUER_NAME:-letsencrypt-prod}"
            TLS_ENABLED="false"
            if kubectl get clusterissuer "${CLUSTER_ISSUER_NAME}" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null | grep -q "True"; then
              TLS_ENABLED="true"
            fi

            # Create sslip.io Ingress (with TLS if ClusterIssuer is ready)
            if [[ "${TLS_ENABLED}" == "true" ]]; then
              cat <<EOF | kubectl apply -f -
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: secrets-dashboard-sslip-ingress
            namespace: ${NAMESPACE}
            annotations:
              cert-manager.io/cluster-issuer: "${CLUSTER_ISSUER_NAME}"
          spec:
            ingressClassName: contour
            tls:
              - hosts:
                  - ${SSLIP_HOST}
                secretName: secrets-dashboard-sslip-tls
            rules:
            - host: ${SSLIP_HOST}
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: secrets-dashboard-lb
                      port:
                        number: 80
          EOF
            else
              cat <<EOF | kubectl apply -f -
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: secrets-dashboard-sslip-ingress
            namespace: ${NAMESPACE}
          spec:
            ingressClassName: contour
            rules:
            - host: ${SSLIP_HOST}
              http:
                paths:
                - path: /
                  pathType: Prefix
                  backend:
                    service:
                      name: secrets-dashboard-lb
                      port:
                        number: 80
          EOF
            fi
            echo "sslip.io Ingress created: ${SSLIP_HOST} (TLS: ${TLS_ENABLED})"
            if [[ "${TLS_ENABLED}" == "true" ]]; then
              DASHBOARD_URL="https://${SSLIP_HOST}"
            else
              DASHBOARD_URL="http://${SSLIP_HOST}"
            fi
            echo "DASHBOARD_URL=$DASHBOARD_URL" >> "$GITHUB_ENV"
          else
            # LoadBalancer mode: wait for external IP
            TIMEOUT=300
            INTERVAL=15
            ELAPSED=0
            while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
              DASHBOARD_IP=$(kubectl get svc secrets-dashboard-lb -n "$NAMESPACE" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
              if [ -n "$DASHBOARD_IP" ]; then
                echo "LoadBalancer 'secrets-dashboard-lb' assigned external IP: $DASHBOARD_IP"
                echo "DASHBOARD_IP=$DASHBOARD_IP" >> "$GITHUB_ENV"
                break
              fi
              echo "Waiting for LoadBalancer to receive external IP... (${ELAPSED}s/${TIMEOUT}s)"
              sleep "$INTERVAL"
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            if [ -z "$DASHBOARD_IP" ]; then
              echo "::error::LoadBalancer 'secrets-dashboard-lb' did not receive an external IP within ${TIMEOUT}s"
              kubectl get svc secrets-dashboard-lb -n "$NAMESPACE" -o wide 2>/dev/null || true
              exit 1
            fi
            DASHBOARD_URL="http://${DASHBOARD_IP}"
            echo "DASHBOARD_URL=$DASHBOARD_URL" >> "$GITHUB_ENV"
          fi

          # HTTP connectivity test (with retries — cert may still be provisioning)
          RETRY_TIMEOUT=300
          RETRY_INTERVAL=10
          ELAPSED=0
          HTTP_STATUS=""
          # Try HTTP first if HTTPS fails (cert may still be provisioning)
          TEST_URL="${DASHBOARD_URL}"
          while [ "$ELAPSED" -lt "$RETRY_TIMEOUT" ]; do
            HTTP_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "${TEST_URL}" --max-time 10 || true)
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "HTTP connectivity test passed — received status 200 from ${TEST_URL}"
              break
            fi
            # If HTTPS is failing, try HTTP as fallback
            if [ "$ELAPSED" -ge 60 ] && [[ "${TEST_URL}" == https://* ]]; then
              HTTP_FALLBACK="http://${TEST_URL#https://}"
              FALLBACK_STATUS=$(curl -sk -o /dev/null -w "%{http_code}" "${HTTP_FALLBACK}" --max-time 10 || true)
              if [ "$FALLBACK_STATUS" = "200" ]; then
                echo "HTTP fallback test passed — received status 200 from ${HTTP_FALLBACK} (cert still provisioning)"
                HTTP_STATUS="200"
                break
              fi
            fi
            echo "Dashboard returned HTTP ${HTTP_STATUS}, retrying... (${ELAPSED}s/${RETRY_TIMEOUT}s)"
            sleep "$RETRY_INTERVAL"
            ELAPSED=$((ELAPSED + RETRY_INTERVAL))
          done
          if [ "$HTTP_STATUS" != "200" ]; then
            echo "::error::HTTP test returned status ${HTTP_STATUS} from ${DASHBOARD_URL} (expected 200)"
            exit 1
          fi

          echo "Phase 8 complete — dashboard is accessible at ${DASHBOARD_URL}"

      # Write Job Summary
      - name: Write Job Summary
        run: |
          set -euo pipefail

          # Determine dashboard URL for summary
          SUMMARY_URL="${DASHBOARD_URL:-http://${DASHBOARD_IP:-N/A}}"

          # Extract sslip.io hostname if Ingress was created
          SSLIP_HOST=$(kubectl get ingress secrets-dashboard-sslip-ingress -n "${NAMESPACE}" -o jsonpath='{.spec.rules[0].host}' 2>/dev/null || true)
          if [ -n "$SSLIP_HOST" ]; then
            TLS_HOST=$(kubectl get ingress secrets-dashboard-sslip-ingress -n "${NAMESPACE}" -o jsonpath='{.spec.tls[0].hosts[0]}' 2>/dev/null || true)
            if [ -n "$TLS_HOST" ]; then
              SUMMARY_URL="https://${SSLIP_HOST}"
            else
              SUMMARY_URL="http://${SSLIP_HOST}"
            fi
          fi

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ✅ Secrets Demo Deployment Complete

          ### Cluster Information
          | Field | Value |
          |---|---|
          | Cluster Name | \`${CLUSTER_NAME}\` |
          | Namespace | \`${NAMESPACE}\` |
          | Environment | \`${ENVIRONMENT}\` |

          ### Deployed Services
          | Service | Endpoint |
          |---|---|
          | Redis | \`redis.${NAMESPACE}.svc.cluster.local:6379\` |
          | PostgreSQL | \`postgres.${NAMESPACE}.svc.cluster.local:5432\` |
          | Vault Injector | \`vault-injector-svc.tkg-packages.svc.cluster.local:443\` |
          | Dashboard | ${SUMMARY_URL} |

          ### Secret Store Integration
          | Resource | Status |
          |---|---|
          | KeyValueSecret: redis-creds | ✅ Created |
          | KeyValueSecret: postgres-creds | ✅ Created |
          | ServiceAccount: internal-app | ✅ Created |
          | Vault Injector | ✅ Running |

          ### Container Image
          \`${CONTAINER_REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}\`
          EOF
          echo "Job summary written"

      # Write Failure Summary
      - name: Write Failure Summary
        if: failure()
        run: |
          set -euo pipefail
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ❌ Secrets Demo Deployment Failed

          | Field | Value |
          |---|---|
          | Cluster Name | \`${CLUSTER_NAME}\` |
          | Environment | \`${ENVIRONMENT}\` |
          | Namespace | \`${NAMESPACE}\` |

          ### Error Context
          The deployment failed during one of the provisioning phases. Check the workflow run logs for detailed error messages.

          **Troubleshooting steps:**
          1. Review the failed step in the workflow run logs
          2. Verify the VKS cluster from Deploy Cluster is running and accessible
          3. Check that the kubeconfig file exists and is valid
          4. Verify SECRET_STORE_IP and SUPERVISOR_NAMESPACE are set correctly
          5. Re-run the workflow — most steps are idempotent and will skip already-completed work
          EOF
          echo "Failure summary written"
