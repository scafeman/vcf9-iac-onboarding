# =============================================================================
# Deploy Knative — GitHub Actions Workflow
# =============================================================================
#
# This workflow deploys Knative Serving on an existing VKS cluster and
# provisions a full Asset Tracker with DSM PostgreSQL persistence, an API
# server, a serverless audit function, and a Next.js dashboard.
#
# The workflow calls the deploy script directly with all env vars set from
# workflow inputs and secrets, matching the pattern used by deploy-ha-vm-app.
#
# Prerequisites:
#   - Deploy Cluster must have completed successfully — a running VKS cluster
#     with a valid admin kubeconfig file is required.
#   - A self-hosted GitHub Actions runner labeled [self-hosted, vcf] with
#     network access to the VKS cluster API.
#   - VCF CLI installed on the runner for DSM provisioning.
#   - DSM infrastructure policy configured in the supervisor namespace.
#
# Triggers:
#   - workflow_dispatch: Manual trigger from the GitHub Actions UI
#   - repository_dispatch: API trigger with event type "deploy-knative"
#
# =============================================================================

name: Deploy Knative

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: "VKS cluster name (e.g., my-dev-project-01-clus-01)"
        required: true
        type: string
      supervisor_namespace:
        description: "Supervisor namespace for DSM provisioning (e.g., my-project-ns-xxxxx)"
        required: true
        type: string
      project_name:
        description: "VCF Project name (e.g., my-dev-project-01)"
        required: true
        type: string
      environment:
        description: "Environment label for the deployment"
        required: false
        type: string
        default: "demo"
      dsm_infra_policy:
        description: "DSM infrastructure policy name"
        required: false
        type: string
        default: "shared-dsm-01"
      dsm_storage_policy:
        description: "vSphere storage policy name for DSM"
        required: false
        type: string
        default: "NFS"
      dsm_cluster_name:
        description: "PostgresCluster resource name (default: pg-clus-01)"
        required: false
        type: string
        default: "pg-clus-01"
      postgres_db:
        description: "Database name (default: assetdb)"
        required: false
        type: string
        default: "assetdb"

  repository_dispatch:
    types: [deploy-knative]

jobs:
  deploy:
    name: Deploy Knative Serving
    runs-on: [self-hosted, vcf]
    environment: vcf-production
    defaults:
      run:
        shell: bash

    env:
      # --- Unified Parameter Resolution ---
      # Priority: workflow_dispatch input > client_payload > secret > default
      CLUSTER_NAME: ${{ github.event.inputs.cluster_name || github.event.client_payload.cluster_name }}
      ENVIRONMENT: ${{ github.event.inputs.environment || github.event.client_payload.environment || 'demo' }}
      KUBECONFIG_PATH: ${{ github.event.client_payload.kubeconfig_path || secrets.KUBECONFIG_PATH || '' }}

      # --- Supervisor Namespace ---
      SUPERVISOR_NAMESPACE: ${{ github.event.inputs.supervisor_namespace || github.event.client_payload.supervisor_namespace || secrets.SUPERVISOR_NAMESPACE }}
      PROJECT_NAME: ${{ github.event.inputs.project_name || github.event.client_payload.project_name || secrets.PROJECT_NAME }}

      # --- DSM Configuration ---
      DSM_INFRA_POLICY: ${{ github.event.inputs.dsm_infra_policy || github.event.client_payload.dsm_infra_policy || secrets.DSM_INFRA_POLICY || 'shared-dsm-01' }}
      DSM_STORAGE_POLICY: ${{ github.event.inputs.dsm_storage_policy || github.event.client_payload.dsm_storage_policy || secrets.DSM_STORAGE_POLICY || 'NFS' }}
      DSM_CLUSTER_NAME: ${{ github.event.inputs.dsm_cluster_name || github.event.client_payload.dsm_cluster_name || secrets.DSM_CLUSTER_NAME || 'pg-clus-01' }}
      DSM_VM_CLASS: ${{ github.event.client_payload.dsm_vm_class || secrets.DSM_VM_CLASS || 'best-effort-large' }}
      DSM_STORAGE_SPACE: ${{ github.event.client_payload.dsm_storage_space || secrets.DSM_STORAGE_SPACE || '20Gi' }}
      POSTGRES_VERSION: ${{ github.event.client_payload.postgres_version || secrets.POSTGRES_VERSION || '17.7+vmware.v9.0.2.0' }}
      POSTGRES_REPLICAS: ${{ github.event.client_payload.postgres_replicas || secrets.POSTGRES_REPLICAS || '0' }}
      POSTGRES_DB: ${{ github.event.inputs.postgres_db || github.event.client_payload.postgres_db || secrets.POSTGRES_DB || 'assetdb' }}
      ADMIN_PASSWORD_SECRET_NAME: ${{ github.event.client_payload.admin_password_secret_name || secrets.ADMIN_PASSWORD_SECRET_NAME || 'admin-pw-pg-clus-01' }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}
      DSM_MAINTENANCE_WINDOW_DAY: ${{ github.event.client_payload.dsm_maintenance_window_day || 'SATURDAY' }}
      DSM_MAINTENANCE_WINDOW_TIME: ${{ github.event.client_payload.dsm_maintenance_window_time || '04:59' }}
      DSM_MAINTENANCE_WINDOW_DURATION: ${{ github.event.client_payload.dsm_maintenance_window_duration || '6h0m0s' }}
      DSM_SHARED_MEMORY: ${{ github.event.client_payload.dsm_shared_memory || '64Mi' }}

      # --- Knative Configuration ---
      KNATIVE_SERVING_VERSION: ${{ github.event.client_payload.knative_serving_version || secrets.KNATIVE_SERVING_VERSION || '1.21.2' }}
      NET_CONTOUR_VERSION: ${{ github.event.client_payload.net_contour_version || secrets.NET_CONTOUR_VERSION || '1.21.1' }}
      KNATIVE_NAMESPACE: ${{ github.event.client_payload.knative_namespace || 'knative-serving' }}
      DEMO_NAMESPACE: ${{ github.event.client_payload.demo_namespace || 'knative-demo' }}
      SCALE_TO_ZERO_GRACE_PERIOD: ${{ github.event.client_payload.scale_to_zero_grace_period || '30s' }}

      # --- Application Parameters ---
      CONTAINER_REGISTRY: ${{ github.event.client_payload.container_registry || secrets.CONTAINER_REGISTRY || 'scafeman' }}
      IMAGE_TAG: ${{ github.event.client_payload.image_tag || secrets.IMAGE_TAG || 'latest' }}

      # --- Timeouts and Polling ---
      KNATIVE_TIMEOUT: ${{ github.event.client_payload.knative_timeout || '300' }}
      POD_TIMEOUT: ${{ github.event.client_payload.pod_timeout || '300' }}
      LB_TIMEOUT: ${{ github.event.client_payload.lb_timeout || '300' }}
      DSM_TIMEOUT: ${{ github.event.client_payload.dsm_timeout || secrets.DSM_TIMEOUT || '1800' }}
      POLL_INTERVAL: ${{ github.event.client_payload.poll_interval || '10' }}

      # --- Secrets only (truly sensitive — cannot be passed via client_payload) ---
      VCF_API_TOKEN: ${{ secrets.VCF_API_TOKEN }}
      VCFA_ENDPOINT: ${{ github.event.client_payload.vcfa_endpoint || secrets.VCFA_ENDPOINT }}
      TENANT_NAME: ${{ github.event.client_payload.tenant_name || secrets.TENANT_NAME }}

      # --- Static Configuration ---
      CONTEXT_NAME: knative-deploy

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Create VCF CLI Context (needed for kubeconfig retrieval and DSM provisioning)
      - name: Create VCF CLI Context
        run: |
          set -euo pipefail
          # Clear any stale kubeconfig references that cause VCF CLI errors
          unset KUBECONFIG 2>/dev/null || true
          rm -f ~/.kube/config 2>/dev/null || true

          vcf context delete "$CONTEXT_NAME" --yes 2>/dev/null || true
          sleep 1
          vcf context create "$CONTEXT_NAME" \
            --endpoint "https://$VCFA_ENDPOINT" \
            --type cci \
            --tenant-name "$TENANT_NAME" \
            --api-token "$VCF_API_TOKEN" \
            --set-current 2>/dev/null || echo "Context '$CONTEXT_NAME' already exists, reusing..."

          # Switch to the namespace context for the supervisor namespace
          NAMESPACE_CONTEXT=$(vcf context list 2>&1 | grep "${CONTEXT_NAME}:.*${SUPERVISOR_NAMESPACE}" | awk '{print $1}' | head -1 || true)
          if [ -z "$NAMESPACE_CONTEXT" ]; then
            PROJECT_PATTERN=$(echo "$CLUSTER_NAME" | sed 's/-clus-[0-9]*$//')
            NAMESPACE_CONTEXT=$(vcf context list 2>&1 | grep "${CONTEXT_NAME}:.*${PROJECT_PATTERN}" | awk '{print $1}' | head -1 || true)
          fi
          if [ -n "$NAMESPACE_CONTEXT" ]; then
            vcf context use "$NAMESPACE_CONTEXT"
            echo "VCF CLI context ready, switched to '$NAMESPACE_CONTEXT'"
          else
            echo "::error::Could not find a namespace context for '${SUPERVISOR_NAMESPACE}' under context '${CONTEXT_NAME}'"
            exit 1
          fi

      # Setup Kubeconfig
      - name: Setup Kubeconfig
        run: |
          set -euo pipefail
          if [ -z "${KUBECONFIG_PATH:-}" ]; then
            KUBECONFIG_PATH="./kubeconfig-${CLUSTER_NAME}.yaml"
          fi

          # If the kubeconfig file doesn't exist, retrieve it via VCF CLI
          if [ ! -f "$KUBECONFIG_PATH" ]; then
            echo "Kubeconfig not found at '$KUBECONFIG_PATH', retrieving via VCF CLI..."
            vcf context delete "$CONTEXT_NAME" --yes 2>/dev/null || true
            vcf context create "$CONTEXT_NAME" \
              --endpoint "https://$VCFA_ENDPOINT" \
              --type cci \
              --tenant-name "$TENANT_NAME" \
              --api-token "$VCF_API_TOKEN" \
              --set-current

            # Find and switch to the namespace context matching the SUPERVISOR_NAMESPACE
            NAMESPACE_CONTEXT=$(vcf context list 2>&1 | grep "${CONTEXT_NAME}:.*${SUPERVISOR_NAMESPACE}" | awk '{print $1}' | head -1 || true)
            if [ -z "$NAMESPACE_CONTEXT" ]; then
              PROJECT_PATTERN=$(echo "$CLUSTER_NAME" | sed 's/-clus-[0-9]*$//')
              NAMESPACE_CONTEXT=$(vcf context list 2>&1 | grep "${CONTEXT_NAME}:.*${PROJECT_PATTERN}" | awk '{print $1}' | head -1 || true)
            fi
            if [ -z "$NAMESPACE_CONTEXT" ]; then
              echo "::error::Could not find a namespace context for supervisor namespace '${SUPERVISOR_NAMESPACE}' under context '${CONTEXT_NAME}'. Ensure Deploy Cluster has completed."
              exit 1
            fi
            echo "Found namespace context: $NAMESPACE_CONTEXT"
            vcf context use "$NAMESPACE_CONTEXT"

            # Retrieve the admin kubeconfig
            vcf cluster kubeconfig get "$CLUSTER_NAME" --admin --export-file "$KUBECONFIG_PATH"
            echo "Kubeconfig retrieved via VCF CLI"
          fi

          if [ ! -f "$KUBECONFIG_PATH" ]; then
            echo "::error::Kubeconfig file not found at '$KUBECONFIG_PATH'. Ensure Deploy Cluster has completed and the kubeconfig file exists."
            exit 1
          fi

          export KUBECONFIG="$KUBECONFIG_PATH"
          echo "KUBECONFIG=$KUBECONFIG_PATH" >> "$GITHUB_ENV"
          echo "KUBECONFIG_FILE=$KUBECONFIG_PATH" >> "$GITHUB_ENV"

          # Switch to the admin context (the file may contain multiple contexts)
          ADMIN_CONTEXT="${CLUSTER_NAME}-admin@${CLUSTER_NAME}"
          if kubectl config get-contexts "$ADMIN_CONTEXT" --kubeconfig="$KUBECONFIG_PATH" >/dev/null 2>&1; then
            kubectl config use-context "$ADMIN_CONTEXT" --kubeconfig="$KUBECONFIG_PATH"
            echo "Switched to admin context '$ADMIN_CONTEXT'"
          fi

          if ! kubectl get namespaces >/dev/null 2>&1; then
            echo "::error::Unable to reach cluster '${CLUSTER_NAME}'"
            exit 1
          fi
          echo "Kubeconfig set and cluster '${CLUSTER_NAME}' is reachable"

      # Phase 2: Install Knative Serving CRDs
      - name: Install Knative CRDs
        run: |
          set -euo pipefail
          KNATIVE_CRDS_URL="https://github.com/knative/serving/releases/download/knative-v${KNATIVE_SERVING_VERSION}/serving-crds.yaml"
          if ! kubectl apply -f "$KNATIVE_CRDS_URL"; then
            echo "::error::Failed to apply Knative Serving CRDs"
            exit 1
          fi
          ELAPSED=0
          while [ "$ELAPSED" -lt "$KNATIVE_TIMEOUT" ]; do
            if kubectl wait --for=condition=Established \
              crd/services.serving.knative.dev crd/routes.serving.knative.dev \
              crd/configurations.serving.knative.dev crd/revisions.serving.knative.dev \
              --timeout=5s 2>/dev/null; then
              echo "Knative Serving CRDs installed and Established"
              break
            fi
            echo "Waiting for Knative CRDs... (${ELAPSED}s/${KNATIVE_TIMEOUT}s)"
            sleep "$POLL_INTERVAL"
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done
          if [ "$ELAPSED" -ge "$KNATIVE_TIMEOUT" ]; then
            echo "::error::Knative CRDs did not reach Established condition within ${KNATIVE_TIMEOUT}s"
            exit 1
          fi

      # Phase 3: Install Knative Serving Core
      - name: Install Knative Core
        run: |
          set -euo pipefail
          KNATIVE_CORE_URL="https://github.com/knative/serving/releases/download/knative-v${KNATIVE_SERVING_VERSION}/serving-core.yaml"
          kubectl apply -f "$KNATIVE_CORE_URL" || true
          ELAPSED=0
          while [ "$ELAPSED" -lt "$KNATIVE_TIMEOUT" ]; do
            if kubectl wait --for=condition=Available deployment --all \
              -n "$KNATIVE_NAMESPACE" --timeout=5s 2>/dev/null; then
              echo "Knative Serving Core installed and Available"
              break
            fi
            echo "Waiting for Knative Core deployments... (${ELAPSED}s/${KNATIVE_TIMEOUT}s)"
            sleep "$POLL_INTERVAL"
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done
          if [ "$ELAPSED" -ge "$KNATIVE_TIMEOUT" ]; then
            echo "::error::Knative Core deployments did not reach Available condition"
            exit 1
          fi

      # Phase 4: Install net-contour Networking Plugin
      - name: Install net-contour Plugin
        run: |
          set -euo pipefail
          CONTOUR_URL="https://github.com/knative-extensions/net-contour/releases/download/knative-v${NET_CONTOUR_VERSION}/contour.yaml"
          NET_CONTOUR_URL="https://github.com/knative-extensions/net-contour/releases/download/knative-v${NET_CONTOUR_VERSION}/net-contour.yaml"
          kubectl apply -f "$CONTOUR_URL" || true
          kubectl apply -f "$NET_CONTOUR_URL" || true
          ELAPSED=0
          while [ "$ELAPSED" -lt "$KNATIVE_TIMEOUT" ]; do
            if kubectl wait --for=condition=Available \
              deployment/net-contour-controller -n "$KNATIVE_NAMESPACE" \
              --timeout=5s 2>/dev/null; then
              echo "net-contour networking plugin installed and Available"
              break
            fi
            echo "Waiting for net-contour controller... (${ELAPSED}s/${KNATIVE_TIMEOUT}s)"
            sleep "$POLL_INTERVAL"
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done
          if [ "$ELAPSED" -ge "$KNATIVE_TIMEOUT" ]; then
            echo "::error::net-contour controller did not reach Available condition"
            exit 1
          fi

      # Phase 5: Configure Knative Ingress
      - name: Configure Ingress
        run: |
          set -euo pipefail
          kubectl patch configmap/config-network \
            --namespace "$KNATIVE_NAMESPACE" \
            --type merge \
            -p '{"data":{"ingress-class":"contour.ingress.networking.knative.dev","external-domain-tls":"Disabled"}}' || {
            echo "::error::Failed to patch config-network ConfigMap"
            exit 1
          }
          echo "Knative ingress configured to use Contour"

      # Phase 6: Configure DNS with sslip.io
      - name: Configure DNS
        run: |
          set -euo pipefail
          ELAPSED=0
          while [ "$ELAPSED" -lt "$LB_TIMEOUT" ]; do
            ENVOY_LB_IP=$(kubectl get svc -n contour-external envoy \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -n "$ENVOY_LB_IP" ]; then
              echo "Envoy LoadBalancer IP: $ENVOY_LB_IP"
              echo "ENVOY_LB_IP=$ENVOY_LB_IP" >> "$GITHUB_ENV"
              break
            fi
            echo "Waiting for Envoy LoadBalancer IP... (${ELAPSED}s/${LB_TIMEOUT}s)"
            sleep "$POLL_INTERVAL"
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done
          if [ "$ELAPSED" -ge "$LB_TIMEOUT" ]; then
            echo "::error::Envoy LoadBalancer did not receive an external IP"
            exit 1
          fi
          kubectl patch configmap/config-domain \
            --namespace "$KNATIVE_NAMESPACE" \
            --type merge \
            -p "{\"data\":{\"${ENVOY_LB_IP}.sslip.io\":\"\"}}" || {
            echo "::error::Failed to patch config-domain ConfigMap"
            exit 1
          }
          echo "DNS configured: *.${ENVOY_LB_IP}.sslip.io"

      # Phase 7: DSM PostgresCluster Provisioning
      - name: Provision DSM PostgresCluster
        run: |
          set -euo pipefail
          vcf context delete "${CONTEXT_NAME}" --yes 2>/dev/null || true
          vcf context create "${CONTEXT_NAME}" \
            --endpoint "https://${VCFA_ENDPOINT}" \
            --type cci \
            --tenant-name "${TENANT_NAME}" \
            --api-token "${VCF_API_TOKEN}" \
            --set-current || {
            echo "::error::Failed to create VCF CLI context"
            exit 1
          }
          NS_CTX=$(vcf context list 2>&1 | grep "${CONTEXT_NAME}:.*${SUPERVISOR_NAMESPACE}" | awk '{print $1}' | head -1 || true)
          if [ -n "${NS_CTX}" ]; then
            vcf context use "${NS_CTX}" >/dev/null 2>&1 || true
          fi
          echo "VCF CLI context created and configured"
          echo "DSM PostgresCluster provisioning delegated to deploy script"

      # Phase 8: Deploy API Server
      - name: Deploy API Server
        run: |
          set -euo pipefail
          echo "API server deployment delegated to deploy script phases"
          echo "API server will be deployed as Kubernetes Deployment with ClusterIP Service"

      # Phase 9: Deploy Audit Function with DSM
      - name: Deploy Audit Function
        run: |
          set -euo pipefail
          echo "Audit function deployment with DSM PostgreSQL connection"
          echo "Knative Service asset-audit will be deployed with POSTGRES_* env vars"

      # Phase 10: Deploy RBAC and Dashboard
      - name: Deploy RBAC and Dashboard
        run: |
          set -euo pipefail
          echo "RBAC resources (ServiceAccount, Role, RoleBinding) and Dashboard deployment"
          echo "Dashboard will be deployed with serviceAccountName and API_HOST env var"

      # Phase 11: Verify Deployment
      - name: Verify Deployment
        run: |
          set -euo pipefail
          echo "Verification: API server healthz, audit function, scale-to-zero demo"

      # Run full deploy script (phases 1-11)
      - name: Run Deploy Script
        id: deploy
        run: |
          set -euo pipefail
          bash examples/deploy-knative/deploy-knative.sh 2>&1 | tee /tmp/deploy-knative.log
        env:
          KUBECONFIG_FILE: ${{ env.KUBECONFIG }}

      # Extract deployment details for job summary
      - name: Extract Deployment Details
        run: |
          set -euo pipefail
          # Extract dashboard IP from kubectl
          DASHBOARD_IP=$(kubectl get svc knative-dashboard -n "${DEMO_NAMESPACE}" -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "unknown")
          echo "DASHBOARD_IP=$DASHBOARD_IP" >> "$GITHUB_ENV"

          # Extract Envoy LB IP (Knative ingress)
          ENVOY_IP=$(kubectl get svc envoy -n contour-external -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "unknown")
          echo "ENVOY_IP=$ENVOY_IP" >> "$GITHUB_ENV"

          # Extract audit function URL
          AUDIT_URL=$(kubectl get ksvc asset-audit -n "${DEMO_NAMESPACE}" -o jsonpath='{.status.url}' 2>/dev/null || echo "unknown")
          echo "AUDIT_URL=$AUDIT_URL" >> "$GITHUB_ENV"

          # Extract DSM connection from deploy log
          DSM_CONNECTION=$(grep -oP 'DSM PostgreSQL connection: \K[^\s]+' /tmp/deploy-knative.log || echo "unknown")
          echo "DSM_CONNECTION=$DSM_CONNECTION" >> "$GITHUB_ENV"

      # Write Job Summary
      - name: Write Job Summary
        run: |
          set -euo pipefail
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ✅ Knative Asset Tracker Deployment Complete

          | Field | Value |
          |---|---|
          | Cluster | \`${CLUSTER_NAME}\` |
          | Supervisor Namespace | \`${SUPERVISOR_NAMESPACE}\` |
          | App Namespace | \`${DEMO_NAMESPACE}\` |
          | Knative Serving | v${KNATIVE_SERVING_VERSION} |
          | net-contour | v${NET_CONTOUR_VERSION} |
          | DSM Cluster | \`${DSM_CLUSTER_NAME}\` |
          | Environment | ${ENVIRONMENT} |
          | Dashboard | http://${DASHBOARD_IP} |

          ### Deployed Services
          | Service | Endpoint |
          |---|---|
          | Dashboard | http://${DASHBOARD_IP} |
          | DSM PostgreSQL | \`${DSM_CONNECTION}\` |
          | API Server | \`knative-api-server.${DEMO_NAMESPACE}.svc.cluster.local:3001\` |
          | Audit Function (Knative) | ${AUDIT_URL} |
          | Knative Ingress (Envoy) | \`${ENVOY_IP}\` |
          | DNS Domain | \`${ENVOY_IP}.sslip.io\` |

          ### Container Images
          | Image | Tag |
          |---|---|
          | \`${CONTAINER_REGISTRY}/knative-api\` | \`${IMAGE_TAG}\` |
          | \`${CONTAINER_REGISTRY}/knative-audit\` | \`${IMAGE_TAG}\` |
          | \`${CONTAINER_REGISTRY}/knative-dashboard\` | \`${IMAGE_TAG}\` |
          EOF

      # Write Failure Summary (if: failure())
      - name: Write Failure Summary
        if: failure()
        run: |
          set -euo pipefail
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ❌ Knative Asset Tracker Deployment Failed

          | Field | Value |
          |---|---|
          | Cluster | \`${CLUSTER_NAME}\` |
          | Supervisor Namespace | \`${SUPERVISOR_NAMESPACE}\` |
          | DSM Cluster | \`${DSM_CLUSTER_NAME}\` |
          | Environment | ${ENVIRONMENT} |
          | Error | Check the failed step above for details |

          **Troubleshooting steps:**
          1. Review the failed step in the workflow run logs
          2. Check cluster connectivity: \`kubectl get namespaces\`
          3. Check Knative Serving: \`kubectl get pods -n knative-serving\`
          4. Check DSM PostgresCluster: \`kubectl get postgrescluster -n ${SUPERVISOR_NAMESPACE}\`
          5. Check demo namespace: \`kubectl get pods -n ${DEMO_NAMESPACE}\`
          6. Re-run the workflow — all steps are idempotent
          EOF
