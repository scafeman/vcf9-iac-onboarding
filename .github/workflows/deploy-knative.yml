# =============================================================================
# Deploy Knative — GitHub Actions Workflow
# =============================================================================
#
# This workflow deploys Knative Serving on an existing VKS cluster and
# provisions a serverless audit function with a Next.js dashboard.
# Each provisioning phase is implemented as individual named workflow steps
# with inline bash commands.
#
# Prerequisites:
#   - Deploy Cluster must have completed successfully — a running VKS cluster
#     with a valid admin kubeconfig file is required.
#   - A self-hosted GitHub Actions runner labeled [self-hosted, vcf] with
#     network access to the VKS cluster API.
#
# Triggers:
#   - workflow_dispatch: Manual trigger from the GitHub Actions UI
#   - repository_dispatch: API trigger with event type "deploy-knative"
#
# =============================================================================

name: Deploy Knative

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: "VKS cluster name (e.g., my-dev-project-01-clus-01)"
        required: true
        type: string
      environment:
        description: "Environment label for the deployment"
        required: false
        type: string
        default: "demo"

  repository_dispatch:
    types: [deploy-knative]

jobs:
  deploy:
    name: Deploy Knative Serving
    runs-on: [self-hosted, vcf]
    environment: vcf-production
    defaults:
      run:
        shell: bash

    env:
      # --- Unified Parameter Resolution ---
      # Priority: workflow_dispatch input > client_payload > secret > default
      CLUSTER_NAME: ${{ github.event.inputs.cluster_name || github.event.client_payload.cluster_name }}
      ENVIRONMENT: ${{ github.event.inputs.environment || github.event.client_payload.environment || 'demo' }}
      KUBECONFIG_PATH: ${{ github.event.client_payload.kubeconfig_path || secrets.KUBECONFIG_PATH || '' }}
      KNATIVE_SERVING_VERSION: ${{ github.event.client_payload.knative_serving_version || secrets.KNATIVE_SERVING_VERSION || '1.21.2' }}
      NET_CONTOUR_VERSION: ${{ github.event.client_payload.net_contour_version || secrets.NET_CONTOUR_VERSION || '1.21.1' }}
      KNATIVE_NAMESPACE: ${{ github.event.client_payload.knative_namespace || secrets.KNATIVE_NAMESPACE || 'knative-serving' }}
      DEMO_NAMESPACE: ${{ github.event.client_payload.demo_namespace || secrets.DEMO_NAMESPACE || 'knative-demo' }}
      CONTAINER_REGISTRY: ${{ github.event.client_payload.container_registry || secrets.CONTAINER_REGISTRY || 'scafeman' }}
      IMAGE_TAG: ${{ github.event.client_payload.image_tag || secrets.IMAGE_TAG || 'latest' }}
      SCALE_TO_ZERO_GRACE_PERIOD: ${{ github.event.client_payload.scale_to_zero_grace_period || secrets.SCALE_TO_ZERO_GRACE_PERIOD || '30s' }}
      KNATIVE_TIMEOUT: ${{ github.event.client_payload.knative_timeout || secrets.KNATIVE_TIMEOUT || '300' }}
      POD_TIMEOUT: ${{ github.event.client_payload.pod_timeout || secrets.POD_TIMEOUT || '300' }}
      LB_TIMEOUT: ${{ github.event.client_payload.lb_timeout || secrets.LB_TIMEOUT || '300' }}
      POLL_INTERVAL: ${{ github.event.client_payload.poll_interval || secrets.POLL_INTERVAL || '10' }}

      # --- Secrets only (truly sensitive — cannot be passed via client_payload) ---
      VCF_API_TOKEN: ${{ secrets.VCF_API_TOKEN }}
      VCFA_ENDPOINT: ${{ github.event.client_payload.vcfa_endpoint || secrets.VCFA_ENDPOINT }}
      TENANT_NAME: ${{ github.event.client_payload.tenant_name || secrets.TENANT_NAME }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Phase 1: Retrieve and Setup Kubeconfig
      - name: Setup Kubeconfig
        run: |
          set -euo pipefail
          if [ -z "$KUBECONFIG_PATH" ]; then
            KUBECONFIG_PATH="./kubeconfig-${CLUSTER_NAME}.yaml"
          fi

          if [ ! -f "$KUBECONFIG_PATH" ]; then
            echo "::error::Kubeconfig file not found at '$KUBECONFIG_PATH'. Ensure Deploy Cluster has completed and the kubeconfig file exists."
            exit 1
          fi

          export KUBECONFIG="$KUBECONFIG_PATH"
          echo "KUBECONFIG=$KUBECONFIG_PATH" >> "$GITHUB_ENV"

          if ! kubectl get namespaces; then
            echo "::error::Unable to reach cluster '${CLUSTER_NAME}' using kubeconfig at '${KUBECONFIG_PATH}'. Verify the cluster is running and the kubeconfig is valid."
            exit 1
          fi
          echo "Kubeconfig set and cluster '${CLUSTER_NAME}' is reachable"

      # Phase 2: Install Knative Serving CRDs
      - name: Install Knative CRDs
        run: |
          set -euo pipefail
          KNATIVE_CRDS_URL="https://github.com/knative/serving/releases/download/knative-v${KNATIVE_SERVING_VERSION}/serving-crds.yaml"

          if ! kubectl apply -f "$KNATIVE_CRDS_URL"; then
            echo "::error::Failed to apply Knative Serving CRDs from ${KNATIVE_CRDS_URL}"
            exit 1
          fi

          ELAPSED=0
          while [ "$ELAPSED" -lt "$KNATIVE_TIMEOUT" ]; do
            if kubectl wait --for=condition=Established \
              crd/services.serving.knative.dev \
              crd/routes.serving.knative.dev \
              crd/configurations.serving.knative.dev \
              crd/revisions.serving.knative.dev \
              --timeout=5s 2>/dev/null; then
              echo "Knative Serving CRDs installed and Established"
              break
            fi
            echo "Waiting for Knative CRDs to be Established... (${ELAPSED}s/${KNATIVE_TIMEOUT}s)"
            sleep "$POLL_INTERVAL"
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done

          if [ "$ELAPSED" -ge "$KNATIVE_TIMEOUT" ]; then
            echo "::error::Knative CRDs did not reach Established condition within ${KNATIVE_TIMEOUT}s"
            exit 1
          fi

      # Phase 3: Install Knative Serving Core
      - name: Install Knative Core
        run: |
          set -euo pipefail
          KNATIVE_CORE_URL="https://github.com/knative/serving/releases/download/knative-v${KNATIVE_SERVING_VERSION}/serving-core.yaml"

          if ! kubectl apply -f "$KNATIVE_CORE_URL"; then
            echo "::error::Failed to apply Knative Serving Core from ${KNATIVE_CORE_URL}"
            exit 1
          fi

          ELAPSED=0
          while [ "$ELAPSED" -lt "$KNATIVE_TIMEOUT" ]; do
            if kubectl wait --for=condition=Available deployment --all \
              -n "$KNATIVE_NAMESPACE" --timeout=5s 2>/dev/null; then
              echo "Knative Serving Core installed and Available"
              break
            fi
            echo "Waiting for Knative Core deployments... (${ELAPSED}s/${KNATIVE_TIMEOUT}s)"
            sleep "$POLL_INTERVAL"
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done

          if [ "$ELAPSED" -ge "$KNATIVE_TIMEOUT" ]; then
            echo "::error::Knative Core deployments did not reach Available condition within ${KNATIVE_TIMEOUT}s"
            exit 1
          fi

      # Phase 4: Install net-contour Networking Plugin
      - name: Install net-contour Plugin
        run: |
          set -euo pipefail
          NET_CONTOUR_URL="https://github.com/knative-extensions/net-contour/releases/download/knative-v${NET_CONTOUR_VERSION}/net-contour.yaml"

          if ! kubectl apply -f "$NET_CONTOUR_URL"; then
            echo "::error::Failed to apply net-contour plugin from ${NET_CONTOUR_URL}"
            exit 1
          fi

          ELAPSED=0
          while [ "$ELAPSED" -lt "$KNATIVE_TIMEOUT" ]; do
            if kubectl wait --for=condition=Available \
              deployment/net-contour-controller -n "$KNATIVE_NAMESPACE" \
              --timeout=5s 2>/dev/null; then
              echo "net-contour networking plugin installed and Available"
              break
            fi
            echo "Waiting for net-contour controller... (${ELAPSED}s/${KNATIVE_TIMEOUT}s)"
            sleep "$POLL_INTERVAL"
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done

          if [ "$ELAPSED" -ge "$KNATIVE_TIMEOUT" ]; then
            echo "::error::net-contour controller did not reach Available condition within ${KNATIVE_TIMEOUT}s"
            exit 1
          fi

      # Phase 5: Configure Knative Ingress
      - name: Configure Ingress
        run: |
          set -euo pipefail
          kubectl patch configmap/config-network \
            --namespace "$KNATIVE_NAMESPACE" \
            --type merge \
            -p '{"data":{"ingress-class":"contour.ingress.networking.knative.dev","external-domain-tls":"Disabled"}}' || {
            echo "::error::Failed to patch config-network ConfigMap"
            exit 1
          }
          echo "Knative ingress configured to use Contour"

      # Phase 6: Configure DNS with sslip.io
      - name: Configure DNS
        run: |
          set -euo pipefail
          ELAPSED=0
          while [ "$ELAPSED" -lt "$LB_TIMEOUT" ]; do
            ENVOY_LB_IP=$(kubectl get svc -n contour-external envoy \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -n "$ENVOY_LB_IP" ]; then
              echo "Envoy LoadBalancer IP: $ENVOY_LB_IP"
              echo "ENVOY_LB_IP=$ENVOY_LB_IP" >> "$GITHUB_ENV"
              break
            fi
            echo "Waiting for Envoy LoadBalancer IP... (${ELAPSED}s/${LB_TIMEOUT}s)"
            sleep "$POLL_INTERVAL"
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done

          if [ "$ELAPSED" -ge "$LB_TIMEOUT" ]; then
            echo "::error::Envoy LoadBalancer did not receive an external IP within ${LB_TIMEOUT}s"
            exit 1
          fi

          kubectl patch configmap/config-domain \
            --namespace "$KNATIVE_NAMESPACE" \
            --type merge \
            -p "{\"data\":{\"${ENVOY_LB_IP}.sslip.io\":\"\"}}" || {
            echo "::error::Failed to patch config-domain ConfigMap with sslip.io domain"
            exit 1
          }
          echo "DNS configured: *.${ENVOY_LB_IP}.sslip.io"

      # Phase 7: Deploy Audit Function as Knative Service
      - name: Deploy Audit Function
        run: |
          set -euo pipefail
          AUDIT_IMAGE="${CONTAINER_REGISTRY}/knative-audit:${IMAGE_TAG}"

          if kubectl get ns "$DEMO_NAMESPACE" >/dev/null 2>&1; then
            echo "Namespace '$DEMO_NAMESPACE' already exists"
          else
            kubectl create ns "$DEMO_NAMESPACE"
            echo "Namespace '$DEMO_NAMESPACE' created"
          fi

          cat <<EOF | kubectl apply -f -
          apiVersion: serving.knative.dev/v1
          kind: Service
          metadata:
            name: asset-audit
            namespace: ${DEMO_NAMESPACE}
            annotations:
              autoscaling.knative.dev/scale-to-zero-grace-period: "${SCALE_TO_ZERO_GRACE_PERIOD}"
          spec:
            template:
              spec:
                containers:
                  - image: ${AUDIT_IMAGE}
                    ports:
                      - containerPort: 8080
                    env:
                      - name: PORT
                        value: "8080"
          EOF

          ELAPSED=0
          while [ "$ELAPSED" -lt "$POD_TIMEOUT" ]; do
            READY=$(kubectl get ksvc asset-audit -n "$DEMO_NAMESPACE" \
              -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)
            if [ "$READY" = "True" ]; then
              echo "Knative Service 'asset-audit' is Ready"
              break
            fi
            echo "Waiting for Knative Service 'asset-audit'... (${ELAPSED}s/${POD_TIMEOUT}s)"
            sleep "$POLL_INTERVAL"
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done

          if [ "$ELAPSED" -ge "$POD_TIMEOUT" ]; then
            echo "::error::Knative Service 'asset-audit' did not reach Ready status within ${POD_TIMEOUT}s"
            exit 1
          fi

          AUDIT_FUNCTION_URL=$(kubectl get ksvc asset-audit -n "$DEMO_NAMESPACE" -o jsonpath='{.status.url}')
          echo "AUDIT_FUNCTION_URL=$AUDIT_FUNCTION_URL" >> "$GITHUB_ENV"
          echo "Audit function deployed: $AUDIT_FUNCTION_URL"

      # Phase 8: Deploy Dashboard
      - name: Deploy Dashboard
        run: |
          set -euo pipefail
          DASHBOARD_IMAGE="${CONTAINER_REGISTRY}/knative-dashboard:${IMAGE_TAG}"

          cat <<EOF | kubectl apply -f -
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: knative-dashboard
            namespace: ${DEMO_NAMESPACE}
            labels:
              app: knative-dashboard
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: knative-dashboard
            template:
              metadata:
                labels:
                  app: knative-dashboard
              spec:
                containers:
                  - name: dashboard
                    image: ${DASHBOARD_IMAGE}
                    ports:
                      - containerPort: 3000
                    env:
                      - name: API_HOST
                        value: "${AUDIT_FUNCTION_URL}"
          EOF

          cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Service
          metadata:
            name: knative-dashboard
            namespace: ${DEMO_NAMESPACE}
          spec:
            type: LoadBalancer
            selector:
              app: knative-dashboard
            ports:
              - name: http
                port: 80
                targetPort: 3000
                protocol: TCP
          EOF

          ELAPSED=0
          while [ "$ELAPSED" -lt "$POD_TIMEOUT" ]; do
            if kubectl get pods -n "$DEMO_NAMESPACE" -l app=knative-dashboard \
              --no-headers 2>/dev/null | grep -q "Running"; then
              echo "Dashboard pod is running"
              break
            fi
            echo "Waiting for Dashboard pod... (${ELAPSED}s/${POD_TIMEOUT}s)"
            sleep "$POLL_INTERVAL"
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done

          if [ "$ELAPSED" -ge "$POD_TIMEOUT" ]; then
            echo "::error::Dashboard pod did not reach Running state within ${POD_TIMEOUT}s"
            exit 1
          fi

          ELAPSED=0
          while [ "$ELAPSED" -lt "$LB_TIMEOUT" ]; do
            DASHBOARD_IP=$(kubectl get svc knative-dashboard -n "$DEMO_NAMESPACE" \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -n "$DASHBOARD_IP" ]; then
              echo "Dashboard LoadBalancer IP: $DASHBOARD_IP"
              echo "DASHBOARD_IP=$DASHBOARD_IP" >> "$GITHUB_ENV"
              break
            fi
            echo "Waiting for Dashboard LoadBalancer IP... (${ELAPSED}s/${LB_TIMEOUT}s)"
            sleep "$POLL_INTERVAL"
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done

          if [ "$ELAPSED" -ge "$LB_TIMEOUT" ]; then
            echo "::error::Dashboard LoadBalancer did not receive an external IP within ${LB_TIMEOUT}s"
            exit 1
          fi
          echo "Dashboard deployed: http://$DASHBOARD_IP"

      # Phase 9: Verification
      - name: Verify Deployment
        run: |
          set -euo pipefail
          AUDIT_RESPONSE=""
          ELAPSED=0
          while [ "$ELAPSED" -lt "$KNATIVE_TIMEOUT" ]; do
            AUDIT_RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
              -H "Content-Type: application/json" \
              -d "{\"action\":\"create\",\"asset_name\":\"test-server\",\"asset_id\":\"demo-001\",\"timestamp\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" \
              "$AUDIT_FUNCTION_URL" 2>/dev/null) || true
            if [ "$AUDIT_RESPONSE" = "200" ]; then
              break
            fi
            echo "Waiting for audit function to respond... (${ELAPSED}s/${KNATIVE_TIMEOUT}s)"
            sleep "$POLL_INTERVAL"
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done

          if [ "$AUDIT_RESPONSE" != "200" ]; then
            echo "::error::Audit function did not return HTTP 200 within ${KNATIVE_TIMEOUT}s (last status: ${AUDIT_RESPONSE})"
            exit 1
          fi
          echo "Audit function responded with HTTP 200"
          echo "Verification complete"

      # Write Job Summary
      - name: Write Job Summary
        run: |
          set -euo pipefail
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ✅ Knative Serving Deployment Complete

          | Field | Value |
          |---|---|
          | Cluster | ${CLUSTER_NAME} |
          | Knative Serving | v${KNATIVE_SERVING_VERSION} |
          | net-contour | v${NET_CONTOUR_VERSION} |
          | Ingress IP | ${ENVOY_LB_IP} |
          | Domain | ${ENVOY_LB_IP}.sslip.io |
          | Audit Function | ${AUDIT_FUNCTION_URL} |
          | Dashboard | http://${DASHBOARD_IP} |
          | Environment | ${ENVIRONMENT} |
          EOF

      # Write Failure Summary (if: failure())
      - name: Write Failure Summary
        if: failure()
        run: |
          set -euo pipefail
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ❌ Knative Serving Deployment Failed

          | Field | Value |
          |---|---|
          | Cluster | ${CLUSTER_NAME} |
          | Environment | ${ENVIRONMENT} |
          | Error | Check the failed step above for details |
          EOF
