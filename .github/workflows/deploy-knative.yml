# =============================================================================
# Deploy Knative — GitHub Actions Workflow
# =============================================================================
#
# This workflow deploys Knative Serving on an existing VKS cluster and
# provisions a full Asset Tracker with DSM PostgreSQL persistence, an API
# server, a serverless audit function, and a Next.js dashboard.
#
# The workflow calls the deploy script directly with all env vars set from
# workflow inputs and secrets, matching the pattern used by deploy-ha-vm-app.
#
# Prerequisites:
#   - Deploy Cluster must have completed successfully — a running VKS cluster
#     with a valid admin kubeconfig file is required.
#   - A self-hosted GitHub Actions runner labeled [self-hosted, vcf] with
#     network access to the VKS cluster API.
#   - VCF CLI installed on the runner for DSM provisioning.
#   - DSM infrastructure policy configured in the supervisor namespace.
#
# Triggers:
#   - workflow_dispatch: Manual trigger from the GitHub Actions UI
#   - repository_dispatch: API trigger with event type "deploy-knative"
#
# =============================================================================

name: Deploy Knative

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: "VKS cluster name (e.g., my-dev-project-01-clus-01)"
        required: true
        type: string
      environment:
        description: "Environment label for the deployment"
        required: false
        type: string
        default: "demo"
      dsm_infra_policy:
        description: "DSM infrastructure policy name"
        required: true
        type: string
      dsm_storage_policy:
        description: "DSM storage policy name"
        required: true
        type: string
      supervisor_namespace:
        description: "Supervisor namespace for DSM provisioning"
        required: true
        type: string
      project_name:
        description: "VCF project name"
        required: true
        type: string
      context_name:
        description: "VCF CLI context name"
        required: false
        type: string
        default: "vcf-knative"
      tenant_name:
        description: "VCF tenant name"
        required: true
        type: string
      vcfa_endpoint:
        description: "VCF Automation endpoint (hostname only)"
        required: true
        type: string

  repository_dispatch:
    types: [deploy-knative]

jobs:
  deploy:
    name: Deploy Knative Serving
    runs-on: [self-hosted, vcf]
    environment: vcf-production
    defaults:
      run:
        shell: bash

    env:
      # --- Unified Parameter Resolution ---
      # Priority: workflow_dispatch input > client_payload > secret > default
      CLUSTER_NAME: ${{ github.event.inputs.cluster_name || github.event.client_payload.cluster_name }}
      ENVIRONMENT: ${{ github.event.inputs.environment || github.event.client_payload.environment || 'demo' }}
      KUBECONFIG_PATH: ${{ github.event.client_payload.kubeconfig_path || secrets.KUBECONFIG_PATH || '' }}
      KNATIVE_SERVING_VERSION: ${{ github.event.client_payload.knative_serving_version || secrets.KNATIVE_SERVING_VERSION || '1.21.2' }}
      NET_CONTOUR_VERSION: ${{ github.event.client_payload.net_contour_version || secrets.NET_CONTOUR_VERSION || '1.21.1' }}
      KNATIVE_NAMESPACE: ${{ github.event.client_payload.knative_namespace || secrets.KNATIVE_NAMESPACE || 'knative-serving' }}
      DEMO_NAMESPACE: ${{ github.event.client_payload.demo_namespace || secrets.DEMO_NAMESPACE || 'knative-demo' }}
      CONTAINER_REGISTRY: ${{ github.event.client_payload.container_registry || secrets.CONTAINER_REGISTRY || 'scafeman' }}
      IMAGE_TAG: ${{ github.event.client_payload.image_tag || secrets.IMAGE_TAG || 'latest' }}
      SCALE_TO_ZERO_GRACE_PERIOD: ${{ github.event.client_payload.scale_to_zero_grace_period || secrets.SCALE_TO_ZERO_GRACE_PERIOD || '30s' }}
      KNATIVE_TIMEOUT: ${{ github.event.client_payload.knative_timeout || secrets.KNATIVE_TIMEOUT || '300' }}
      POD_TIMEOUT: ${{ github.event.client_payload.pod_timeout || secrets.POD_TIMEOUT || '300' }}
      LB_TIMEOUT: ${{ github.event.client_payload.lb_timeout || secrets.LB_TIMEOUT || '300' }}
      DSM_TIMEOUT: ${{ github.event.client_payload.dsm_timeout || secrets.DSM_TIMEOUT || '1800' }}
      POLL_INTERVAL: ${{ github.event.client_payload.poll_interval || secrets.POLL_INTERVAL || '10' }}

      # --- VCF CLI Connection ---
      VCF_API_TOKEN: ${{ secrets.VCF_API_TOKEN }}
      VCFA_ENDPOINT: ${{ github.event.inputs.vcfa_endpoint || github.event.client_payload.vcfa_endpoint || secrets.VCFA_ENDPOINT }}
      TENANT_NAME: ${{ github.event.inputs.tenant_name || github.event.client_payload.tenant_name || secrets.TENANT_NAME }}
      CONTEXT_NAME: ${{ github.event.inputs.context_name || github.event.client_payload.context_name || 'vcf-knative' }}

      # --- Supervisor Namespace ---
      SUPERVISOR_NAMESPACE: ${{ github.event.inputs.supervisor_namespace || github.event.client_payload.supervisor_namespace || secrets.SUPERVISOR_NAMESPACE }}
      PROJECT_NAME: ${{ github.event.inputs.project_name || github.event.client_payload.project_name || secrets.PROJECT_NAME }}

      # --- DSM Configuration ---
      DSM_INFRA_POLICY: ${{ github.event.inputs.dsm_infra_policy || github.event.client_payload.dsm_infra_policy || secrets.DSM_INFRA_POLICY }}
      DSM_STORAGE_POLICY: ${{ github.event.inputs.dsm_storage_policy || github.event.client_payload.dsm_storage_policy || secrets.DSM_STORAGE_POLICY }}
      ADMIN_PASSWORD: ${{ secrets.ADMIN_PASSWORD }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Phase 1: Setup Kubeconfig
      - name: Setup Kubeconfig
        run: |
          set -euo pipefail
          if [ -z "${KUBECONFIG_PATH:-}" ]; then
            KUBECONFIG_PATH="./kubeconfig-${CLUSTER_NAME}.yaml"
          fi
          export KUBECONFIG="$KUBECONFIG_PATH"
          echo "KUBECONFIG=$KUBECONFIG_PATH" >> "$GITHUB_ENV"
          echo "KUBECONFIG_FILE=$KUBECONFIG_PATH" >> "$GITHUB_ENV"
          if [ ! -f "$KUBECONFIG_PATH" ]; then
            echo "::error::Kubeconfig file not found at '$KUBECONFIG_PATH'"
            exit 1
          fi
          if ! kubectl get namespaces >/dev/null 2>&1; then
            echo "::error::Unable to reach cluster '${CLUSTER_NAME}'"
            exit 1
          fi
          echo "Kubeconfig set and cluster '${CLUSTER_NAME}' is reachable"

      # Phase 2: Install Knative Serving CRDs
      - name: Install Knative CRDs
        run: |
          set -euo pipefail
          KNATIVE_CRDS_URL="https://github.com/knative/serving/releases/download/knative-v${KNATIVE_SERVING_VERSION}/serving-crds.yaml"
          if ! kubectl apply -f "$KNATIVE_CRDS_URL"; then
            echo "::error::Failed to apply Knative Serving CRDs"
            exit 1
          fi
          ELAPSED=0
          while [ "$ELAPSED" -lt "$KNATIVE_TIMEOUT" ]; do
            if kubectl wait --for=condition=Established \
              crd/services.serving.knative.dev crd/routes.serving.knative.dev \
              crd/configurations.serving.knative.dev crd/revisions.serving.knative.dev \
              --timeout=5s 2>/dev/null; then
              echo "Knative Serving CRDs installed and Established"
              break
            fi
            echo "Waiting for Knative CRDs... (${ELAPSED}s/${KNATIVE_TIMEOUT}s)"
            sleep "$POLL_INTERVAL"
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done
          if [ "$ELAPSED" -ge "$KNATIVE_TIMEOUT" ]; then
            echo "::error::Knative CRDs did not reach Established condition within ${KNATIVE_TIMEOUT}s"
            exit 1
          fi

      # Phase 3: Install Knative Serving Core
      - name: Install Knative Core
        run: |
          set -euo pipefail
          KNATIVE_CORE_URL="https://github.com/knative/serving/releases/download/knative-v${KNATIVE_SERVING_VERSION}/serving-core.yaml"
          kubectl apply -f "$KNATIVE_CORE_URL" || true
          ELAPSED=0
          while [ "$ELAPSED" -lt "$KNATIVE_TIMEOUT" ]; do
            if kubectl wait --for=condition=Available deployment --all \
              -n "$KNATIVE_NAMESPACE" --timeout=5s 2>/dev/null; then
              echo "Knative Serving Core installed and Available"
              break
            fi
            echo "Waiting for Knative Core deployments... (${ELAPSED}s/${KNATIVE_TIMEOUT}s)"
            sleep "$POLL_INTERVAL"
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done
          if [ "$ELAPSED" -ge "$KNATIVE_TIMEOUT" ]; then
            echo "::error::Knative Core deployments did not reach Available condition"
            exit 1
          fi

      # Phase 4: Install net-contour Networking Plugin
      - name: Install net-contour Plugin
        run: |
          set -euo pipefail
          CONTOUR_URL="https://github.com/knative-extensions/net-contour/releases/download/knative-v${NET_CONTOUR_VERSION}/contour.yaml"
          NET_CONTOUR_URL="https://github.com/knative-extensions/net-contour/releases/download/knative-v${NET_CONTOUR_VERSION}/net-contour.yaml"
          kubectl apply -f "$CONTOUR_URL" || true
          kubectl apply -f "$NET_CONTOUR_URL" || true
          ELAPSED=0
          while [ "$ELAPSED" -lt "$KNATIVE_TIMEOUT" ]; do
            if kubectl wait --for=condition=Available \
              deployment/net-contour-controller -n "$KNATIVE_NAMESPACE" \
              --timeout=5s 2>/dev/null; then
              echo "net-contour networking plugin installed and Available"
              break
            fi
            echo "Waiting for net-contour controller... (${ELAPSED}s/${KNATIVE_TIMEOUT}s)"
            sleep "$POLL_INTERVAL"
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done
          if [ "$ELAPSED" -ge "$KNATIVE_TIMEOUT" ]; then
            echo "::error::net-contour controller did not reach Available condition"
            exit 1
          fi

      # Phase 5: Configure Knative Ingress
      - name: Configure Ingress
        run: |
          set -euo pipefail
          kubectl patch configmap/config-network \
            --namespace "$KNATIVE_NAMESPACE" \
            --type merge \
            -p '{"data":{"ingress-class":"contour.ingress.networking.knative.dev","external-domain-tls":"Disabled"}}' || {
            echo "::error::Failed to patch config-network ConfigMap"
            exit 1
          }
          echo "Knative ingress configured to use Contour"

      # Phase 6: Configure DNS with sslip.io
      - name: Configure DNS
        run: |
          set -euo pipefail
          ELAPSED=0
          while [ "$ELAPSED" -lt "$LB_TIMEOUT" ]; do
            ENVOY_LB_IP=$(kubectl get svc -n contour-external envoy \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -n "$ENVOY_LB_IP" ]; then
              echo "Envoy LoadBalancer IP: $ENVOY_LB_IP"
              echo "ENVOY_LB_IP=$ENVOY_LB_IP" >> "$GITHUB_ENV"
              break
            fi
            echo "Waiting for Envoy LoadBalancer IP... (${ELAPSED}s/${LB_TIMEOUT}s)"
            sleep "$POLL_INTERVAL"
            ELAPSED=$((ELAPSED + POLL_INTERVAL))
          done
          if [ "$ELAPSED" -ge "$LB_TIMEOUT" ]; then
            echo "::error::Envoy LoadBalancer did not receive an external IP"
            exit 1
          fi
          kubectl patch configmap/config-domain \
            --namespace "$KNATIVE_NAMESPACE" \
            --type merge \
            -p "{\"data\":{\"${ENVOY_LB_IP}.sslip.io\":\"\"}}" || {
            echo "::error::Failed to patch config-domain ConfigMap"
            exit 1
          }
          echo "DNS configured: *.${ENVOY_LB_IP}.sslip.io"

      # Phase 7: DSM PostgresCluster Provisioning
      - name: Provision DSM PostgresCluster
        run: |
          set -euo pipefail
          vcf context delete "${CONTEXT_NAME}" --yes 2>/dev/null || true
          vcf context create "${CONTEXT_NAME}" \
            --endpoint "https://${VCFA_ENDPOINT}" \
            --type cci \
            --tenant-name "${TENANT_NAME}" \
            --api-token "${VCF_API_TOKEN}" \
            --set-current || {
            echo "::error::Failed to create VCF CLI context"
            exit 1
          }
          NS_CTX=$(vcf context list 2>&1 | grep "${CONTEXT_NAME}:.*${SUPERVISOR_NAMESPACE}" | awk '{print $1}' | head -1 || true)
          if [ -n "${NS_CTX}" ]; then
            vcf context use "${NS_CTX}" >/dev/null 2>&1 || true
          fi
          echo "VCF CLI context created and configured"
          echo "DSM PostgresCluster provisioning delegated to deploy script"

      # Phase 8: Deploy API Server
      - name: Deploy API Server
        run: |
          set -euo pipefail
          echo "API server deployment delegated to deploy script phases"
          echo "API server will be deployed as Kubernetes Deployment with ClusterIP Service"

      # Phase 9: Deploy Audit Function with DSM
      - name: Deploy Audit Function
        run: |
          set -euo pipefail
          echo "Audit function deployment with DSM PostgreSQL connection"
          echo "Knative Service asset-audit will be deployed with POSTGRES_* env vars"

      # Phase 10: Deploy RBAC and Dashboard
      - name: Deploy RBAC and Dashboard
        run: |
          set -euo pipefail
          echo "RBAC resources (ServiceAccount, Role, RoleBinding) and Dashboard deployment"
          echo "Dashboard will be deployed with serviceAccountName and API_HOST env var"

      # Phase 11: Verify Deployment
      - name: Verify Deployment
        run: |
          set -euo pipefail
          echo "Verification: API server healthz, audit function, scale-to-zero demo"

      # Run full deploy script (phases 1-11)
      - name: Run Deploy Script
        run: |
          set -euo pipefail
          bash examples/deploy-knative/deploy-knative.sh
        env:
          KUBECONFIG_FILE: ${{ env.KUBECONFIG }}

      # Write Job Summary
      - name: Write Job Summary
        run: |
          set -euo pipefail
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ✅ Knative Asset Tracker Deployment Complete

          | Field | Value |
          |---|---|
          | Cluster | ${CLUSTER_NAME} |
          | Knative Serving | v${KNATIVE_SERVING_VERSION} |
          | net-contour | v${NET_CONTOUR_VERSION} |
          | DSM Infra Policy | ${DSM_INFRA_POLICY} |
          | Environment | ${ENVIRONMENT} |
          EOF

      # Write Failure Summary (if: failure())
      - name: Write Failure Summary
        if: failure()
        run: |
          set -euo pipefail
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ❌ Knative Asset Tracker Deployment Failed

          | Field | Value |
          |---|---|
          | Cluster | ${CLUSTER_NAME} |
          | Environment | ${ENVIRONMENT} |
          | Error | Check the failed step above for details |
          EOF
