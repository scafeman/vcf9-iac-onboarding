# =============================================================================
# Deploy VKS Cluster — GitHub Actions Workflow
# =============================================================================
#
# This workflow deploys VCF 9 VKS infrastructure end-to-end using native
# GitHub Actions steps. Each provisioning phase (context creation, project
# and namespace provisioning, context bridge, cluster deployment, kubeconfig
# retrieval, and functional validation) is implemented as individual named
# workflow steps with inline VCF CLI and kubectl commands.
#
# Prerequisites:
#   - A self-hosted GitHub Actions runner with network access to the VCFA
#     endpoint on port 443. The runner must be labeled [self-hosted, vcf].
#   - Docker must be installed on the runner host so that the job-level
#     container directive can launch the VCF tooling image.
#   - The workflow uses the repository Dockerfile image (vcf9-dev:latest)
#     for VCF CLI + kubectl tooling. All run: steps execute inside this
#     container.
#
# Triggers:
#   - workflow_dispatch: Manual trigger from the GitHub Actions UI
#   - repository_dispatch: API trigger with event type "deploy-vks"
#
# =============================================================================

name: Deploy VKS Cluster

on:
  workflow_dispatch:
    inputs:
      project_name:
        description: "VCF Project name (e.g., my-dev-project-01)"
        required: true
        type: string
      cluster_name:
        description: "VKS cluster name (e.g., my-dev-project-01-clus-01)"
        required: true
        type: string
      namespace_prefix:
        description: "Supervisor Namespace prefix (e.g., my-dev-project-01-ns-)"
        required: true
        type: string
      environment:
        description: "Environment label for the deployment"
        required: false
        type: string
        default: "demo"
      vpc_name:
        description: "NSX VPC name (default: region-us1-a-default-vpc)"
        required: false
        type: string
        default: "region-us1-a-default-vpc"
      resource_class:
        description: "Namespace resource class (default: xxlarge)"
        required: false
        type: string
        default: "xxlarge"
      vm_class:
        description: "VM class for worker nodes (default: best-effort-large)"
        required: false
        type: string
        default: "best-effort-large"
      min_nodes:
        description: "Autoscaler minimum worker nodes (default: 2)"
        required: false
        type: string
        default: "2"
      max_nodes:
        description: "Autoscaler maximum worker nodes (default: 10)"
        required: false
        type: string
        default: "10"
      containerd_volume_size:
        description: "Containerd data volume size per node (default: 50Gi)"
        required: false
        type: string
        default: "50Gi"
      os_name:
        description: "Node OS image name: photon or ubuntu (default: photon)"
        required: false
        type: string
        default: "photon"
      os_version:
        description: "Node OS version (required for ubuntu, e.g., 24.04)"
        required: false
        type: string
      control_plane_replicas:
        description: "Control plane node count: 1 (default) or 3 (HA)"
        required: false
        type: string
        default: "1"
      node_pool_name:
        description: "Worker node pool name (default: node-pool-01)"
        required: false
        type: string
        default: "node-pool-01"
      trusted_ca_path:
        description: "Path to PEM CA certificate file for private registry trust (optional)"
        required: false
        type: string
        default: ""
      trusted_ca_secret_name:
        description: "Kubernetes Secret name for the trusted CA certificate (default: harbor-trusted-ca)"
        required: false
        type: string
        default: "harbor-trusted-ca"

  repository_dispatch:
    types: [deploy-vks]

jobs:
  deploy:
    name: Deploy VKS Cluster
    runs-on: [self-hosted, vcf]
    environment: vcf-production
    defaults:
      run:
        shell: bash

    env:
      # --- Unified Parameter Resolution ---
      # Priority: workflow_dispatch input > client_payload > secret > default
      PROJECT_NAME: ${{ github.event.inputs.project_name || github.event.client_payload.project_name }}
      CLUSTER_NAME: ${{ github.event.inputs.cluster_name || github.event.client_payload.cluster_name }}
      NAMESPACE_PREFIX: ${{ github.event.inputs.namespace_prefix || github.event.client_payload.namespace_prefix }}
      ENVIRONMENT: ${{ github.event.inputs.environment || github.event.client_payload.environment || 'demo' }}

      # --- Secrets only (truly sensitive — cannot be passed via client_payload) ---
      VCF_API_TOKEN: ${{ secrets.VCF_API_TOKEN }}
      VCFA_ENDPOINT: ${{ github.event.client_payload.vcfa_endpoint || secrets.VCFA_ENDPOINT }}
      TENANT_NAME: ${{ github.event.client_payload.tenant_name || secrets.TENANT_NAME }}

      # --- Infrastructure parameters (client_payload > secret > default) ---
      USER_IDENTITY: ${{ github.event.client_payload.user_identity || secrets.USER_IDENTITY }}
      CONTENT_LIBRARY_ID: ${{ github.event.client_payload.content_library_id || secrets.CONTENT_LIBRARY_ID }}
      ZONE_NAME: ${{ github.event.client_payload.zone_name || secrets.ZONE_NAME }}
      REGION_NAME: ${{ github.event.client_payload.region_name || secrets.REGION_NAME || 'region-us1-a' }}
      VPC_NAME: ${{ github.event.inputs.vpc_name || github.event.client_payload.vpc_name || secrets.VPC_NAME || 'region-us1-a-default-vpc' }}
      RESOURCE_CLASS: ${{ github.event.inputs.resource_class || github.event.client_payload.resource_class || secrets.RESOURCE_CLASS || 'xxlarge' }}
      K8S_VERSION: ${{ github.event.client_payload.k8s_version || secrets.K8S_VERSION || 'v1.33.6+vmware.1-fips' }}
      VM_CLASS: ${{ github.event.inputs.vm_class || github.event.client_payload.vm_class || secrets.VM_CLASS || 'best-effort-large' }}
      STORAGE_CLASS: ${{ github.event.client_payload.storage_class || secrets.STORAGE_CLASS || 'nfs' }}
      MIN_NODES: ${{ github.event.inputs.min_nodes || github.event.client_payload.min_nodes || secrets.MIN_NODES || '2' }}
      MAX_NODES: ${{ github.event.inputs.max_nodes || github.event.client_payload.max_nodes || secrets.MAX_NODES || '10' }}
      CONTAINERD_VOLUME_SIZE: ${{ github.event.inputs.containerd_volume_size || github.event.client_payload.containerd_volume_size || '50Gi' }}
      OS_NAME: ${{ github.event.inputs.os_name || github.event.client_payload.os_name || 'photon' }}
      OS_VERSION: ${{ github.event.inputs.os_version || github.event.client_payload.os_version || '' }}
      CONTROL_PLANE_REPLICAS: ${{ github.event.inputs.control_plane_replicas || github.event.client_payload.control_plane_replicas || '1' }}
      NODE_POOL_NAME: ${{ github.event.inputs.node_pool_name || github.event.client_payload.node_pool_name || 'node-pool-01' }}

      # --- Trusted CA Certificate (optional) ---
      TRUSTED_CA_PATH: ${{ github.event.inputs.trusted_ca_path || github.event.client_payload.trusted_ca_path || '' }}
      TRUSTED_CA_SECRET_NAME: ${{ github.event.inputs.trusted_ca_secret_name || github.event.client_payload.trusted_ca_secret_name || 'harbor-trusted-ca' }}

      # --- Autoscaler Tuning ---
      AUTOSCALER_SCALE_DOWN_UNNEEDED_TIME: ${{ github.event.client_payload.autoscaler_scale_down_unneeded_time || '5m' }}
      AUTOSCALER_SCALE_DOWN_DELAY_AFTER_ADD: ${{ github.event.client_payload.autoscaler_scale_down_delay_after_add || '5m' }}
      AUTOSCALER_SCALE_DOWN_UTILIZATION_THRESHOLD: ${{ github.event.client_payload.autoscaler_scale_down_utilization_threshold || '0.5' }}
      AUTOSCALER_SCALE_DOWN_DELAY_AFTER_DELETE: ${{ github.event.client_payload.autoscaler_scale_down_delay_after_delete || '10s' }}

      # --- Package Configuration (for Cluster Autoscaler) ---
      PACKAGE_NAMESPACE: ${{ github.event.client_payload.package_namespace || secrets.PACKAGE_NAMESPACE || 'tkg-packages' }}
      PACKAGE_REPO_URL: ${{ github.event.client_payload.package_repo_url || secrets.PACKAGE_REPO_URL || 'projects.packages.broadcom.com/vsphere/supervisor/vks-standard-packages/3.6.0-20260211/vks-standard-packages:3.6.0-20260211' }}
      PACKAGE_TIMEOUT: ${{ github.event.client_payload.package_timeout || secrets.PACKAGE_TIMEOUT || '600' }}

      # --- Static Configuration ---
      CONTEXT_NAME: gh-actions-deploy

    steps:
      # Checkout repo so www/ directory is available for web app image build
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Phase 1: Validate Inputs
      - name: Validate Inputs
        run: |
          set -euo pipefail
          # Trim leading/trailing whitespace from input parameters
          PROJECT_NAME="$(echo -n "$PROJECT_NAME" | xargs)"
          CLUSTER_NAME="$(echo -n "$CLUSTER_NAME" | xargs)"
          NAMESPACE_PREFIX="$(echo -n "$NAMESPACE_PREFIX" | xargs)"
          ENVIRONMENT="$(echo -n "$ENVIRONMENT" | xargs)"
          # Export trimmed values for subsequent steps
          echo "PROJECT_NAME=$PROJECT_NAME" >> "$GITHUB_ENV"
          echo "CLUSTER_NAME=$CLUSTER_NAME" >> "$GITHUB_ENV"
          echo "NAMESPACE_PREFIX=$NAMESPACE_PREFIX" >> "$GITHUB_ENV"
          echo "ENVIRONMENT=$ENVIRONMENT" >> "$GITHUB_ENV"
          MISSING=""
          for var in PROJECT_NAME CLUSTER_NAME NAMESPACE_PREFIX VCF_API_TOKEN VCFA_ENDPOINT TENANT_NAME USER_IDENTITY CONTENT_LIBRARY_ID ZONE_NAME; do
            if [ -z "${!var:-}" ]; then
              MISSING="${MISSING}  - ${var}\n"
            fi
          done
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required variables:"
            echo -e "$MISSING"
            exit 1
          fi
          echo "All required inputs validated successfully"
          echo "  PROJECT_NAME=$PROJECT_NAME"
          echo "  CLUSTER_NAME=$CLUSTER_NAME"
          echo "  NAMESPACE_PREFIX=$NAMESPACE_PREFIX"

      # Phase 2: Create VCF CLI Context
      - name: Create VCF CLI Context
        run: |
          set -euo pipefail
          vcf context delete "$CONTEXT_NAME" --yes 2>/dev/null || true
          if ! vcf context create "$CONTEXT_NAME" \
            --endpoint "https://$VCFA_ENDPOINT" \
            --type cci \
            --tenant-name "$TENANT_NAME" \
            --api-token "$VCF_API_TOKEN" \
            --set-current; then
            echo "::error::Failed to create VCF CLI context for endpoint '$VCFA_ENDPOINT' and tenant '$TENANT_NAME'"
            exit 1
          fi
          echo "VCF CLI context '$CONTEXT_NAME' created and activated"

      # Phase 3: Create Project and Namespace
      - name: Create Project and Namespace
        run: |
          set -euo pipefail
          if kubectl get project "$PROJECT_NAME" 2>/dev/null; then
            echo "Project '$PROJECT_NAME' already exists, skipping creation"
          else
            # Look up the namespace class default limits to use in the zone override
            CLASS_INFO=$(kubectl get supervisornamespaceclassconfigs "$RESOURCE_CLASS" -o json 2>/dev/null || true)
            if [ -n "$CLASS_INFO" ]; then
              NS_CPU_LIMIT=$(echo "$CLASS_INFO" | jq -r '.spec.defaultLimits.cpuLimit // "100000M"')
              NS_CPU_RESERVATION=$(echo "$CLASS_INFO" | jq -r '.spec.defaultLimits.cpuReservation // "0M"')
              NS_MEMORY_LIMIT=$(echo "$CLASS_INFO" | jq -r '.spec.defaultLimits.memoryLimit // "102400Mi"')
              NS_MEMORY_RESERVATION=$(echo "$CLASS_INFO" | jq -r '.spec.defaultLimits.memoryReservation // "0Mi"')
              echo "Namespace class '$RESOURCE_CLASS' limits: CPU=${NS_CPU_LIMIT}, Memory=${NS_MEMORY_LIMIT}"
            else
              echo "::warning::Could not query namespace class '$RESOURCE_CLASS', using xxlarge defaults"
              NS_CPU_LIMIT="100000M"
              NS_CPU_RESERVATION="0M"
              NS_MEMORY_LIMIT="102400Mi"
              NS_MEMORY_RESERVATION="0Mi"
            fi

            cat <<EOF | kubectl create -f - --validate=false
          apiVersion: project.cci.vmware.com/v1alpha2
          kind: Project
          metadata:
            name: $PROJECT_NAME
          spec:
            description: "VCF 9 Project $PROJECT_NAME"
          ---
          apiVersion: authorization.cci.vmware.com/v1alpha1
          kind: ProjectRoleBinding
          metadata:
            name: "cci:user:$USER_IDENTITY"
            namespace: $PROJECT_NAME
          roleRef:
            apiGroup: authorization.cci.vmware.com
            kind: ProjectRole
            name: admin
          subjects:
          - kind: User
            name: $USER_IDENTITY
          ---
          apiVersion: infrastructure.cci.vmware.com/v1alpha2
          kind: SupervisorNamespace
          metadata:
            generateName: $NAMESPACE_PREFIX
            namespace: $PROJECT_NAME
          spec:
            description: "Supervisor Namespace for $PROJECT_NAME"
            regionName: "$REGION_NAME"
            className: "$RESOURCE_CLASS"
            vpcName: "$VPC_NAME"
            initialClassConfigOverrides:
              zones:
              - name: "$ZONE_NAME"
                cpuLimit: "${NS_CPU_LIMIT}"
                cpuReservation: "${NS_CPU_RESERVATION}"
                memoryLimit: "${NS_MEMORY_LIMIT}"
                memoryReservation: "${NS_MEMORY_RESERVATION}"
          EOF
          fi

      # Phase 3b: Get Dynamic Namespace Name
      - name: Get Dynamic Namespace Name
        id: get-ns
        run: |
          set -euo pipefail
          NS_NAME=$(kubectl get supervisornamespaces -n "$PROJECT_NAME" -o jsonpath='{.items[0].metadata.name}')
          if [ -z "$NS_NAME" ]; then
            echo "::error::Failed to retrieve dynamic namespace name from project '$PROJECT_NAME'"
            exit 1
          fi
          echo "dynamic_ns_name=$NS_NAME" >> "$GITHUB_OUTPUT"
          echo "DYNAMIC_NS_NAME=$NS_NAME" >> "$GITHUB_ENV"
          echo "Dynamic namespace name: $NS_NAME"

      # Phase 4: Execute Context Bridge
      - name: Execute Context Bridge
        run: |
          set -euo pipefail
          TIMEOUT=120
          INTERVAL=10
          ELAPSED=0
          BRIDGE_OK=false

          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            vcf context delete "$CONTEXT_NAME" --yes 2>/dev/null || true

            vcf context create "$CONTEXT_NAME" \
              --endpoint "https://$VCFA_ENDPOINT" \
              --type cci \
              --tenant-name "$TENANT_NAME" \
              --api-token "$VCF_API_TOKEN" \
              --set-current >/dev/null 2>&1 || true

            if vcf context use "$CONTEXT_NAME:$DYNAMIC_NS_NAME:$PROJECT_NAME" 2>/dev/null; then
              sleep 5
              if kubectl get clusters 2>/dev/null; then
                BRIDGE_OK=true
                break
              fi
            fi

            echo "Namespace context not yet available, retrying... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$BRIDGE_OK" != "true" ]; then
            echo "::error::Context bridge did not succeed within ${TIMEOUT}s for context '$CONTEXT_NAME:$DYNAMIC_NS_NAME:$PROJECT_NAME'"
            exit 1
          fi
          echo "Context bridge complete — targeting namespace '$DYNAMIC_NS_NAME' in project '$PROJECT_NAME'"

      # Phase 4b: Create Trusted CA Secret (conditional)
      - name: Create Trusted CA Secret
        if: env.TRUSTED_CA_PATH != ''
        run: |
          set -euo pipefail
          if [ ! -f "$TRUSTED_CA_PATH" ]; then
            echo "::error::Trusted CA certificate file not found: $TRUSTED_CA_PATH"
            exit 1
          fi
          DOUBLE_B64=$(base64 -w 0 < "$TRUSTED_CA_PATH" | base64 -w 0)
          kubectl create secret generic "$TRUSTED_CA_SECRET_NAME" \
            --from-literal=ca-cert="$DOUBLE_B64" \
            --namespace "$DYNAMIC_NS_NAME" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "Trusted CA secret '$TRUSTED_CA_SECRET_NAME' created in namespace '$DYNAMIC_NS_NAME'"

      # Phase 5: Deploy VKS Cluster
      - name: Deploy VKS Cluster
        run: |
          set -euo pipefail
          if kubectl get cluster "$CLUSTER_NAME" 2>/dev/null; then
            echo "Cluster '$CLUSTER_NAME' already exists, skipping creation"
          else
            # Build the OS image annotation — include os-version only if set (required for ubuntu)
            OS_IMAGE_ANNOTATION="os-name=${OS_NAME}, content-library=${CONTENT_LIBRARY_ID}"
            if [ -n "${OS_VERSION}" ]; then
              OS_IMAGE_ANNOTATION="${OS_IMAGE_ANNOTATION}, os-version=${OS_VERSION}"
            fi
            echo "OS image annotation: ${OS_IMAGE_ANNOTATION}"

            # Build optional osConfiguration fragment for trusted CA
            OS_CONFIG_FRAGMENT=""
            if [ -n "${TRUSTED_CA_PATH}" ]; then
              OS_CONFIG_FRAGMENT="    - name: osConfiguration
              value:
                trust:
                  additionalTrustedCAs:
                  - caCert:
                      secretRef:
                        name: ${TRUSTED_CA_SECRET_NAME}
                        key: ca-cert"
            fi

            cat <<EOF | kubectl apply -f - --validate=false --insecure-skip-tls-verify
          apiVersion: cluster.x-k8s.io/v1beta1
          kind: Cluster
          metadata:
            name: $CLUSTER_NAME
            namespace: $DYNAMIC_NS_NAME
          spec:
            clusterNetwork:
              services:
                cidrBlocks:
                - "10.96.0.0/12"
              pods:
                cidrBlocks:
                - "192.168.156.0/20"
              serviceDomain: cluster.local
            topology:
              class: builtin-generic-v3.4.0
              classNamespace: vmware-system-vks-public
              version: $K8S_VERSION
              controlPlane:
                metadata:
                  annotations:
                    run.tanzu.vmware.com/resolve-os-image: "${OS_IMAGE_ANNOTATION}"
                replicas: $CONTROL_PLANE_REPLICAS
              workers:
                machineDeployments:
                - class: node-pool
                  name: $NODE_POOL_NAME
                  metadata:
                    annotations:
                      run.tanzu.vmware.com/resolve-os-image: "${OS_IMAGE_ANNOTATION}"
                      cluster.x-k8s.io/cluster-api-autoscaler-node-group-max-size: "$MAX_NODES"
                      cluster.x-k8s.io/cluster-api-autoscaler-node-group-min-size: "$MIN_NODES"
              variables:
              - name: vmClass
                value: $VM_CLASS
              - name: storageClass
                value: $STORAGE_CLASS
              - name: volumes
                value:
                - name: containerd-data
                  capacity: $CONTAINERD_VOLUME_SIZE
                  mountPath: /var/lib/containerd
                  storageClass: $STORAGE_CLASS
          $OS_CONFIG_FRAGMENT
          EOF
            echo "Cluster '$CLUSTER_NAME' manifest applied"
          fi

      # Phase 5b: Wait for Cluster Provisioning
      - name: Wait for Cluster Provisioning
        run: |
          set -euo pipefail
          TIMEOUT=1800
          INTERVAL=15
          ELAPSED=0

          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            PHASE=$(kubectl get cluster "$CLUSTER_NAME" -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
            if [ "$PHASE" = "Provisioned" ]; then
              echo "Cluster '$CLUSTER_NAME' reached Provisioned state"
              exit 0
            fi
            echo "Cluster phase: $PHASE — waiting... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          CURRENT_STATUS=$(kubectl get cluster "$CLUSTER_NAME" -o yaml 2>/dev/null || echo "Unable to retrieve cluster status")
          echo "::error::Cluster '$CLUSTER_NAME' did not reach Provisioned state within ${TIMEOUT}s"
          echo "Current cluster status:"
          echo "$CURRENT_STATUS"
          exit 1

      # Phase 6: Retrieve Kubeconfig
      - name: Retrieve Kubeconfig
        run: |
          set -euo pipefail
          vcf context use "$CONTEXT_NAME:$DYNAMIC_NS_NAME:$PROJECT_NAME"
          vcf cluster kubeconfig get "$CLUSTER_NAME" --admin --export-file "/workspace/kubeconfig-${CLUSTER_NAME}.yaml"
          echo "KUBECONFIG=/workspace/kubeconfig-${CLUSTER_NAME}.yaml" >> "$GITHUB_ENV"
          echo "Kubeconfig retrieved and exported to /workspace/kubeconfig-${CLUSTER_NAME}.yaml"

      # Phase 6b: Wait for Guest Cluster API
      - name: Wait for Guest Cluster API
        run: |
          set -euo pipefail
          TIMEOUT=300
          INTERVAL=10
          ELAPSED=0

          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            if kubectl get namespaces 2>/dev/null; then
              echo "Guest cluster API is reachable"
              exit 0
            fi
            echo "Guest cluster API not yet reachable — waiting... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "::error::Guest cluster API did not become reachable within ${TIMEOUT}s"
          exit 1

      # Phase 6c: Wait for Worker Nodes Ready
      - name: Wait for Worker Nodes Ready
        run: |
          set -euo pipefail
          TIMEOUT=600
          INTERVAL=15
          ELAPSED=0

          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            READY_COUNT=$(kubectl get nodes --no-headers 2>/dev/null | grep -c ' Ready' || echo "0")
            if [ "$READY_COUNT" -ge "$MIN_NODES" ]; then
              echo "$READY_COUNT worker nodes are Ready (minimum: $MIN_NODES)"
              exit 0
            fi
            echo "Ready nodes: $READY_COUNT / $MIN_NODES — waiting... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "::error::Only $READY_COUNT of $MIN_NODES worker nodes reached Ready within ${TIMEOUT}s"
          kubectl get nodes 2>/dev/null || true
          exit 1

      # Phase 6d: Create Package Namespace
      - name: Create Package Namespace
        run: |
          set -euo pipefail
          if kubectl get ns "$PACKAGE_NAMESPACE" >/dev/null 2>&1; then
            echo "Namespace '$PACKAGE_NAMESPACE' already exists, skipping creation"
          else
            kubectl create ns "$PACKAGE_NAMESPACE"
            echo "Namespace '$PACKAGE_NAMESPACE' created"
          fi
          kubectl label ns "$PACKAGE_NAMESPACE" \
            pod-security.kubernetes.io/enforce=privileged \
            --overwrite
          echo "Namespace '$PACKAGE_NAMESPACE' labelled with privileged PodSecurity standard"

      # Phase 6e: Register Package Repository
      - name: Register Package Repository
        run: |
          set -euo pipefail
          PACKAGE_REPO_NAME="tkg-packages"
          if vcf package repository list --namespace "$PACKAGE_NAMESPACE" 2>/dev/null | grep -q "$PACKAGE_REPO_NAME"; then
            echo "Package repository '$PACKAGE_REPO_NAME' already registered, skipping"
          else
            vcf package repository add "$PACKAGE_REPO_NAME" \
              --url "$PACKAGE_REPO_URL" \
              --namespace "$PACKAGE_NAMESPACE"

            TIMEOUT="$PACKAGE_TIMEOUT"
            INTERVAL=15
            ELAPSED=0
            while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
              if vcf package repository list --namespace "$PACKAGE_NAMESPACE" 2>/dev/null | grep "$PACKAGE_REPO_NAME" | grep -qi "reconcile"; then
                echo "Package repository '$PACKAGE_REPO_NAME' reconciled"
                break
              fi
              echo "Waiting for package repository to reconcile... (${ELAPSED}s/${TIMEOUT}s)"
              sleep "$INTERVAL"
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "::error::Package repository '$PACKAGE_REPO_NAME' did not reconcile within ${TIMEOUT}s"
              exit 1
            fi
          fi
          echo "Package repository setup complete"

      # Phase 6f: Install Cluster Autoscaler
      - name: Install Cluster Autoscaler
        run: |
          set -euo pipefail

          # Delete any failed previous install attempt so we can re-install cleanly
          if vcf package installed list --namespace "$PACKAGE_NAMESPACE" 2>/dev/null | grep -q "cluster-autoscaler"; then
            STATUS=$(vcf package installed list --namespace "$PACKAGE_NAMESPACE" 2>/dev/null | grep "cluster-autoscaler" || true)
            if echo "$STATUS" | grep -qi "reconcile failed\|error"; then
              echo "Found failed cluster-autoscaler install, removing before re-install..."
              vcf package installed delete cluster-autoscaler -n "$PACKAGE_NAMESPACE" --yes 2>/dev/null || true
              sleep 5
            else
              echo "Cluster Autoscaler already installed and healthy, skipping"
              exit 0
            fi
          fi

          # Create values file with required cluster config and autoscaler tuning
          # Schema keys: clusterConfig, arguments (camelCase), extraArguments for CLI flags not in schema
          AUTOSCALER_VALUES=$(mktemp /tmp/autoscaler-values-XXXXXX.yaml)
          printf 'clusterConfig:\n  clusterName: %s\n  clusterNamespace: %s\narguments:\n  scaleDownUnneededTime: "%s"\n  scaleDownDelayAfterAdd: "%s"\n  scaleDownDelayAfterDelete: "%s"\n  extraArguments:\n  - "scale-down-utilization-threshold=%s"\n' \
            "${CLUSTER_NAME}" "${DYNAMIC_NS_NAME}" \
            "${AUTOSCALER_SCALE_DOWN_UNNEEDED_TIME}" \
            "${AUTOSCALER_SCALE_DOWN_DELAY_AFTER_ADD}" \
            "${AUTOSCALER_SCALE_DOWN_DELAY_AFTER_DELETE}" \
            "${AUTOSCALER_SCALE_DOWN_UTILIZATION_THRESHOLD}" > "$AUTOSCALER_VALUES"
          echo "Autoscaler values file contents:"
          cat "$AUTOSCALER_VALUES"

          vcf package install cluster-autoscaler \
            -p cluster-autoscaler.kubernetes.vmware.com \
            --values-file "$AUTOSCALER_VALUES" \
            -n "$PACKAGE_NAMESPACE"

          rm -f "$AUTOSCALER_VALUES"

          TIMEOUT="$PACKAGE_TIMEOUT"
          INTERVAL=15
          ELAPSED=0
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            if vcf package installed list --namespace "$PACKAGE_NAMESPACE" 2>/dev/null | grep "cluster-autoscaler" | grep -qi "reconcile succeeded"; then
              echo "Cluster Autoscaler package reconciled"
              break
            fi
            # Check for reconcile failure early
            FAIL_CHECK=$(vcf package installed list --namespace "$PACKAGE_NAMESPACE" 2>/dev/null | grep "cluster-autoscaler" || true)
            if echo "$FAIL_CHECK" | grep -qi "reconcile failed\|error"; then
              echo "::error::Cluster Autoscaler package reconciliation failed"
              kubectl get packageinstall cluster-autoscaler -n "$PACKAGE_NAMESPACE" -o jsonpath='{.status.usefulErrorMessage}' 2>/dev/null || true
              exit 1
            fi
            echo "Waiting for Cluster Autoscaler package to reconcile... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            echo "::error::Cluster Autoscaler package did not reconcile within ${TIMEOUT}s"
            exit 1
          fi
          echo "Cluster Autoscaler setup complete"

      # Phase 6g: Wait for Autoscaler Ready
      - name: Wait for Autoscaler Ready
        run: |
          set -euo pipefail
          TIMEOUT="$PACKAGE_TIMEOUT"
          INTERVAL=15
          ELAPSED=0

          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            # Check kube-system first, then tkg-packages
            for NS in kube-system "$PACKAGE_NAMESPACE"; do
              if kubectl get deployment -n "$NS" cluster-autoscaler >/dev/null 2>&1; then
                READY=$(kubectl get deployment -n "$NS" cluster-autoscaler -o jsonpath='{.status.readyReplicas}' 2>/dev/null || echo "0")
                if [ "${READY:-0}" -ge 1 ]; then
                  echo "Cluster Autoscaler deployment is ready in namespace '$NS' (${READY} replica(s))"
                  echo "Autoscaler configured: min=${MIN_NODES}, max=${MAX_NODES} worker nodes"
                  exit 0
                fi
              fi
            done
            echo "Waiting for Cluster Autoscaler deployment to be ready... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "::warning::Cluster Autoscaler deployment did not reach Ready within ${TIMEOUT}s — autoscaling may not be active"
          kubectl get deployments -A 2>/dev/null | head -20 || true

      # Phase 7: Build and Push Web App Image
      - name: Build and Push Web App Image
        run: |
          set -euo pipefail
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin
          docker build -f www/Dockerfile.web -t scafeman/vks-test-app:latest www/
          docker push scafeman/vks-test-app:latest
          echo "Web app image pushed to scafeman/vks-test-app:latest"

      # Phase 7b: Deploy Functional Test Workload
      - name: Deploy Functional Test Workload
        run: |
          set -euo pipefail
          cat <<EOF | kubectl apply -f -
          ---
          apiVersion: v1
          kind: PersistentVolumeClaim
          metadata:
            name: vks-test-pvc
          spec:
            accessModes:
              - ReadWriteOnce
            resources:
              requests:
                storage: 1Gi
            storageClassName: $STORAGE_CLASS
          ---
          apiVersion: apps/v1
          kind: Deployment
          metadata:
            name: vks-test-app
            labels:
              app: vks-test-app
          spec:
            replicas: 1
            selector:
              matchLabels:
                app: vks-test-app
            template:
              metadata:
                labels:
                  app: vks-test-app
              spec:
                securityContext:
                  seccompProfile:
                    type: RuntimeDefault
                  runAsNonRoot: true
                  runAsUser: 101
                  fsGroup: 101
                containers:
                  - name: nginx
                    image: scafeman/vks-test-app:latest
                    securityContext:
                      allowPrivilegeEscalation: false
                      capabilities:
                        drop: ["ALL"]
                    ports:
                      - containerPort: 8080
                    volumeMounts:
                      - name: pvc-volume
                        mountPath: /data
                volumes:
                  - name: pvc-volume
                    persistentVolumeClaim:
                      claimName: vks-test-pvc
          ---
          apiVersion: v1
          kind: Service
          metadata:
            name: vks-test-lb
          spec:
            type: LoadBalancer
            ports:
              - port: 80
                targetPort: 8080
            selector:
              app: vks-test-app
          EOF
          echo "Functional test workload deployed"

      # Phase 7b: Wait for PVC Bound
      - name: Wait for PVC Bound
        run: |
          set -euo pipefail
          TIMEOUT=300
          INTERVAL=15
          ELAPSED=0

          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            PVC_PHASE=$(kubectl get pvc vks-test-pvc -o jsonpath='{.status.phase}' 2>/dev/null || echo "Unknown")
            if [ "$PVC_PHASE" = "Bound" ]; then
              echo "PVC vks-test-pvc is Bound"
              exit 0
            fi
            echo "PVC phase: $PVC_PHASE — waiting... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "::error::PVC vks-test-pvc did not reach Bound state within ${TIMEOUT}s"
          kubectl describe pvc vks-test-pvc 2>/dev/null || true
          exit 1

      # Phase 7c: Wait for LoadBalancer IP
      - name: Wait for LoadBalancer IP
        id: get-lb-ip
        run: |
          set -euo pipefail
          TIMEOUT=300
          INTERVAL=15
          ELAPSED=0

          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            EXTERNAL_IP=$(kubectl get svc vks-test-lb -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || echo "")
            if [ -n "$EXTERNAL_IP" ]; then
              echo "LoadBalancer IP assigned: $EXTERNAL_IP"
              echo "external_ip=$EXTERNAL_IP" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "LoadBalancer IP not yet assigned — waiting... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "::error::LoadBalancer IP was not assigned within ${TIMEOUT}s"
          kubectl get svc vks-test-lb -o yaml 2>/dev/null || true
          exit 1

      # Phase 7d: HTTP Connectivity Test
      - name: HTTP Connectivity Test
        run: |
          set -euo pipefail
          EXTERNAL_IP="${{ steps.get-lb-ip.outputs.external_ip }}"
          TIMEOUT=60
          INTERVAL=5
          ELAPSED=0

          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" --connect-timeout 5 "http://${EXTERNAL_IP}" 2>/dev/null || echo "000")
            if [ "$HTTP_STATUS" = "200" ]; then
              echo "HTTP connectivity test passed — received HTTP 200 from http://${EXTERNAL_IP}"
              exit 0
            fi
            echo "HTTP status: $HTTP_STATUS — waiting for nginx... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "::error::HTTP connectivity test failed — last status $HTTP_STATUS from http://${EXTERNAL_IP}"
          exit 1

      # Write Job Summary
      - name: Write Job Summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ✅ VKS Deployment Complete

          | Field | Value |
          |---|---|
          | Cluster | ${{ env.CLUSTER_NAME }} |
          | Namespace | ${{ env.DYNAMIC_NS_NAME }} |
          | Kubeconfig | Retrieve via: \`vcf cluster kubeconfig get ${{ env.CLUSTER_NAME }} --admin --export-file kubeconfig-${{ env.CLUSTER_NAME }}.yaml\` |
          | External IP | ${{ steps.get-lb-ip.outputs.external_ip }} |
          | Environment | ${{ env.ENVIRONMENT }} |
          EOF

      # Write Failure Summary (if: failure())
      - name: Write Failure Summary
        if: failure()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ❌ VKS Deployment Failed

          | Field | Value |
          |---|---|
          | Cluster | ${{ env.CLUSTER_NAME }} |
          | Namespace | ${{ env.DYNAMIC_NS_NAME }} |
          | Environment | ${{ env.ENVIRONMENT }} |
          | Error | Check the failed step above for details |
          EOF
