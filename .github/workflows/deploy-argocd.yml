# =============================================================================
# Deploy ArgoCD Stack — GitHub Actions Workflow (Deploy GitOps)
# =============================================================================
#
# This workflow deploys the ArgoCD Consumption Model stack (Harbor, ArgoCD,
# GitLab, GitLab Runner, and the Microservices Demo) on an existing VKS
# cluster provisioned by Deploy Cluster. Each provisioning phase is implemented
# as individual named workflow steps with inline bash commands.
#
# Prerequisites:
#   - Deploy Cluster must have completed successfully — a running VKS cluster
#     with a valid admin kubeconfig file is required.
#   - A self-hosted GitHub Actions runner labeled [self-hosted, vcf] with
#     network access to the VKS cluster API. All required tools (VCF CLI,
#     kubectl, Helm, jq, openssl) are baked into the runner via
#     Dockerfile.runner — no container: directive is used.
#
# Triggers:
#   - workflow_dispatch: Manual trigger from the GitHub Actions UI
#   - repository_dispatch: API trigger with event type "deploy-argocd"
#
# =============================================================================

name: Deploy ArgoCD Stack

on:
  workflow_dispatch:
    inputs:
      cluster_name:
        description: "VKS cluster name (e.g., my-dev-project-01-clus-01)"
        required: true
        type: string
      environment:
        description: "Environment label for the deployment"
        required: false
        type: string
        default: "demo"

  repository_dispatch:
    types: [deploy-argocd]

jobs:
  deploy:
    name: Deploy ArgoCD Stack
    runs-on: [self-hosted, vcf]
    environment: vcf-production
    defaults:
      run:
        shell: bash

    env:
      # --- Unified Parameter Resolution ---
      # Priority: workflow_dispatch input > client_payload > secret > default
      CLUSTER_NAME: ${{ github.event.inputs.cluster_name || github.event.client_payload.cluster_name }}
      ENVIRONMENT: ${{ github.event.inputs.environment || github.event.client_payload.environment || 'demo' }}
      DOMAIN: ${{ github.event.client_payload.domain || secrets.DOMAIN || 'lab.local' }}
      KUBECONFIG_PATH: ${{ github.event.client_payload.kubeconfig_path || secrets.KUBECONFIG_PATH || '' }}
      HARBOR_VERSION: ${{ github.event.client_payload.harbor_version || secrets.HARBOR_VERSION || '1.18.3' }}
      ARGOCD_VERSION: ${{ github.event.client_payload.argocd_version || secrets.ARGOCD_VERSION || '9.4.17' }}
      GITLAB_OPERATOR_VERSION: ${{ github.event.client_payload.gitlab_operator_version || secrets.GITLAB_OPERATOR_VERSION || '9.10.3' }}
      GITLAB_RUNNER_VERSION: ${{ github.event.client_payload.gitlab_runner_version || secrets.GITLAB_RUNNER_VERSION || '0.87.1' }}
      HARBOR_ADMIN_PASSWORD: ${{ github.event.client_payload.harbor_admin_password || secrets.HARBOR_ADMIN_PASSWORD }}
      PACKAGE_TIMEOUT: ${{ github.event.client_payload.package_timeout || secrets.PACKAGE_TIMEOUT || '900' }}
      PACKAGE_NAMESPACE: ${{ github.event.client_payload.package_namespace || secrets.PACKAGE_NAMESPACE || 'tkg-packages' }}
      PACKAGE_REPO_URL: ${{ github.event.client_payload.package_repo_url || secrets.PACKAGE_REPO_URL || 'projects.packages.broadcom.com/vsphere/supervisor/vks-standard-packages/3.6.0-20260211/vks-standard-packages:3.6.0-20260211' }}

      # --- Secrets only (truly sensitive — cannot be passed via client_payload) ---
      VCF_API_TOKEN: ${{ secrets.VCF_API_TOKEN }}
      VCFA_ENDPOINT: ${{ github.event.client_payload.vcfa_endpoint || secrets.VCFA_ENDPOINT }}
      TENANT_NAME: ${{ github.event.client_payload.tenant_name || secrets.TENANT_NAME }}

      # --- sslip.io DNS ---
      USE_SSLIP_DNS: "true"

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      # Phase 1: Retrieve and Setup Kubeconfig
      - name: Setup Kubeconfig
        run: |
          set -euo pipefail
          if [ -z "$KUBECONFIG_PATH" ]; then
            KUBECONFIG_PATH="./kubeconfig-${CLUSTER_NAME}.yaml"
          fi

          # If the kubeconfig file doesn't exist, retrieve it via VCF CLI
          if [ ! -f "$KUBECONFIG_PATH" ]; then
            echo "Kubeconfig not found at '$KUBECONFIG_PATH', retrieving via VCF CLI..."
            CONTEXT_NAME="argocd-deploy"
            vcf context delete "$CONTEXT_NAME" --yes 2>/dev/null || true
            vcf context create "$CONTEXT_NAME" \
              --endpoint "https://$VCFA_ENDPOINT" \
              --type cci \
              --tenant-name "$TENANT_NAME" \
              --api-token "$VCF_API_TOKEN" \
              --set-current

            # Find and switch to the namespace context that contains this cluster
            # Convention: cluster name is <project>-clus-<id>, project name is <project>
            PROJECT_PATTERN=$(echo "$CLUSTER_NAME" | sed 's/-clus-[0-9]*$//')
            NAMESPACE_CONTEXT=$(vcf context list 2>&1 | grep "${CONTEXT_NAME}:.*${PROJECT_PATTERN}" | awk '{print $1}' | head -1 || true)
            if [ -z "$NAMESPACE_CONTEXT" ]; then
              echo "::error::Could not find a namespace context for cluster '${CLUSTER_NAME}' (project: '${PROJECT_PATTERN}') under context '${CONTEXT_NAME}'. Ensure Deploy Cluster has completed."
              exit 1
            fi
            echo "Found namespace context: $NAMESPACE_CONTEXT"
            vcf context use "$NAMESPACE_CONTEXT"

            # Extract the namespace ID from the context (format: context:namespace:project)
            DYNAMIC_NS_NAME=$(echo "$NAMESPACE_CONTEXT" | cut -d: -f2)
            echo "DYNAMIC_NS_NAME=$DYNAMIC_NS_NAME" >> "$GITHUB_ENV"

            # Retrieve the admin kubeconfig
            vcf cluster kubeconfig get "$CLUSTER_NAME" --admin --export-file "$KUBECONFIG_PATH"
            echo "Kubeconfig retrieved via VCF CLI"
          fi

          export KUBECONFIG="$KUBECONFIG_PATH"
          echo "KUBECONFIG=$KUBECONFIG_PATH" >> "$GITHUB_ENV"

          # Switch to the admin context (the file may contain multiple contexts)
          ADMIN_CONTEXT="${CLUSTER_NAME}-admin@${CLUSTER_NAME}"
          if kubectl config get-contexts "$ADMIN_CONTEXT" --kubeconfig="$KUBECONFIG_PATH" >/dev/null 2>&1; then
            kubectl config use-context "$ADMIN_CONTEXT" --kubeconfig="$KUBECONFIG_PATH"
            echo "Switched to admin context '$ADMIN_CONTEXT'"
          fi

          if [ ! -f "$KUBECONFIG_PATH" ]; then
            echo "::error::Kubeconfig file not found at '$KUBECONFIG_PATH'. Ensure Deploy Cluster has completed and the kubeconfig file exists."
            exit 1
          fi
          echo "Kubeconfig set to '$KUBECONFIG_PATH'"

      # Phase 1b: Verify Cluster Connectivity
      - name: Verify Cluster Connectivity
        run: |
          set -euo pipefail
          if ! kubectl get namespaces; then
            echo "::error::Unable to reach cluster '${CLUSTER_NAME}' using kubeconfig at '${KUBECONFIG}'. Verify the cluster is running and the kubeconfig is valid."
            exit 1
          fi
          echo "Cluster '${CLUSTER_NAME}' is reachable"

      # Phase 2: Generate Self-Signed Certificates
      - name: Generate Self-Signed Certificates
        run: |
          set -euo pipefail
          CERT_DIR="./certs"

          if [ -f "${CERT_DIR}/ca.crt" ]; then
            echo "CA certificate already exists at '${CERT_DIR}/ca.crt', skipping certificate generation"
          else
            mkdir -p "${CERT_DIR}"

            # Generate self-signed CA certificate and key
            if ! openssl req -x509 -new -nodes -newkey rsa:2048 \
              -keyout "${CERT_DIR}/ca.key" -out "${CERT_DIR}/ca.crt" \
              -days 3650 -subj "/CN=Self-Signed CA"; then
              echo "::error::Failed to generate self-signed CA certificate"
              exit 1
            fi
            echo "Self-signed CA certificate generated"

            # Generate wildcard certificate CSR using the OpenSSL config file
            if ! openssl req -new -nodes -newkey rsa:2048 \
              -keyout "${CERT_DIR}/wildcard.key" -out "${CERT_DIR}/wildcard.csr" \
              -config examples/deploy-gitops/wildcard.cnf; then
              echo "::error::Failed to generate wildcard certificate CSR"
              exit 1
            fi
            echo "Wildcard certificate CSR generated"

            # Sign the wildcard certificate with the CA
            if ! openssl x509 -req -in "${CERT_DIR}/wildcard.csr" \
              -CA "${CERT_DIR}/ca.crt" -CAkey "${CERT_DIR}/ca.key" \
              -CAcreateserial -out "${CERT_DIR}/wildcard.crt" \
              -days 3650 -extensions v3_req -extfile examples/deploy-gitops/wildcard.cnf; then
              echo "::error::Failed to sign wildcard certificate"
              exit 1
            fi
            echo "Wildcard certificate signed by CA"

            # Create fullchain certificate (wildcard + CA)
            cat "${CERT_DIR}/wildcard.crt" "${CERT_DIR}/ca.crt" > "${CERT_DIR}/fullchain.crt"
            echo "Fullchain certificate created"
          fi
          echo "Certificates ready in '${CERT_DIR}'"

      # Phase 3a: Create Package Namespace
      - name: Create Package Namespace
        run: |
          set -euo pipefail
          if kubectl get ns "$PACKAGE_NAMESPACE" >/dev/null 2>&1; then
            echo "Namespace '$PACKAGE_NAMESPACE' already exists, skipping creation"
          else
            kubectl create ns "$PACKAGE_NAMESPACE"
            echo "Namespace '$PACKAGE_NAMESPACE' created"
          fi
          kubectl label ns "$PACKAGE_NAMESPACE" \
            pod-security.kubernetes.io/enforce=privileged \
            --overwrite
          echo "Namespace '$PACKAGE_NAMESPACE' labelled with privileged PodSecurity standard"

      # Phase 3b: Register Package Repository
      - name: Register Package Repository
        run: |
          set -euo pipefail
          PACKAGE_REPO_NAME="tkg-packages"
          if vcf package repository list --namespace "$PACKAGE_NAMESPACE" 2>/dev/null | grep -q "$PACKAGE_REPO_NAME"; then
            echo "Package repository '$PACKAGE_REPO_NAME' already registered, skipping"
          else
            vcf package repository add "$PACKAGE_REPO_NAME" \
              --url "$PACKAGE_REPO_URL" \
              --namespace "$PACKAGE_NAMESPACE"

            TIMEOUT="$PACKAGE_TIMEOUT"
            INTERVAL=15
            ELAPSED=0
            while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
              if vcf package repository list --namespace "$PACKAGE_NAMESPACE" 2>/dev/null | grep "$PACKAGE_REPO_NAME" | grep -qi "reconcile"; then
                echo "Package repository '$PACKAGE_REPO_NAME' reconciled"
                break
              fi
              echo "Waiting for package repository to reconcile... (${ELAPSED}s/${TIMEOUT}s)"
              sleep "$INTERVAL"
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "::error::Package repository '$PACKAGE_REPO_NAME' did not reconcile within ${TIMEOUT}s"
              exit 1
            fi
          fi
          echo "Package repository setup complete"

      # Phase 3c: Install cert-manager
      - name: Install cert-manager
        run: |
          set -euo pipefail
          if vcf package installed list --namespace "$PACKAGE_NAMESPACE" 2>/dev/null | grep -q "cert-manager"; then
            echo "cert-manager already installed, skipping"
          else
            vcf package install cert-manager \
              -p cert-manager.kubernetes.vmware.com \
              -n "$PACKAGE_NAMESPACE"

            TIMEOUT="$PACKAGE_TIMEOUT"
            INTERVAL=15
            ELAPSED=0
            while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
              if vcf package installed list --namespace "$PACKAGE_NAMESPACE" 2>/dev/null | grep "cert-manager" | grep -qi "reconcile"; then
                echo "cert-manager package reconciled"
                break
              fi
              echo "Waiting for cert-manager package to reconcile... (${ELAPSED}s/${TIMEOUT}s)"
              sleep "$INTERVAL"
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "::error::cert-manager package did not reconcile within ${TIMEOUT}s"
              exit 1
            fi
          fi
          echo "cert-manager setup complete"

      # Phase 3d: Install Contour
      - name: Install Contour
        run: |
          set -euo pipefail
          if vcf package installed list --namespace "$PACKAGE_NAMESPACE" 2>/dev/null | grep -q "contour"; then
            echo "Contour already installed, skipping"
          else
            vcf package install contour \
              -p contour.kubernetes.vmware.com \
              -n "$PACKAGE_NAMESPACE"

            TIMEOUT="$PACKAGE_TIMEOUT"
            INTERVAL=15
            ELAPSED=0
            while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
              if vcf package installed list --namespace "$PACKAGE_NAMESPACE" 2>/dev/null | grep "contour" | grep -qi "reconcile"; then
                echo "Contour package reconciled"
                break
              fi
              echo "Waiting for Contour package to reconcile... (${ELAPSED}s/${TIMEOUT}s)"
              sleep "$INTERVAL"
              ELAPSED=$((ELAPSED + INTERVAL))
            done

            if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
              echo "::error::Contour package did not reconcile within ${TIMEOUT}s"
              exit 1
            fi
          fi
          echo "Contour setup complete"

      # Phase 3e: Create Envoy LoadBalancer
      - name: Create Envoy LoadBalancer
        run: |
          set -euo pipefail
          CONTOUR_INGRESS_NAMESPACE="tanzu-system-ingress"

          if kubectl get svc envoy-lb -n "$CONTOUR_INGRESS_NAMESPACE" >/dev/null 2>&1; then
            echo "Envoy LoadBalancer service 'envoy-lb' already exists, skipping creation"
          else
            cat <<EOF | kubectl apply -f -
          apiVersion: v1
          kind: Service
          metadata:
            name: envoy-lb
            namespace: ${CONTOUR_INGRESS_NAMESPACE}
          spec:
            type: LoadBalancer
            selector:
              app: envoy
            ports:
              - name: http
                port: 80
                targetPort: 8080
                protocol: TCP
              - name: https
                port: 443
                targetPort: 8443
                protocol: TCP
          EOF
            echo "Envoy LoadBalancer service 'envoy-lb' created"
          fi

          # Wait for external IP
          TIMEOUT="$PACKAGE_TIMEOUT"
          INTERVAL=15
          ELAPSED=0
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            CONTOUR_LB_IP=$(kubectl get svc -n "$CONTOUR_INGRESS_NAMESPACE" envoy-lb -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -n "$CONTOUR_LB_IP" ]; then
              echo "Envoy LoadBalancer IP: $CONTOUR_LB_IP"
              echo "CONTOUR_LB_IP=$CONTOUR_LB_IP" >> "$GITHUB_ENV"
              break
            fi
            echo "Waiting for Envoy LoadBalancer to get external IP... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            echo "::error::Envoy LoadBalancer did not receive an external IP within ${TIMEOUT}s"
            exit 1
          fi
          echo "Envoy LoadBalancer setup complete"

      # Phase 3f: Override DOMAIN for sslip.io (when USE_SSLIP_DNS=true)
      - name: Override DOMAIN for sslip.io
        if: env.USE_SSLIP_DNS == 'true'
        run: |
          set -euo pipefail
          CERT_DIR="./certs"

          # Override DOMAIN to use sslip.io with the envoy-lb IP
          SSLIP_DOMAIN="${CONTOUR_LB_IP}.sslip.io"
          echo "DOMAIN=${SSLIP_DOMAIN}" >> "$GITHUB_ENV"
          echo "Overriding DOMAIN to '${SSLIP_DOMAIN}' for sslip.io DNS"

          # Regenerate wildcard cert for *.IP.sslip.io (Helm charts need internal TLS)
          rm -rf "${CERT_DIR}"
          mkdir -p "${CERT_DIR}"

          # Generate self-signed CA
          openssl req -x509 -new -nodes -newkey rsa:2048 \
            -keyout "${CERT_DIR}/ca.key" -out "${CERT_DIR}/ca.crt" \
            -days 3650 -subj "/CN=Self-Signed CA"

          # Generate wildcard CSR for *.IP.sslip.io
          cat > /tmp/wildcard-sslip.cnf <<CNFEOF
          [req]
          default_bits       = 2048
          prompt             = no
          distinguished_name = dn
          req_extensions     = v3_req

          [dn]
          CN = *.${SSLIP_DOMAIN}

          [v3_req]
          subjectAltName = DNS:*.${SSLIP_DOMAIN},DNS:${SSLIP_DOMAIN}
          CNFEOF

          openssl req -new -nodes -newkey rsa:2048 \
            -keyout "${CERT_DIR}/wildcard.key" -out "${CERT_DIR}/wildcard.csr" \
            -config /tmp/wildcard-sslip.cnf

          openssl x509 -req -in "${CERT_DIR}/wildcard.csr" \
            -CA "${CERT_DIR}/ca.crt" -CAkey "${CERT_DIR}/ca.key" \
            -CAcreateserial -out "${CERT_DIR}/wildcard.crt" \
            -days 3650 -extensions v3_req -extfile /tmp/wildcard-sslip.cnf

          cat "${CERT_DIR}/wildcard.crt" "${CERT_DIR}/ca.crt" > "${CERT_DIR}/fullchain.crt"
          echo "Regenerated wildcard cert for *.${SSLIP_DOMAIN}"

      # Phase 4: Install Harbor
      - name: Install Harbor
        run: |
          set -euo pipefail
          CERT_DIR="./certs"
          HARBOR_NAMESPACE="harbor"

          # Create Harbor namespace
          kubectl create ns "$HARBOR_NAMESPACE" 2>/dev/null || true

          # Create Harbor TLS secret from wildcard certificate (idempotent)
          kubectl create secret tls harbor-tls \
            --cert="${CERT_DIR}/fullchain.crt" \
            --key="${CERT_DIR}/wildcard.key" \
            --namespace "$HARBOR_NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Create Harbor CA secret (idempotent)
          kubectl create secret generic harbor-ca \
            --from-file=ca.crt="${CERT_DIR}/ca.crt" \
            --namespace "$HARBOR_NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -

          # Add Harbor Helm repository
          helm repo add harbor https://helm.goharbor.io 2>/dev/null || true
          helm repo update 2>/dev/null || true

          # Skip if Harbor Helm release already exists
          if helm status harbor -n "$HARBOR_NAMESPACE" >/dev/null 2>&1; then
            echo "Harbor Helm release already deployed, skipping install"
          else
            # Generate Harbor admin password if not set
            if [ -z "${HARBOR_ADMIN_PASSWORD:-}" ]; then
              HARBOR_ADMIN_PASSWORD=$(openssl rand -base64 18)
              echo "HARBOR_ADMIN_PASSWORD=$HARBOR_ADMIN_PASSWORD" >> "$GITHUB_ENV"
              echo "Generated Harbor admin password"
            fi
            echo "::add-mask::${HARBOR_ADMIN_PASSWORD}"

            # Prepare Harbor values file with runtime variable substitution
            HARBOR_HOSTNAME="harbor.${DOMAIN}"
            HARBOR_SECRET_KEY=$(openssl rand -hex 16)
            TEMP_HARBOR_VALUES=$(mktemp /tmp/harbor-values-XXXXXX.yaml)
            sed \
              -e "s|harbor\.lab\.local|${HARBOR_HOSTNAME}|g" \
              -e "s|HARBOR_HOSTNAME|${HARBOR_HOSTNAME}|g" \
              -e "s|Harbor12345|${HARBOR_ADMIN_PASSWORD}|g" \
              -e "s|not-a-secure-key|${HARBOR_SECRET_KEY}|g" \
              -e "s|changeit|changeit|g" \
              examples/deploy-gitops/harbor-values.yaml > "$TEMP_HARBOR_VALUES"

            if ! helm upgrade --install harbor harbor/harbor \
              --namespace "$HARBOR_NAMESPACE" \
              --create-namespace \
              --version "$HARBOR_VERSION" \
              --values "$TEMP_HARBOR_VALUES" \
              --timeout 10m; then
              echo "::error::Failed to install Harbor via Helm"
              rm -f "$TEMP_HARBOR_VALUES"
              exit 1
            fi
            rm -f "$TEMP_HARBOR_VALUES"
            echo "Harbor Helm release installed"
          fi

          # Wait for Harbor pods to reach Running state
          TIMEOUT="$PACKAGE_TIMEOUT"
          INTERVAL=15
          ELAPSED=0
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            NON_RUNNING=$(kubectl get pods -n "$HARBOR_NAMESPACE" --no-headers 2>/dev/null | grep -cv 'Running\|Completed' || true)
            if [ "$NON_RUNNING" = "0" ]; then
              echo "All Harbor pods are running"
              break
            fi
            echo "Waiting for Harbor pods to be running... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            echo "::error::Harbor pods did not reach Running state within ${TIMEOUT}s"
            exit 1
          fi
          echo "Harbor setup complete"

      # Phase 5: Configure CoreDNS (skipped when USE_SSLIP_DNS=true — sslip.io resolves externally)
      - name: Configure CoreDNS
        if: env.USE_SSLIP_DNS != 'true'
        run: |
          set -euo pipefail
          HARBOR_HOSTNAME="harbor.${DOMAIN}"
          GITLAB_HOSTNAME="gitlab.${DOMAIN}"
          ARGOCD_HOSTNAME="argocd.${DOMAIN}"

          # Get current CoreDNS Corefile
          CURRENT_COREFILE=$(kubectl get configmap coredns -n kube-system -o jsonpath='{.data.Corefile}')

          # Check if hosts entries already exist
          if echo "${CURRENT_COREFILE}" | grep -q "${GITLAB_HOSTNAME}"; then
            echo "CoreDNS already contains entry for '${GITLAB_HOSTNAME}', skipping patch"
          else
            # Remove stale hosts blocks from previous deployments
            CLEAN_COREFILE=$(echo "${CURRENT_COREFILE}" | python3 -c '
          import re, sys
          corefile = sys.stdin.read()
          cleaned = re.sub(r"\s*hosts\s*\{[^}]*\}\s*", "\n        ", corefile)
          cleaned = re.sub(r"\n(\s*\n)+", "\n", cleaned)
          print(cleaned, end="")
          ')

            # Build the hosts block with all 3 hostnames pointing to Contour LB IP
            HOSTS_BLOCK="hosts {\n            ${CONTOUR_LB_IP} ${HARBOR_HOSTNAME}\n            ${CONTOUR_LB_IP} ${GITLAB_HOSTNAME}\n            ${CONTOUR_LB_IP} ${ARGOCD_HOSTNAME}\n            fallthrough\n        }"

            # Inject the hosts block before the "ready" directive
            PATCHED_COREFILE=$(echo "${CLEAN_COREFILE}" | sed "s|ready|${HOSTS_BLOCK}\n        ready|")

            # Apply the patched ConfigMap
            if ! kubectl patch configmap coredns -n kube-system --type merge -p "{
              \"data\": {
                \"Corefile\": $(echo "${PATCHED_COREFILE}" | python3 -c 'import json,sys; print(json.dumps(sys.stdin.read()))')
              }
            }"; then
              echo "::error::Failed to patch CoreDNS ConfigMap"
              exit 1
            fi

            echo "CoreDNS ConfigMap patched with static entries for '${HARBOR_HOSTNAME}', '${GITLAB_HOSTNAME}', and '${ARGOCD_HOSTNAME}'"
          fi

          # Restart CoreDNS pods to pick up the new configuration
          kubectl rollout restart deployment/coredns -n kube-system

          # Wait for CoreDNS pods to reach Running state
          TIMEOUT="$PACKAGE_TIMEOUT"
          INTERVAL=15
          ELAPSED=0
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            NON_RUNNING=$(kubectl get pods -n kube-system -l k8s-app=kube-dns --no-headers 2>/dev/null | grep -cv 'Running' || true)
            if [ "$NON_RUNNING" = "0" ]; then
              echo "All CoreDNS pods are running"
              break
            fi
            echo "Waiting for CoreDNS pods to be running... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            echo "::error::CoreDNS pods did not reach Running state within ${TIMEOUT}s"
            exit 1
          fi

          # Wait for API server to become reachable after CoreDNS restart
          ELAPSED=0
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            if kubectl get ns >/dev/null 2>&1; then
              echo "API server is reachable"
              break
            fi
            echo "Waiting for API server to be reachable... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            echo "::error::API server did not become reachable within ${TIMEOUT}s after CoreDNS restart"
            exit 1
          fi
          echo "CoreDNS configuration complete"

      # Phase 6: Install ArgoCD
      - name: Install ArgoCD
        run: |
          set -euo pipefail
          ARGOCD_NAMESPACE="argocd"
          ARGOCD_HOSTNAME="argocd.${DOMAIN}"

          # Add ArgoCD Helm repository
          helm repo add argo https://argoproj.github.io/argo-helm 2>/dev/null || true
          helm repo update 2>/dev/null || true

          # Skip if ArgoCD Helm release already exists
          if helm status argocd -n "$ARGOCD_NAMESPACE" >/dev/null 2>&1; then
            echo "ArgoCD Helm release already deployed, skipping install"
          else
            # Prepare ArgoCD values file with runtime hostname substitution
            TEMP_ARGOCD_VALUES=$(mktemp /tmp/argocd-values-XXXXXX.yaml)
            sed \
              -e "s|argocd\.lab\.local|${ARGOCD_HOSTNAME}|g" \
              -e "s|ARGOCD_HOSTNAME|${ARGOCD_HOSTNAME}|g" \
              examples/deploy-gitops/argocd-values.yaml > "$TEMP_ARGOCD_VALUES"

            if ! helm upgrade --install argocd argo/argo-cd \
              --namespace "$ARGOCD_NAMESPACE" \
              --create-namespace \
              --version "$ARGOCD_VERSION" \
              --values "$TEMP_ARGOCD_VALUES" \
              --timeout 10m; then
              echo "::error::Failed to install ArgoCD via Helm"
              rm -f "$TEMP_ARGOCD_VALUES"
              exit 1
            fi
            rm -f "$TEMP_ARGOCD_VALUES"
            echo "ArgoCD Helm release installed"
          fi

          # Wait for ArgoCD server pods to reach Running state
          TIMEOUT="$PACKAGE_TIMEOUT"
          INTERVAL=15
          ELAPSED=0
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            if kubectl get pods -n "$ARGOCD_NAMESPACE" -l app.kubernetes.io/name=argocd-server --no-headers 2>/dev/null | grep -q 'Running'; then
              echo "ArgoCD server pods are running"
              break
            fi
            echo "Waiting for ArgoCD server pods to be running... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            echo "::error::ArgoCD server pods did not reach Running state within ${TIMEOUT}s"
            exit 1
          fi

          # Retrieve ArgoCD initial admin password
          ARGOCD_PASSWORD=$(kubectl get secret argocd-initial-admin-secret -n "$ARGOCD_NAMESPACE" -o jsonpath='{.data.password}' | base64 -d)
          echo "::add-mask::${ARGOCD_PASSWORD}"
          echo "ARGOCD_PASSWORD=$ARGOCD_PASSWORD" >> "$GITHUB_ENV"
          echo "ArgoCD setup complete"

      # Phase 7: Install ArgoCD CLI
      - name: Install ArgoCD CLI
        run: |
          set -euo pipefail

          if command -v argocd &>/dev/null; then
            echo "ArgoCD CLI already available in PATH"
          else
            # Download ArgoCD CLI from GitHub releases
            if ! curl -sSL -o /tmp/argocd https://github.com/argoproj/argo-cd/releases/latest/download/argocd-linux-amd64; then
              echo "::error::Failed to download ArgoCD CLI from GitHub releases"
              exit 1
            fi

            chmod +x /tmp/argocd

            # Add to PATH for subsequent steps
            echo "/tmp" >> "$GITHUB_PATH"
            echo "ArgoCD CLI downloaded and installed to /tmp/argocd"
          fi
          echo "ArgoCD CLI setup complete"

      # Phase 8: Distribute Certificates
      - name: Distribute Certificates
        run: |
          set -euo pipefail
          CERT_DIR="./certs"
          ARGOCD_NAMESPACE="argocd"
          GITLAB_NAMESPACE="gitlab-system"
          GITLAB_RUNNER_NAMESPACE="gitlab-runners"

          # Create ArgoCD TLS secret from wildcard certificate (idempotent)
          kubectl create secret tls argocd-server-tls \
            --cert="${CERT_DIR}/wildcard.crt" \
            --key="${CERT_DIR}/wildcard.key" \
            --namespace "$ARGOCD_NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -
          echo "ArgoCD TLS secret created in namespace '$ARGOCD_NAMESPACE'"

          # Create GitLab namespace with privileged PodSecurity labels
          if kubectl get ns "$GITLAB_NAMESPACE" >/dev/null 2>&1; then
            echo "Namespace '$GITLAB_NAMESPACE' already exists, skipping creation"
          else
            kubectl create ns "$GITLAB_NAMESPACE"
            echo "Namespace '$GITLAB_NAMESPACE' created"
          fi
          kubectl label ns "$GITLAB_NAMESPACE" \
            pod-security.kubernetes.io/enforce=privileged \
            pod-security.kubernetes.io/warn=privileged \
            --overwrite >/dev/null 2>&1 || true

          # Create GitLab Runner namespace with privileged PodSecurity labels
          if kubectl get ns "$GITLAB_RUNNER_NAMESPACE" >/dev/null 2>&1; then
            echo "Namespace '$GITLAB_RUNNER_NAMESPACE' already exists, skipping creation"
          else
            kubectl create ns "$GITLAB_RUNNER_NAMESPACE"
            echo "Namespace '$GITLAB_RUNNER_NAMESPACE' created"
          fi
          kubectl label ns "$GITLAB_RUNNER_NAMESPACE" \
            pod-security.kubernetes.io/enforce=privileged \
            pod-security.kubernetes.io/warn=privileged \
            --overwrite >/dev/null 2>&1 || true

          # Create Harbor CA secret in GitLab namespace (idempotent)
          if ! kubectl create secret generic harbor-ca-cert \
            --from-file=ca.crt="${CERT_DIR}/ca.crt" \
            --namespace "$GITLAB_NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -; then
            echo "::error::Failed to create Harbor CA secret in namespace '$GITLAB_NAMESPACE'"
            exit 1
          fi

          # Create Harbor CA secret in GitLab Runner namespace (idempotent)
          if ! kubectl create secret generic harbor-ca-cert \
            --from-file=ca.crt="${CERT_DIR}/ca.crt" \
            --namespace "$GITLAB_RUNNER_NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -; then
            echo "::error::Failed to create Harbor CA secret in namespace '$GITLAB_RUNNER_NAMESPACE'"
            exit 1
          fi

          # Create GitLab wildcard TLS secret (idempotent)
          if ! kubectl create secret tls gitlab-wildcard-tls \
            --cert="${CERT_DIR}/wildcard.crt" \
            --key="${CERT_DIR}/wildcard.key" \
            --namespace "$GITLAB_NAMESPACE" \
            --dry-run=client -o yaml | kubectl apply -f -; then
            echo "::error::Failed to create GitLab wildcard TLS secret in namespace '$GITLAB_NAMESPACE'"
            exit 1
          fi

          echo "Certificate distribution complete"

      # Phase 9: Install GitLab
      - name: Install GitLab
        run: |
          set -euo pipefail
          GITLAB_NAMESPACE="gitlab-system"
          GITLAB_HOSTNAME="gitlab.${DOMAIN}"
          GITLAB_DOMAIN="${DOMAIN}"
          HARBOR_HOSTNAME="harbor.${DOMAIN}"

          # Add GitLab Helm repository
          helm repo add gitlab https://charts.gitlab.io/ 2>/dev/null || true
          helm repo update 2>/dev/null || true

          # Skip if GitLab Helm release already exists
          if helm status gitlab -n "$GITLAB_NAMESPACE" >/dev/null 2>&1; then
            echo "GitLab Helm release already deployed, skipping install"
          else
            # Prepare GitLab Operator values file with runtime hostname substitution
            TEMP_GITLAB_VALUES=$(mktemp /tmp/gitlab-operator-values-XXXXXX.yaml)
            sed \
              -e "s|GITLAB_HOSTNAME|${GITLAB_HOSTNAME}|g" \
              -e "s|GITLAB_DOMAIN|${GITLAB_DOMAIN}|g" \
              -e "s|HARBOR_HOSTNAME|${HARBOR_HOSTNAME}|g" \
              examples/deploy-gitops/gitlab-operator-values.yaml > "$TEMP_GITLAB_VALUES"

            if ! helm upgrade --install gitlab gitlab/gitlab \
              --namespace "$GITLAB_NAMESPACE" \
              --create-namespace \
              --version "$GITLAB_OPERATOR_VERSION" \
              --values "$TEMP_GITLAB_VALUES" \
              --timeout 10m; then
              echo "::error::Failed to install GitLab via Helm"
              rm -f "$TEMP_GITLAB_VALUES"
              exit 1
            fi
            rm -f "$TEMP_GITLAB_VALUES"
            echo "GitLab Helm release installed"
          fi

          # Wait for GitLab webservice pod to reach Running state
          TIMEOUT="$PACKAGE_TIMEOUT"
          INTERVAL=15
          ELAPSED=0
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            if kubectl get pods -n "$GITLAB_NAMESPACE" -l app=webservice --no-headers 2>/dev/null | grep -q 'Running'; then
              echo "GitLab webservice pod is running"
              break
            fi
            echo "Waiting for GitLab webservice pod to be running... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            echo "::error::GitLab webservice pod did not reach Running state within ${TIMEOUT}s"
            exit 1
          fi
          echo "GitLab setup complete"

      # Phase 10: Verify Harbor Proxy Configuration
      - name: Verify Harbor Proxy Configuration
        run: |
          set -euo pipefail
          HARBOR_HOSTNAME="harbor.${DOMAIN}"
          GITLAB_VALUES_FILE="examples/deploy-gitops/gitlab-operator-values.yaml"

          # Check if the GitLab Operator values file contains Harbor proxy cache configuration
          if grep -q "proxy/" "$GITLAB_VALUES_FILE" 2>/dev/null; then
            echo "Harbor proxy cache configuration found in '$GITLAB_VALUES_FILE'"
          else
            echo "::warning::Harbor proxy cache is not configured in '$GITLAB_VALUES_FILE'. DockerHub rate limits may cause image pull failures."
          fi

          # Check if Harbor hostname placeholder is referenced in the values file
          # (the placeholder gets substituted at runtime by sed in the Helm install step)
          if ! grep -q "HARBOR_HOSTNAME\|${HARBOR_HOSTNAME}" "$GITLAB_VALUES_FILE" 2>/dev/null; then
            echo "::warning::Harbor hostname placeholder not found in '$GITLAB_VALUES_FILE'. Harbor proxy may not be configured correctly."
          fi
          echo "Harbor proxy configuration check complete"

      # Phase 11: Install GitLab Runner
      - name: Install GitLab Runner
        run: |
          set -euo pipefail
          GITLAB_NAMESPACE="gitlab-system"
          GITLAB_RUNNER_NAMESPACE="gitlab-runners"
          GITLAB_HOSTNAME="gitlab.${DOMAIN}"
          HARBOR_HOSTNAME="harbor.${DOMAIN}"

          # Retrieve GitLab Runner registration token from the GitLab instance
          GITLAB_RUNNER_TOKEN=""

          # Try K8s secrets first
          RUNNER_SECRET_NAME=$(kubectl get secrets -n "$GITLAB_NAMESPACE" --no-headers 2>/dev/null \
            | grep -i 'runner.*secret\|runner-registration-token' \
            | awk '{print $1}' \
            | head -1 || true)

          if [ -n "$RUNNER_SECRET_NAME" ]; then
            GITLAB_RUNNER_TOKEN=$(kubectl get secret "$RUNNER_SECRET_NAME" -n "$GITLAB_NAMESPACE" \
              -o jsonpath='{.data.runner-registration-token}' 2>/dev/null | base64 -d 2>/dev/null || true)
          fi

          # Fallback: try the shared-secrets runner token
          if [ -z "$GITLAB_RUNNER_TOKEN" ]; then
            GITLAB_RUNNER_TOKEN=$(kubectl get secret gitlab-gitlab-runner-secret -n "$GITLAB_NAMESPACE" \
              -o jsonpath='{.data.runner-registration-token}' 2>/dev/null | base64 -d 2>/dev/null || true)
          fi

          # Fallback: try the GitLab API with root password
          if [ -z "$GITLAB_RUNNER_TOKEN" ]; then
            echo "Could not find runner registration token in K8s secrets. Attempting GitLab API..."
            GITLAB_ROOT_PASSWORD=$(kubectl get secret gitlab-gitlab-initial-root-password -n "$GITLAB_NAMESPACE" \
              -o jsonpath='{.data.password}' 2>/dev/null | base64 -d 2>/dev/null || true)

            if [ -n "$GITLAB_ROOT_PASSWORD" ]; then
              GITLAB_API_TOKEN=$(curl -sSk "https://${GITLAB_HOSTNAME}/oauth/token" \
                -d "grant_type=password&username=root&password=${GITLAB_ROOT_PASSWORD}" 2>/dev/null \
                | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null || true)

              if [ -n "$GITLAB_API_TOKEN" ]; then
                GITLAB_RUNNER_TOKEN=$(curl -sSk "https://${GITLAB_HOSTNAME}/api/v4/runners" \
                  -H "Authorization: Bearer ${GITLAB_API_TOKEN}" \
                  -d "runner_type=instance_type&description=vks-runner" 2>/dev/null \
                  | python3 -c "import sys,json; print(json.load(sys.stdin).get('token',''))" 2>/dev/null || true)
              fi
            fi
          fi

          if [ -z "$GITLAB_RUNNER_TOKEN" ]; then
            echo "::error::Failed to retrieve GitLab Runner registration token. Set GITLAB_RUNNER_TOKEN manually and re-run."
            exit 1
          fi
          echo "GitLab Runner registration token retrieved"

          # Prepare GitLab Runner values file with runtime token and hostname substitution
          TEMP_RUNNER_VALUES=$(mktemp /tmp/gitlab-runner-values-XXXXXX.yaml)
          sed \
            -e "s|GITLAB_RUNNER_TOKEN|${GITLAB_RUNNER_TOKEN}|g" \
            -e "s|HARBOR_HOSTNAME|${HARBOR_HOSTNAME}|g" \
            -e "s|GITLAB_HOSTNAME|${GITLAB_HOSTNAME}|g" \
            examples/deploy-gitops/gitlab-runner-values.yaml > "$TEMP_RUNNER_VALUES"

          # Add GitLab Helm repository (may already be added from GitLab install)
          helm repo add gitlab https://charts.gitlab.io/ 2>/dev/null || true
          helm repo update 2>/dev/null || true

          # Skip if GitLab Runner Helm release already exists
          if helm status gitlab-runner -n "$GITLAB_RUNNER_NAMESPACE" >/dev/null 2>&1; then
            echo "GitLab Runner Helm release already deployed, skipping install"
          else
            if ! helm upgrade --install gitlab-runner gitlab/gitlab-runner \
              --namespace "$GITLAB_RUNNER_NAMESPACE" \
              --create-namespace \
              --version "$GITLAB_RUNNER_VERSION" \
              --values "$TEMP_RUNNER_VALUES" \
              --timeout 10m; then
              echo "::error::Failed to install GitLab Runner via Helm"
              rm -f "$TEMP_RUNNER_VALUES"
              exit 1
            fi
            rm -f "$TEMP_RUNNER_VALUES"
            echo "GitLab Runner Helm release installed"
          fi

          # Wait for GitLab Runner pod to reach Running state
          TIMEOUT="$PACKAGE_TIMEOUT"
          INTERVAL=15
          ELAPSED=0
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            if kubectl get pods -n "$GITLAB_RUNNER_NAMESPACE" -l app=gitlab-runner --no-headers 2>/dev/null | grep -q 'Running'; then
              echo "GitLab Runner pod is running"
              break
            fi
            echo "Waiting for GitLab Runner pod to be running... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            echo "::error::GitLab Runner pod did not reach Running state within ${TIMEOUT}s"
            exit 1
          fi
          echo "GitLab Runner setup complete"

      # Phase 11b: Disable GitLab Public Sign-Up
      - name: Disable GitLab Public Sign-Up
        run: |
          set -euo pipefail
          GITLAB_NAMESPACE="gitlab-system"
          GITLAB_HOSTNAME="gitlab.${DOMAIN}"

          # Retrieve root password from gitlab-gitlab-initial-root-password secret
          GITLAB_ROOT_PASSWORD=$(kubectl get secret gitlab-gitlab-initial-root-password -n "$GITLAB_NAMESPACE" \
            -o jsonpath='{.data.password}' 2>/dev/null | base64 -d 2>/dev/null || true)
          echo "::add-mask::${GITLAB_ROOT_PASSWORD}"

          if [ -z "$GITLAB_ROOT_PASSWORD" ]; then
            echo "::warning::GitLab root password not found. Disable sign-up manually in Admin > Settings > General > Sign-up restrictions."
            exit 0
          fi

          # Obtain an OAuth access token for the root user
          SIGNUP_API_TOKEN=$(curl -sSk "https://${GITLAB_HOSTNAME}/oauth/token" \
            -d "grant_type=password&username=root&password=${GITLAB_ROOT_PASSWORD}" 2>/dev/null \
            | python3 -c "import sys,json; print(json.load(sys.stdin).get('access_token',''))" 2>/dev/null || true)

          if [ -z "$SIGNUP_API_TOKEN" ]; then
            echo "::warning::Could not obtain GitLab API token. Disable sign-up manually in Admin > Settings > General > Sign-up restrictions."
            exit 0
          fi

          # Disable public sign-up via the Application Settings API
          SIGNUP_RESULT=$(curl -sSk -X PUT \
            "https://${GITLAB_HOSTNAME}/api/v4/application/settings?signup_enabled=false" \
            -H "Authorization: Bearer ${SIGNUP_API_TOKEN}" 2>/dev/null \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('signup_enabled','unknown'))" 2>/dev/null || true)

          if [ "$SIGNUP_RESULT" = "False" ] || [ "$SIGNUP_RESULT" = "false" ]; then
            echo "GitLab public sign-up disabled via API"
          else
            echo "::warning::GitLab sign-up API returned: ${SIGNUP_RESULT}. Verify manually in Admin > Settings > General > Sign-up restrictions."
          fi
          echo "GitLab sign-up configuration complete" || true

      # Phase 12: Register Cluster with ArgoCD
      - name: Register Cluster with ArgoCD
        run: |
          set -euo pipefail
          ARGOCD_NAMESPACE="argocd"

          # Get the ArgoCD server pod name
          ARGOCD_POD=$(kubectl get pod -n "$ARGOCD_NAMESPACE" \
            -l app.kubernetes.io/name=argocd-server \
            -o jsonpath='{.items[0].metadata.name}')
          echo "ArgoCD server pod: $ARGOCD_POD"

          # Copy kubeconfig into the ArgoCD server pod
          kubectl cp "$KUBECONFIG" "${ARGOCD_NAMESPACE}/${ARGOCD_POD}:/tmp/kubeconfig.yaml"

          # Authenticate to ArgoCD inside the pod via kubectl exec
          if ! kubectl exec -n "$ARGOCD_NAMESPACE" "$ARGOCD_POD" -- \
            argocd login localhost:8080 \
              --username admin \
              --password "$ARGOCD_PASSWORD" \
              --plaintext --insecure; then
            echo "::error::Failed to authenticate to ArgoCD"
            exit 1
          fi
          echo "Authenticated to ArgoCD via kubectl exec"

          # Check if the cluster is already registered
          if kubectl exec -n "$ARGOCD_NAMESPACE" "$ARGOCD_POD" -- \
            argocd cluster list 2>/dev/null | grep -q "${CLUSTER_NAME}"; then
            echo "Cluster '${CLUSTER_NAME}' is already registered with ArgoCD, skipping registration"
          else
            # Get the cluster context from the kubeconfig
            CLUSTER_CONTEXT=$(kubectl config current-context)

            # Register the cluster with ArgoCD
            if ! kubectl exec -n "$ARGOCD_NAMESPACE" "$ARGOCD_POD" -- \
              argocd cluster add "$CLUSTER_CONTEXT" \
                --name "$CLUSTER_NAME" \
                --kubeconfig /tmp/kubeconfig.yaml \
                --yes; then
              echo "::error::Failed to register cluster '${CLUSTER_NAME}' with ArgoCD"
              exit 1
            fi
            echo "Cluster '${CLUSTER_NAME}' registered with ArgoCD"
          fi
          echo "ArgoCD cluster registration complete"

      # Phase 13: Bootstrap ArgoCD Application
      - name: Bootstrap ArgoCD Application
        run: |
          set -euo pipefail
          ARGOCD_NAMESPACE="argocd"
          APP_NAMESPACE="${APP_NAMESPACE:-microservices-demo}"
          HELM_CHARTS_REPO_URL="${HELM_CHARTS_REPO_URL:-https://github.com/scafeman/vcf9-iac-onboarding.git}"
          ARGOCD_TARGET_REVISION="${ARGOCD_TARGET_REVISION:-${{ github.ref_name }}}"
          ARGOCD_HOSTNAME="argocd.${DOMAIN}"

          # Get the ArgoCD server pod name
          ARGOCD_POD=$(kubectl get pod -n "$ARGOCD_NAMESPACE" \
            -l app.kubernetes.io/name=argocd-server \
            -o jsonpath='{.items[0].metadata.name}')

          # Pre-create the application namespace with privileged PodSecurity labels
          kubectl create ns "$APP_NAMESPACE" 2>/dev/null || true
          kubectl label ns "$APP_NAMESPACE" \
            pod-security.kubernetes.io/enforce=privileged \
            pod-security.kubernetes.io/warn=privileged \
            --overwrite >/dev/null 2>&1 || true
          echo "Namespace '$APP_NAMESPACE' labelled with privileged PodSecurity"

          # Apply the ArgoCD Application manifest with runtime variable substitution
          TEMP_ARGOCD_APP=$(mktemp /tmp/argocd-app-XXXXXX.yaml)
          sed \
            -e "s|HELM_CHARTS_REPO_URL|${HELM_CHARTS_REPO_URL}|g" \
            -e "s|ARGOCD_TARGET_REVISION|${ARGOCD_TARGET_REVISION}|g" \
            -e "s|APP_NAMESPACE|${APP_NAMESPACE}|g" \
            -e "s|ARGOCD_HOSTNAME|${ARGOCD_HOSTNAME}|g" \
            examples/deploy-gitops/argocd-microservices-demo.yaml > "$TEMP_ARGOCD_APP"

          if ! kubectl apply -f "$TEMP_ARGOCD_APP"; then
            echo "::error::Failed to apply ArgoCD Application manifest"
            rm -f "$TEMP_ARGOCD_APP"
            exit 1
          fi
          rm -f "$TEMP_ARGOCD_APP"
          echo "ArgoCD Application 'microservices-demo' created"

          # Wait for the application to reach Synced and Healthy state
          TIMEOUT="$PACKAGE_TIMEOUT"
          INTERVAL=15
          ELAPSED=0
          while [ "$ELAPSED" -lt "$TIMEOUT" ]; do
            APP_STATUS=$(kubectl exec -n "$ARGOCD_NAMESPACE" "$ARGOCD_POD" -- \
              argocd app get microservices-demo 2>/dev/null || true)
            if echo "$APP_STATUS" | grep -q "Healthy" && echo "$APP_STATUS" | grep -q "Synced"; then
              echo "ArgoCD application 'microservices-demo' is Synced and Healthy"
              break
            fi
            echo "Waiting for ArgoCD application to be Synced and Healthy... (${ELAPSED}s/${TIMEOUT}s)"
            sleep "$INTERVAL"
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          if [ "$ELAPSED" -ge "$TIMEOUT" ]; then
            echo "::error::ArgoCD application 'microservices-demo' did not reach Synced/Healthy state within ${TIMEOUT}s"
            exit 1
          fi
          echo "ArgoCD application bootstrap complete"

      # Phase 14: Verify Microservices Demo
      - name: Verify Microservices Demo
        run: |
          set -euo pipefail
          APP_NAMESPACE="${APP_NAMESPACE:-microservices-demo}"

          echo "--- Microservices Demo Pods ---"
          kubectl get pods -n "$APP_NAMESPACE" 2>/dev/null || true
          echo ""

          # Check all 11 microservice pods
          EXPECTED_SERVICES=(
            "adservice"
            "cartservice"
            "checkoutservice"
            "currencyservice"
            "emailservice"
            "frontend"
            "loadgenerator"
            "paymentservice"
            "productcatalogservice"
            "recommendationservice"
            "shippingservice"
          )

          for service in "${EXPECTED_SERVICES[@]}"; do
            if kubectl get pods -n "$APP_NAMESPACE" --no-headers 2>/dev/null | grep -q "${service}.*Running"; then
              echo "Service '${service}' is running"
            else
              echo "::warning::Service '${service}' is not in Running state"
            fi
          done

          # Wait for frontend-external LoadBalancer to receive an external IP
          FRONTEND_IP=""
          for i in $(seq 1 60); do
            FRONTEND_IP=$(kubectl get svc -n "$APP_NAMESPACE" frontend-external \
              -o jsonpath='{.status.loadBalancer.ingress[0].ip}' 2>/dev/null || true)
            if [ -n "$FRONTEND_IP" ]; then
              echo "Frontend external LoadBalancer IP: $FRONTEND_IP"
              echo "FRONTEND_IP=$FRONTEND_IP" >> "$GITHUB_ENV"
              break
            fi
            if [ $(( (i - 1) % 6 )) -eq 0 ]; then
              echo "Waiting for frontend-external LoadBalancer IP... ($(( (i-1)*5 ))s elapsed)"
            fi
            sleep 5
          done

          if [ -z "$FRONTEND_IP" ]; then
            echo "::warning::frontend-external LoadBalancer did not receive an external IP within 300s"
          fi
          echo "Microservices Demo verification complete"

      # Phase 14b: Create Let's Encrypt TLS Ingress (external-facing trusted certs)
      - name: Create Let's Encrypt TLS Ingress
        if: env.USE_SSLIP_DNS == 'true'
        run: |
          set -euo pipefail
          HARBOR_NAMESPACE="harbor"
          ARGOCD_NAMESPACE="argocd"
          GITLAB_NAMESPACE="gitlab-system"
          HARBOR_HOSTNAME="harbor.${DOMAIN}"
          ARGOCD_HOSTNAME="argocd.${DOMAIN}"
          GITLAB_HOSTNAME="gitlab.${DOMAIN}"
          CLUSTER_ISSUER_NAME="${CLUSTER_ISSUER_NAME:-letsencrypt-prod}"

          # Check if ClusterIssuer is ready
          TLS_ENABLED="false"
          if kubectl get clusterissuer "${CLUSTER_ISSUER_NAME}" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null | grep -q "True"; then
            TLS_ENABLED="true"
            echo "ClusterIssuer '${CLUSTER_ISSUER_NAME}' is Ready — creating Ingress with TLS"
          else
            echo "::warning::ClusterIssuer '${CLUSTER_ISSUER_NAME}' not ready — skipping Let's Encrypt Ingress"
            exit 0
          fi

          # Delete Helm-managed Ingress resources that conflict with Let's Encrypt ones
          kubectl delete ingress argocd-server -n "${ARGOCD_NAMESPACE}" --ignore-not-found 2>/dev/null || true
          kubectl delete ingress gitlab-webservice-default -n "${GITLAB_NAMESPACE}" --ignore-not-found 2>/dev/null || true
          echo "Helm-managed Ingress resources deleted (ArgoCD, GitLab)"

          # Harbor Ingress with Let's Encrypt
          cat <<EOF | kubectl apply -f -
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: harbor-letsencrypt-ingress
            namespace: ${HARBOR_NAMESPACE}
            annotations:
              cert-manager.io/cluster-issuer: "${CLUSTER_ISSUER_NAME}"
          spec:
            ingressClassName: contour
            tls:
              - hosts:
                  - ${HARBOR_HOSTNAME}
                secretName: harbor-letsencrypt-tls
            rules:
              - host: ${HARBOR_HOSTNAME}
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: harbor-portal
                          port:
                            number: 80
                    - path: /api/
                      pathType: Prefix
                      backend:
                        service:
                          name: harbor-core
                          port:
                            number: 80
                    - path: /service/
                      pathType: Prefix
                      backend:
                        service:
                          name: harbor-core
                          port:
                            number: 80
                    - path: /v2/
                      pathType: Prefix
                      backend:
                        service:
                          name: harbor-core
                          port:
                            number: 80
                    - path: /chartrepo/
                      pathType: Prefix
                      backend:
                        service:
                          name: harbor-core
                          port:
                            number: 80
                    - path: /c/
                      pathType: Prefix
                      backend:
                        service:
                          name: harbor-core
                          port:
                            number: 80
          EOF
          echo "Harbor Let's Encrypt Ingress created for ${HARBOR_HOSTNAME}"

          # ArgoCD Ingress with Let's Encrypt
          cat <<EOF | kubectl apply -f -
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: argocd-letsencrypt-ingress
            namespace: ${ARGOCD_NAMESPACE}
            annotations:
              cert-manager.io/cluster-issuer: "${CLUSTER_ISSUER_NAME}"
          spec:
            ingressClassName: contour
            tls:
              - hosts:
                  - ${ARGOCD_HOSTNAME}
                secretName: argocd-letsencrypt-tls
            rules:
              - host: ${ARGOCD_HOSTNAME}
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: argocd-server
                          port:
                            number: 80
          EOF
          echo "ArgoCD Let's Encrypt Ingress created for ${ARGOCD_HOSTNAME}"

          # GitLab Ingress with Let's Encrypt
          cat <<EOF | kubectl apply -f -
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: gitlab-letsencrypt-ingress
            namespace: ${GITLAB_NAMESPACE}
            annotations:
              cert-manager.io/cluster-issuer: "${CLUSTER_ISSUER_NAME}"
          spec:
            ingressClassName: contour
            tls:
              - hosts:
                  - ${GITLAB_HOSTNAME}
                secretName: gitlab-letsencrypt-tls
            rules:
              - host: ${GITLAB_HOSTNAME}
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: gitlab-webservice-default
                          port:
                            number: 8181
          EOF
          echo "GitLab Let's Encrypt Ingress created for ${GITLAB_HOSTNAME}"

          # Online Boutique (Microservices Demo) Ingress with Let's Encrypt
          APP_NAMESPACE="${APP_NAMESPACE:-microservices-demo}"
          BOUTIQUE_HOSTNAME="boutique.${DOMAIN}"
          cat <<EOF | kubectl apply -f -
          apiVersion: networking.k8s.io/v1
          kind: Ingress
          metadata:
            name: boutique-letsencrypt-ingress
            namespace: ${APP_NAMESPACE}
            annotations:
              cert-manager.io/cluster-issuer: "${CLUSTER_ISSUER_NAME}"
          spec:
            ingressClassName: contour
            tls:
              - hosts:
                  - ${BOUTIQUE_HOSTNAME}
                secretName: boutique-letsencrypt-tls
            rules:
              - host: ${BOUTIQUE_HOSTNAME}
                http:
                  paths:
                    - path: /
                      pathType: Prefix
                      backend:
                        service:
                          name: frontend
                          port:
                            number: 80
          EOF
          echo "Online Boutique Let's Encrypt Ingress created for ${BOUTIQUE_HOSTNAME}"
          echo "BOUTIQUE_HOSTNAME=${BOUTIQUE_HOSTNAME}" >> "$GITHUB_ENV"

          # Wait for certificates
          echo "Waiting for Let's Encrypt certificates..."
          CERT_TIMEOUT=300
          for CERT in harbor-letsencrypt-tls:${HARBOR_NAMESPACE} argocd-letsencrypt-tls:${ARGOCD_NAMESPACE} gitlab-letsencrypt-tls:${GITLAB_NAMESPACE} boutique-letsencrypt-tls:${APP_NAMESPACE}; do
            CERT_NAME="${CERT%%:*}"
            CERT_NS="${CERT##*:}"
            ELAPSED=0
            while [ "$ELAPSED" -lt "$CERT_TIMEOUT" ]; do
              READY=$(kubectl get certificate "${CERT_NAME}" -n "${CERT_NS}" -o jsonpath='{.status.conditions[?(@.type=="Ready")].status}' 2>/dev/null || true)
              if [ "$READY" = "True" ]; then
                echo "Certificate '${CERT_NAME}' is Ready"
                break
              fi
              echo "Waiting for ${CERT_NAME}... (${ELAPSED}s/${CERT_TIMEOUT}s)"
              sleep 10
              ELAPSED=$((ELAPSED + 10))
            done
            if [ "$ELAPSED" -ge "$CERT_TIMEOUT" ]; then
              echo "::warning::Certificate '${CERT_NAME}' not ready within ${CERT_TIMEOUT}s"
            fi
          done
          echo "Let's Encrypt TLS Ingress setup complete"

      # Phase 15: Write Job Summary
      - name: Write Job Summary
        run: |
          set -euo pipefail
          HARBOR_HOSTNAME="harbor.${DOMAIN}"
          GITLAB_HOSTNAME="gitlab.${DOMAIN}"
          ARGOCD_HOSTNAME="argocd.${DOMAIN}"
          APP_NAMESPACE="${APP_NAMESPACE:-microservices-demo}"
          HELM_CHARTS_REPO_URL="${HELM_CHARTS_REPO_URL:-https://github.com/scafeman/vcf9-iac-onboarding.git}"

          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ✅ ArgoCD Stack Deployment Complete

          ### Cluster Information
          | Field | Value |
          |---|---|
          | Cluster Name | \`${CLUSTER_NAME}\` |
          | Namespace | \`${DYNAMIC_NS_NAME}\` |
          | Domain | \`${DOMAIN}\` |
          | Environment | \`${ENVIRONMENT}\` |
          | Contour LB IP | \`${CONTOUR_LB_IP}\` |

          ### Service URLs
          | Service | URL |
          |---|---|
          | Harbor | https://${HARBOR_HOSTNAME} |
          | ArgoCD | https://${ARGOCD_HOSTNAME} |
          | GitLab | https://${GITLAB_HOSTNAME} |
          | Online Boutique | ${BOUTIQUE_HOSTNAME:+https://${BOUTIQUE_HOSTNAME}} ${BOUTIQUE_HOSTNAME:-http://${FRONTEND_IP:-N/A}} |

          ### Credential Retrieval
          | Service | Username | Retrieval Command |
          |---|---|---|
          | Harbor | admin | \`kubectl get secret harbor-core -n harbor -o jsonpath='{.data.HARBOR_ADMIN_PASSWORD}' \| base64 -d\` |
          | ArgoCD | admin | \`kubectl get secret argocd-initial-admin-secret -n argocd -o jsonpath='{.data.password}' \| base64 -d\` |
          | GitLab | root | \`kubectl get secret gitlab-gitlab-initial-root-password -n gitlab-system -o jsonpath='{.data.password}' \| base64 -d\` |

          ### Installed Versions
          | Component | Version |
          |---|---|
          | Harbor | ${HARBOR_VERSION} |
          | ArgoCD | ${ARGOCD_VERSION} |
          | GitLab Operator | ${GITLAB_OPERATOR_VERSION} |
          | GitLab Runner | ${GITLAB_RUNNER_VERSION} |
          | Helm Charts Repo | ${HELM_CHARTS_REPO_URL} |

          EOF

          if [[ "${USE_SSLIP_DNS}" != "true" ]]; then
            cat >> $GITHUB_STEP_SUMMARY <<DNSEOF
          ### DNS / Hosts File Instructions
          Add the following entry to your local \`/etc/hosts\` file or DNS server:
          \`\`\`
          ${CONTOUR_LB_IP} ${HARBOR_HOSTNAME} ${GITLAB_HOSTNAME} ${ARGOCD_HOSTNAME}
          \`\`\`
          DNSEOF
          fi

          echo "Job summary written"

      # Write Failure Summary
      - name: Write Failure Summary
        if: failure()
        run: |
          set -euo pipefail
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## ❌ ArgoCD Stack Deployment Failed

          | Field | Value |
          |---|---|
          | Cluster Name | \`${CLUSTER_NAME}\` |
          | Environment | \`${ENVIRONMENT}\` |
          | Domain | \`${DOMAIN}\` |

          ### Error Context
          The deployment failed during one of the provisioning phases. Check the workflow run logs for detailed error messages.

          **Troubleshooting steps:**
          1. Review the failed step in the workflow run logs
          2. Verify the VKS cluster from Deploy Cluster is running and accessible
          3. Check that the kubeconfig file exists and is valid
          4. Re-run the workflow — most steps are idempotent and will skip already-completed work
          EOF
          echo "Failure summary written"
